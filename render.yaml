services:
  - type: web
    name: coin-match
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: coin-match-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: BOT_TOKEN
        sync: false
      - key: PUBLIC_DOMAIN
        fromService:
          type: web
          name: coin-match
          property: host
      - key: TELEGRAM_ADMIN_IDS
        value: "23040617"
