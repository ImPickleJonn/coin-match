// =========================================================
// Grid representation
// Each cell is either null (empty) or { type, sp, mod }:
//   type: 0..NUM_COLORS-1 (color) or NUM_COLORS..  (charge/specials)
//   sp:   SP_NONE | SP_ARROW_H | SP_ARROW_V | SP_BOMB | SP_LIGHTNING
//   mod:  reserved for v0.7+ (fuse/bonus/plus/rainbow modifiers)
// Only COLOR tiles can host special pieces. Charge/Bonus tiles never.
// =========================================================
let grid = [];

function makeEmptyGrid() {
  const g = new Array(ROWS);
  for (let r = 0; r < ROWS; r++) g[r] = new Array(COLS).fill(null);
  return g;
}
function spawnFreshGrid() {
  grid = makeEmptyGrid();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = pickFreshTile(r, c);
    }
  }
}
function pickFreshTile(r, c) {
  for (let attempt = 0; attempt < 30; attempt++) {
    const tl = Math.floor(Math.random() * NUM_COLORS);
    if (c >= 2 && grid[r][c - 1] && grid[r][c - 1].type === tl && grid[r][c - 2] && grid[r][c - 2].type === tl) continue;
    if (r >= 2 && grid[r - 1][c] && grid[r - 1][c].type === tl && grid[r - 2][c] && grid[r - 2][c].type === tl) continue;
    return makeCell(tl);
  }
  return makeCell(Math.floor(Math.random() * NUM_COLORS));
}
function pickReplenishTile() {
  const r = Math.random();
  let acc = 0;
  if (r < (acc += STAR_SPAWN_P))   return makeCell(TILE.STAR);
  if (r < (acc += WILD_SPAWN_P))   return makeCell(TILE.WILD);
  if (r < (acc += BAG_SPAWN_P))    return makeCell(TILE.MONEY_BAG);
  if (r < (acc += CHARGE_SPAWN_P)) return makeCell(TILE.HAMMER);
  if (r < (acc += CHARGE_SPAWN_P)) return makeCell(TILE.PIG);
  if (r < (acc += CHARGE_SPAWN_P)) return makeCell(TILE.SHIELD);
  return makeCell(Math.floor(Math.random() * NUM_COLORS));
}
function tilesMatch(a, b) {
  if (!a || !b) return false;
  if (a.type === TILE.WILD || b.type === TILE.WILD) return true;
  return a.type === b.type;
}
// Run-aware match detection — returns { matched, runs, groups } where
// runs is an array of { cells, len, shape, type, pivot? } describing each
// detected match line/shape. Used by plannedSpawns to decide where to
// drop specials (line4 → arrow, line5 → lightning, L/T → bomb).
function findMatchesAndRuns() {
  const horizRuns = [], vertRuns = [];
  for (let r = 0; r < ROWS; r++) {
    let s = 0;
    for (let c = 1; c <= COLS; c++) {
      const end = c === COLS || !grid[r][c] || !grid[r][s] || !tilesMatch(grid[r][c], grid[r][s]);
      if (end) {
        if (c - s >= MIN_MATCH && grid[r][s]) {
          const cells = new Set();
          for (let k = s; k < c; k++) cells.add(r + ',' + k);
          horizRuns.push({ cells, len: c - s, type: grid[r][s].type });
        }
        s = c;
      }
    }
  }
  for (let c = 0; c < COLS; c++) {
    let s = 0;
    for (let r = 1; r <= ROWS; r++) {
      const end = r === ROWS || !grid[r][c] || !grid[s][c] || !tilesMatch(grid[r][c], grid[s][c]);
      if (end) {
        if (r - s >= MIN_MATCH && grid[s][c]) {
          const cells = new Set();
          for (let k = s; k < r; k++) cells.add(k + ',' + c);
          vertRuns.push({ cells, len: r - s, type: grid[s][c].type });
        }
        s = r;
      }
    }
  }
  // Merge intersecting same-type runs into L/T shapes
  const runs = [];
  const cH = new Set(), cV = new Set();
  for (let i = 0; i < horizRuns.length; i++) {
    const h = horizRuns[i];
    for (let j = 0; j < vertRuns.length; j++) {
      const v = vertRuns[j];
      if (h.type !== v.type) continue;
      let ix = null;
      for (const k of h.cells) if (v.cells.has(k)) { ix = k; break; }
      if (ix) {
        const merged = new Set();
        for (const k of h.cells) merged.add(k);
        for (const k of v.cells) merged.add(k);
        runs.push({ cells: merged, len: merged.size, shape: 'L_or_T', type: h.type, pivot: ix.split(',').map(Number) });
        cH.add(i); cV.add(j);
      }
    }
  }
  for (let i = 0; i < horizRuns.length; i++) {
    if (cH.has(i)) continue;
    const h = horizRuns[i];
    let shape = 'line3';
    if (h.len === 4) shape = 'line4_h';
    else if (h.len >= 5) shape = 'line5_h';
    runs.push({ cells: h.cells, len: h.len, shape, type: h.type });
  }
  for (let j = 0; j < vertRuns.length; j++) {
    if (cV.has(j)) continue;
    const v = vertRuns[j];
    let shape = 'line3';
    if (v.len === 4) shape = 'line4_v';
    else if (v.len >= 5) shape = 'line5_v';
    runs.push({ cells: v.cells, len: v.len, shape, type: v.type });
  }
  // Aggregate matched cells
  const matched = new Set();
  for (const run of runs) for (const k of run.cells) matched.add(k);
  return { matched, runs, groups: runs.length };
}
// Decide where (and what kind) of special-piece spawns from this match.
// Preference order: cell at swap location > pivot of L/T > middle of line.
function plannedSpawns(runs, swapCells) {
  const spawns = [];
  for (const run of runs) {
    if (run.type >= NUM_COLORS) continue;   // only color runs spawn specials
    let sp = SP_NONE;
    if (run.shape === 'L_or_T')           sp = SP_BOMB;
    else if (run.shape === 'line5_h' || run.shape === 'line5_v') sp = SP_LIGHTNING;
    else if (run.shape === 'line4_h')     sp = SP_ARROW_H;
    else if (run.shape === 'line4_v')     sp = SP_ARROW_V;
    if (!sp) continue;
    let chosenKey = null;
    if (swapCells) for (const sc of swapCells) if (run.cells.has(sc)) { chosenKey = sc; break; }
    if (!chosenKey && run.pivot) chosenKey = run.pivot[0] + ',' + run.pivot[1];
    if (!chosenKey) {
      const arr = [];
      for (const k of run.cells) arr.push(k);
      chosenKey = arr[Math.floor(arr.length / 2)];
    }
    const [r, c] = chosenKey.split(',').map(Number);
    spawns.push({ r, c, sp, type: run.type });
  }
  return spawns;
}
// When a match includes special pieces, those specials detonate and
// extend the toClear set. Detonations chain — clearing one special's row
// can hit another special which detonates in turn.
function expandWithDetonations(initialMatched) {
  const toClear = new Set();
  for (const k of initialMatched) toClear.add(k);
  const detonations = [];
  const queue = [];
  for (const key of initialMatched) {
    const [r, c] = key.split(',').map(Number);
    if (grid[r][c] && grid[r][c].sp) queue.push({ r, c, sp: grid[r][c].sp });
  }
  let safety = 50;
  while (queue.length > 0 && safety-- > 0) {
    const det = queue.shift();
    const r = det.r, c = det.c, sp = det.sp;
    const affected = new Set();
    if (sp === SP_ARROW_H) {
      for (let cc = 0; cc < COLS; cc++) affected.add(r + ',' + cc);
    } else if (sp === SP_ARROW_V) {
      for (let rr = 0; rr < ROWS; rr++) affected.add(rr + ',' + c);
    } else if (sp === SP_BOMB) {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) affected.add(nr + ',' + nc);
      }
    } else if (sp === SP_LIGHTNING) {
      // Lightning zaps 8 random non-cleared cells across the board.
      const cand = [];
      for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
        if (grid[rr][cc] && !toClear.has(rr + ',' + cc)) cand.push(rr + ',' + cc);
      }
      for (let i = cand.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = cand[i]; cand[i] = cand[j]; cand[j] = tmp;
      }
      for (let i = 0; i < Math.min(8, cand.length); i++) affected.add(cand[i]);
    }
    detonations.push({ r, c, sp, cells: affected });
    for (const key of affected) {
      if (!toClear.has(key)) {
        toClear.add(key);
        const [rr, cc] = key.split(',').map(Number);
        if (grid[rr][cc] && grid[rr][cc].sp && !(rr === r && cc === c)) {
          queue.push({ r: rr, c: cc, sp: grid[rr][cc].sp });
        }
      }
    }
  }
  return { toClear, detonations };
}
// Special-on-special combo cell calculation (verbatim Match Icon).
function spClass(sp) {
  if (sp === SP_ARROW_H || sp === SP_ARROW_V) return 'arrow';
  if (sp === SP_BOMB) return 'bomb';
  if (sp === SP_LIGHTNING) return 'lightning';
  return null;
}
function comboCells(spA, spB, epR, epC, otherR, otherC) {
  const classA = spClass(spA);
  const classB = spClass(spB);
  if (!classA || !classB) return new Set();
  const types = [classA, classB].sort().join('+');
  const cells = new Set();
  if (types === 'arrow+arrow') {
    const aH = spA === SP_ARROW_H, bH = spB === SP_ARROW_H;
    const aV = spA === SP_ARROW_V, bV = spB === SP_ARROW_V;
    if (aV && bV) {
      for (let rr = 0; rr < ROWS; rr++) { cells.add(rr + ',' + epC); cells.add(rr + ',' + otherC); }
    } else if (aH && bH) {
      for (let cc = 0; cc < COLS; cc++) { cells.add(epR + ',' + cc); cells.add(otherR + ',' + cc); }
    } else {
      const hRow = aH ? epR : otherR;
      const vCol = aV ? epC : otherC;
      for (let cc = 0; cc < COLS; cc++) cells.add(hRow + ',' + cc);
      for (let rr = 0; rr < ROWS; rr++) cells.add(rr + ',' + vCol);
    }
  } else if (types === 'arrow+bomb') {
    const horizontal = spA === SP_ARROW_H || spB === SP_ARROW_H;
    if (horizontal) {
      for (let dr = -1; dr <= 1; dr++) {
        const rr = epR + dr;
        if (rr < 0 || rr >= ROWS) continue;
        for (let cc = 0; cc < COLS; cc++) cells.add(rr + ',' + cc);
      }
    } else {
      for (let dc = -1; dc <= 1; dc++) {
        const cc = epC + dc;
        if (cc < 0 || cc >= COLS) continue;
        for (let rr = 0; rr < ROWS; rr++) cells.add(rr + ',' + cc);
      }
    }
  } else if (types === 'arrow+lightning') {
    const cand = [];
    for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
      if (grid[rr][cc]) cand.push([rr, cc]);
    }
    for (let i = cand.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = cand[i]; cand[i] = cand[j]; cand[j] = tmp;
    }
    const picks = cand.slice(0, 6);
    picks.push([epR, epC]);
    for (const p of picks) {
      const pr = p[0], pc = p[1];
      if ((pr + pc) % 2 === 0) {
        for (let cc = 0; cc < COLS; cc++) cells.add(pr + ',' + cc);
      } else {
        for (let rr = 0; rr < ROWS; rr++) cells.add(rr + ',' + pc);
      }
    }
  } else if (types === 'bomb+bomb') {
    for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
      const rr = epR + dr, cc = epC + dc;
      if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) cells.add(rr + ',' + cc);
    }
  } else if (types === 'bomb+lightning') {
    const cand = [];
    for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
      if (grid[rr][cc]) cand.push([rr, cc]);
    }
    for (let i = cand.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = cand[i]; cand[i] = cand[j]; cand[j] = tmp;
    }
    const picks = cand.slice(0, 6);
    picks.push([epR, epC]);
    for (const p of picks) {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        const rr = p[0] + dr, cc = p[1] + dc;
        if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) cells.add(rr + ',' + cc);
      }
    }
  } else if (types === 'lightning+lightning') {
    const cand = [];
    for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
      if (grid[rr][cc]) cand.push(rr + ',' + cc);
    }
    for (let i = cand.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = cand[i]; cand[i] = cand[j]; cand[j] = tmp;
    }
    for (let i = 0; i < Math.min(20, cand.length); i++) cells.add(cand[i]);
    cells.add(epR + ',' + epC);
  }
  return cells;
}
// Hex color → rgba(...) string with custom alpha. Used by all FX draws.
function hexToRgba(hex, a) {
  if (!hex) return 'rgba(255,255,255,' + a + ')';
  if (hex.indexOf('rgba') === 0 || hex.indexOf('rgb') === 0) return hex;
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

// Register an FX animation. Like swap/pop/fall but with type='fx' and a
// `kind` string the render loop dispatches on (see drawFX). Duration varies
// per kind to match Match Icon's pacing — beams short, explosions longer,
// combos longest. onDone fires after the FX finishes drawing.
function startFXAnim(kind, payload, onDone) {
  const t0 = now();
  let dur = 500;
  if (kind === 'arrow_h' || kind === 'arrow_v') dur = 600;
  else if (kind === 'bomb_blast')               dur = 700;
  else if (kind === 'lightning_strike')         dur = 750;
  else if (kind === 'combo_arrow+arrow')        dur = 850;
  else if (kind === 'combo_arrow+bomb')         dur = 1000;
  else if (kind === 'combo_arrow+lightning')    dur = 1100;
  else if (kind === 'combo_bomb+bomb')          dur = 1100;
  else if (kind === 'combo_bomb+lightning')     dur = 1200;
  else if (kind === 'combo_lightning+lightning') dur = 1000;
  animations.push({
    type: 'fx', kind, payload, t0, dur, p: 0,
    update(t) { this.p = Math.min(1, (t - t0) / dur); return this.p >= 1; },
    done: onDone,
  });
}

// Run a chain of detonations with staggered FX. Each detonation registers
// its own FX animation; this orchestrator counts down `remaining` and
// invokes `onAllDone` once every FX has finished. Particles + shake +
// haptic fire alongside the FX so the player feels the impact.
function runDetonationSequence(detonations, onAllDone) {
  if (!detonations || detonations.length === 0) {
    if (onAllDone) onAllDone();
    return;
  }
  let remaining = detonations.length;
  const finish = () => { remaining--; if (remaining <= 0 && onAllDone) onAllDone(); };
  for (let i = 0; i < detonations.length; i++) {
    const det = detonations[i];
    const stagger = i * 90;
    setTimeout(() => {
      const cell = grid[det.r][det.c];
      const color = cell ? tileParticleColor(cell.type) : '#ffd864';
      if (det.sp === SP_ARROW_H) {
        shake(8, 350); haptic('heavy');
        startFXAnim('arrow_h', { epicenter: { r: det.r, c: det.c }, color }, finish);
        for (let cc = 0; cc < COLS; cc++) {
          const passDelay = Math.abs(cc - det.c) * 35;
          setTimeout(() => {
            spawnParticles(cc * CELL + CELL / 2, det.r * CELL + CELL / 2, color, 12, 1.3);
            spawnParticles(cc * CELL + CELL / 2, det.r * CELL + CELL / 2, '#ffffff', 6, 1.0);
          }, passDelay);
        }
      } else if (det.sp === SP_ARROW_V) {
        shake(8, 350); haptic('heavy');
        startFXAnim('arrow_v', { epicenter: { r: det.r, c: det.c }, color }, finish);
        for (let rr = 0; rr < ROWS; rr++) {
          const passDelay = Math.abs(rr - det.r) * 35;
          setTimeout(() => {
            spawnParticles(det.c * CELL + CELL / 2, rr * CELL + CELL / 2, color, 12, 1.3);
            spawnParticles(det.c * CELL + CELL / 2, rr * CELL + CELL / 2, '#ffffff', 6, 1.0);
          }, passDelay);
        }
      } else if (det.sp === SP_BOMB) {
        shake(14, 500); haptic('success');
        startFXAnim('bomb_blast', { epicenter: { r: det.r, c: det.c }, cells: det.cells, color }, finish);
        for (const key of det.cells) {
          const [rr, cc] = key.split(',').map(Number);
          const dist = Math.max(Math.abs(rr - det.r), Math.abs(cc - det.c));
          setTimeout(() => {
            spawnParticles(cc * CELL + CELL / 2, rr * CELL + CELL / 2, color, 14, 1.5);
            spawnParticles(cc * CELL + CELL / 2, rr * CELL + CELL / 2, '#ff9f5b', 8, 1.2);
          }, dist * 60);
        }
      } else if (det.sp === SP_LIGHTNING) {
        shake(10, 400); haptic('success');
        const targets = [];
        for (const key of det.cells) {
          const [rr, cc] = key.split(',').map(Number);
          if (rr !== det.r || cc !== det.c) targets.push({ r: rr, c: cc });
        }
        startFXAnim('lightning_strike', { epicenter: { r: det.r, c: det.c }, targets, color: '#9ad8ff' }, finish);
        for (const t of targets) {
          setTimeout(() => {
            spawnParticles(t.c * CELL + CELL / 2, t.r * CELL + CELL / 2, '#9ad8ff', 16, 1.6);
            spawnParticles(t.c * CELL + CELL / 2, t.r * CELL + CELL / 2, '#ffffff', 10, 1.4);
          }, 380);
        }
      } else {
        finish();
      }
    }, stagger);
  }
}
function trySwap(r1, c1, r2, c2) {
  if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) return false;
  const tmp = grid[r1][c1]; grid[r1][c1] = grid[r2][c2]; grid[r2][c2] = tmp;
  const m = findMatchesAndRuns();
  if (m.matched.size === 0) {
    const t2 = grid[r1][c1]; grid[r1][c1] = grid[r2][c2]; grid[r2][c2] = t2;
    return false;
  }
  return true;
}
function applyGravity() {
  const falls = [];
  for (let c = 0; c < COLS; c++) {
    let wr = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== null) {
        if (r !== wr) {
          falls.push({ col: c, fromRow: r, toRow: wr, tile: grid[r][c] });
          grid[wr][c] = grid[r][c]; grid[r][c] = null;
        }
        wr--;
      }
    }
    let spawnFrom = -1;
    for (let r = wr; r >= 0; r--) {
      const tl = pickReplenishTile();
      grid[r][c] = tl;
      falls.push({ col: c, fromRow: spawnFrom, toRow: r, tile: tl });
      spawnFrom--;
    }
  }
  return falls;
}
function hasPossibleMove() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tries = [[r, c, r, c + 1], [r, c, r + 1, c]];
    for (const tr of tries) {
      const a = tr[0], b = tr[1], x = tr[2], y = tr[3];
      if (x >= ROWS || y >= COLS) continue;
      const tmp = grid[a][b]; grid[a][b] = grid[x][y]; grid[x][y] = tmp;
      const m = findMatchesAndRuns();
      const t2 = grid[a][b]; grid[a][b] = grid[x][y]; grid[x][y] = t2;
      if (m.matched.size > 0) return true;
    }
  }
  return false;
}
function reshuffleGrid() {
  const all = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) all.push(grid[r][c]);
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = all[i]; all[i] = all[j]; all[j] = tmp;
  }
  for (let attempt = 0; attempt < 6; attempt++) {
    let idx = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = all[idx++];
    if (findMatchesAndRuns().matched.size === 0 && hasPossibleMove()) return;
    for (let i = all.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = all[i]; all[i] = all[j]; all[j] = tmp;
    }
  }
  spawnFreshGrid();
}

/* =========================================================
   [29] Resolve cascade + scoring + meter charge
   ========================================================= */

const game = { busy: false, selected: null, cascadeDepth: 0, cascadeMax: 0 };

function tileEmoji(type) {
  if (type < NUM_COLORS) return THEMES[state.theme].tiles[type];
  return TILE_EMOJI_FIXED[type] || '?';
}
function effectiveBet() {
  let idx = state.betIdx;
  if (idx < 0) idx = 0;
  if (idx >= BETS.length) idx = BETS.length - 1;
  return BETS[idx];
}

// =========================================================
// Animation-driven swap + cascade flow.
// Pattern (verbatim from Match Icon):
//   Swap forward (anim) → if no match: swap back (anim) → done
//                       → if match:  commit grid → processCascadeStep
//   processCascadeStep: find matches → score+particles → pop anim
//     → clear cells in grid → gravity (returns falls) → fall anim
//     → recurse processCascadeStep
// All grid mutations happen IN BETWEEN animations, never during them.
// =========================================================

function attemptSwap(r1, c1, r2, c2) {
  if (game.busy) return;

  // Booster: hammer — destroys a single tile, no swap, no energy.
  if (state.armed.hammer) {
    state.armed.hammer = false; setBoosterArmed('hammer', false);
    if (state.boost.hammer > 0) state.boost.hammer--;
    game.busy = true;
    haptic('heavy');
    startPopAnim([r1 + ',' + c1], () => {
      const cell = grid[r1][c1];
      if (cell) spawnParticles(c1 * CELL + CELL/2, r1 * CELL + CELL/2, tileParticleColor(cell.type), 14, 1.8);
      grid[r1][c1] = null;
      const falls = applyGravity();
      startFallAnim(falls, () => {
        game.cascadeDepth = 0; game.cascadeMax = 0;
        processCascadeStep(null, null);
      });
    });
    refreshAllUI();
    return;
  }
  if (state.armed.rocket) {
    state.armed.rocket = false; setBoosterArmed('rocket', false);
    if (state.boost.rocket > 0) state.boost.rocket--;
    game.busy = true;
    haptic('heavy'); shake(8, 280);
    const cells = [];
    for (let cc = 0; cc < COLS; cc++) cells.push(r1 + ',' + cc);
    for (let rr = 0; rr < ROWS; rr++) if (rr !== r1) cells.push(rr + ',' + c1);
    for (const key of cells) {
      const [r, c] = key.split(',').map(Number);
      const cell = grid[r][c];
      if (cell) spawnParticles(c * CELL + CELL/2, r * CELL + CELL/2, tileParticleColor(cell.type), 8, 1.4);
    }
    startPopAnim(cells, () => {
      for (const key of cells) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      const falls = applyGravity();
      startFallAnim(falls, () => {
        game.cascadeDepth = 0; game.cascadeMax = 0;
        processCascadeStep(null, null);
      });
    });
    refreshAllUI();
    return;
  }
  if (state.armed.bomb) {
    state.armed.bomb = false; setBoosterArmed('bomb', false);
    if (state.boost.bomb > 0) state.boost.bomb--;
    game.busy = true;
    haptic('heavy'); shake(10, 320);
    const cells = [];
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const rr = r1 + dr, cc = c1 + dc;
      if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) cells.push(rr + ',' + cc);
    }
    for (const key of cells) {
      const [r, c] = key.split(',').map(Number);
      const cell = grid[r][c];
      if (cell) spawnParticles(c * CELL + CELL/2, r * CELL + CELL/2, tileParticleColor(cell.type), 10, 1.6);
    }
    startPopAnim(cells, () => {
      for (const key of cells) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      const falls = applyGravity();
      startFallAnim(falls, () => {
        game.cascadeDepth = 0; game.cascadeMax = 0;
        processCascadeStep(null, null);
      });
    });
    refreshAllUI();
    return;
  }

  if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) return;

  const cellA = grid[r1][c1], cellB = grid[r2][c2];

  // Special-on-special combo — swap always valid, fires combo regardless of color.
  if (cellA && cellB && cellA.sp && cellB.sp) {
    const bet = effectiveBet();
    const energyCost = state.freeSpinsLeft > 0 ? 0 : bet.cost;
    if (state.energy < energyCost) {
      haptic('err'); toast(t('not_enough_energy'));
      flashEnergyEmpty();
      return;
    }
    if (state.freeSpinsLeft > 0) state.freeSpinsLeft--;
    else {
      state.energy -= energyCost;
      if (state.energy < state.energyMax && !state.energyRegenAt) state.energyRegenAt = Date.now() + ENERGY_REGEN_MS;
    }
    refreshEnergyUI();
    haptic('heavy');
    game.busy = true;
    grid[r1][c1] = cellB; grid[r2][c2] = cellA;
    const spA = cellA.sp, spB = cellB.sp;
    startSwapAnim(r1, c1, r2, c2, () => {
      triggerSpecialCombo(spA, spB, r2, c2, r1, c1);
    });
    return;
  }

  // Peek swap to detect a normal match.
  const a = cellA, b = cellB;
  grid[r1][c1] = b; grid[r2][c2] = a;
  const peek = findMatchesAndRuns();
  const willMatch = peek.matched.size > 0;
  // Also: swapping ANY tile into a special detonates the special at its
  // post-swap position even with no 3-match formed.
  const aIsSp = a && a.sp;
  const bIsSp = b && b.sp;
  let detonateOnly = null;
  if (!willMatch && (aIsSp || bIsSp)) {
    // The special, after swap, sits at the cell where it just moved to.
    detonateOnly = new Set();
    if (aIsSp) detonateOnly.add(r2 + ',' + c2);
    if (bIsSp) detonateOnly.add(r1 + ',' + c1);
  }

  if (!willMatch && !detonateOnly) {
    // Revert and bounce-back
    grid[r1][c1] = a; grid[r2][c2] = b;
    haptic('err');
    game.busy = true;
    grid[r1][c1] = b; grid[r2][c2] = a;
    startSwapAnim(r1, c1, r2, c2, () => {
      grid[r1][c1] = a; grid[r2][c2] = b;
      startSwapAnim(r1, c1, r2, c2, () => { game.busy = false; });
    });
    return;
  }

  // Energy / free-spin check — grid is currently in peek-swapped state.
  const bet = effectiveBet();
  const energyCost = state.freeSpinsLeft > 0 ? 0 : bet.cost;
  if (state.energy < energyCost) {
    grid[r1][c1] = a; grid[r2][c2] = b;
    haptic('err'); toast(t('not_enough_energy'));
    flashEnergyEmpty();
    return;
  }
  if (state.freeSpinsLeft > 0) state.freeSpinsLeft--;
  else {
    state.energy -= energyCost;
    if (state.energy < state.energyMax && !state.energyRegenAt) state.energyRegenAt = Date.now() + ENERGY_REGEN_MS;
  }
  refreshEnergyUI();

  // Animate swap (grid already in post-swap state), then resolve cascade.
  game.busy = true;
  const swapCells = new Set([r1 + ',' + c1, r2 + ',' + c2]);
  startSwapAnim(r1, c1, r2, c2, () => {
    game.cascadeDepth = 0; game.cascadeMax = 0;
    processCascadeStep(detonateOnly, swapCells);
  });
}

// processCascadeStep(seedMatched, swapCells)
//   seedMatched: optional Set of cell keys to treat as the initial match
//     (used when a swap into a special should detonate it without
//     forming a normal 3-match). Only honored on the FIRST step.
//   swapCells: optional Set of cell keys representing the swap origin
//     and destination — passed to plannedSpawns so specials prefer
//     to land at the swap location.
function processCascadeStep(seedMatched, swapCells) {
  let matched, runs, groups;
  if (seedMatched && seedMatched.size > 0) {
    matched = new Set(seedMatched);
    runs = [];
    groups = 1;
  } else {
    const result = findMatchesAndRuns();
    matched = result.matched;
    runs    = result.runs;
    groups  = result.groups;
  }

  if (matched.size === 0) {
    // Cascade chain ended.
    if (game.cascadeMax >= 2) {
      const labels = [null, null, 'NICE!', 'COMBO!', 'INSANE!', 'UNSTOPPABLE!', 'LEGENDARY!'];
      const label = labels[Math.min(game.cascadeMax, labels.length - 1)] || 'LEGENDARY!';
      showComboOverlay(label);
    }
    if (state.meter.shield >= METER_CAP) {
      state.shieldsStocked = Math.min(3, state.shieldsStocked + 1);
      state.meter.shield = 0;
      toast(t('shield_ok')); haptic('success');
    }
    if (!hasPossibleMove()) {
      toast(t('no_more_moves'));
      setTimeout(() => { reshuffleGrid(); game.busy = false; refreshAllUI(); }, 450);
      return;
    }
    if (TG && TG.initData) {
      fetch('/api/score/submit', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: TG.initData, score: state.vaultLifetimeCoins, mode: 'regular' }),
      }).catch(() => {});
    }
    saveState();
    refreshAllUI();
    game.busy = false;
    return;
  }

  game.cascadeDepth++;
  game.cascadeMax = Math.max(game.cascadeMax, game.cascadeDepth);
  if (game.cascadeDepth > state.bestCascadeEver) state.bestCascadeEver = game.cascadeDepth;
  state.totalMatchesEver += groups;

  // Spawn rules: 4-in-line / T-L / 5-in-line transform one cell into a special.
  const spawns = plannedSpawns(runs, swapCells);
  const spawnKeys = new Set();
  for (const sp of spawns) spawnKeys.add(sp.r + ',' + sp.c);

  // Expand with detonations from any specials in the matched set.
  const det = expandWithDetonations(matched);
  const toClear = det.toClear;
  const detonations = det.detonations;

  // Spawn cells SURVIVE (they transmute into specials, not cleared).
  for (const key of spawnKeys) toClear.delete(key);

  scoreMatchedCells(toClear);

  const popList = [];
  for (const k of toClear) popList.push(k);

  // Detonation FX run FIRST so the player sees the beam / explosion /
  // lightning bolt before the cells vanish. Pop animation chases the FX,
  // then the grid clears, specials spawn, gravity drops new tiles.
  runDetonationSequence(detonations, () => {
    startPopAnim(popList, () => {
      for (const key of toClear) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      for (const sp of spawns) {
        grid[sp.r][sp.c] = makeCell(sp.type, sp.sp);
      }
      const falls = applyGravity();
      startFallAnim(falls, () => processCascadeStep(null, null));
    });
  });
}

function scoreMatchedCells(cells) {
  const mult = CASCADE_MULT[Math.min(game.cascadeDepth, CASCADE_MULT.length - 1)];
  const bet = effectiveBet();
  let stepCoins = 0;
  const chargeAdd = { hammer: 0, pig: 0, shield: 0 };
  let starCount = 0;
  for (const key of cells) {
    const [r, c] = key.split(',').map(Number);
    const cell = grid[r][c];
    if (!cell) continue;
    const type = cell.type;
    // Specials are worth more — extra reward for chaining detonations.
    const spBonus = cell.sp ? 4 : 1;
    const cellVal = (TILE_VALUE[type] || 1) * spBonus;
    const earn = cellVal * bet.mult * mult;
    stepCoins += earn;
    spawnScoreFly(c, r, '+' + Math.floor(earn));
    const px = c * CELL + CELL / 2;
    const py = r * CELL + CELL / 2;
    spawnParticles(px, py, tileParticleColor(type), 12, 1.8);
    spawnParticles(px, py, '#ffffff', 5, 1.4);
    if (type === TILE.HAMMER)      chargeAdd.hammer++;
    else if (type === TILE.PIG)    chargeAdd.pig++;
    else if (type === TILE.SHIELD) chargeAdd.shield++;
    else if (type === TILE.STAR)   starCount++;
  }
  const chargeMult = Math.max(1, Math.floor(mult * 0.5 + bet.mult * 0.5));
  const earnedInt = Math.floor(stepCoins);
  state.coins += earnedInt;
  state.totalGoldEarnedEver += earnedInt;
  state.vaultLifetimeCoins += earnedInt;
  state.lastMatchGold = earnedInt;
  state.meter.hammer = Math.min(METER_CAP, state.meter.hammer + chargeAdd.hammer * chargeMult);
  state.meter.pig    = Math.min(METER_CAP, state.meter.pig    + chargeAdd.pig    * chargeMult);
  state.meter.shield = Math.min(METER_CAP, state.meter.shield + chargeAdd.shield * chargeMult);
  if (starCount > 0) {
    const burst = 5 * starCount;
    state.meter.hammer = Math.min(METER_CAP, state.meter.hammer + burst);
    state.meter.pig    = Math.min(METER_CAP, state.meter.pig    + burst);
    state.meter.shield = Math.min(METER_CAP, state.meter.shield + burst);
  }
  if (game.cascadeDepth === 1)      haptic('tap');
  else if (game.cascadeDepth === 2) haptic('med');
  else if (game.cascadeDepth === 3) { haptic('heavy'); shake(4, 180); }
  else if (game.cascadeDepth >= 4)  {
    haptic('success'); shake(8, 280);
    flashScreen('rgba(255,216,100,0.35)', 0.4, 260);
    // Confetti rains down for MEGA cascades (depth 4+). 40 paper bits
    // for depth-4, more for deeper chains.
    spawnConfetti(30 + game.cascadeDepth * 8);
  }
  bumpScore();
  refreshGoldUI();
  refreshMetersUI();
  refreshLastMatch();
}

// triggerSpecialCombo: ported from Match Icon. The combo FX plays first
// (full beam / explosion / lightning visual), then damage applies once
// the FX finishes — shake + flash + particles + score + pop.
function triggerSpecialCombo(spA, spB, epR, epC, otherR, otherC) {
  const cells = comboCells(spA, spB, epR, epC, otherR, otherC);
  cells.add(epR + ',' + epC);
  cells.add(otherR + ',' + otherC);
  const classA = spClass(spA);
  const classB = spClass(spB);
  const types = [classA, classB].sort().join('+');

  // Subtype for arrow+arrow tells the FX which beam pair to draw
  // (V+V parallel columns / H+H parallel rows / mixed plus-cross).
  let subtype = null;
  if (types === 'arrow+arrow') {
    const aV = spA === SP_ARROW_V, bV = spB === SP_ARROW_V;
    const aH = spA === SP_ARROW_H, bH = spB === SP_ARROW_H;
    if (aV && bV) subtype = 'vv';
    else if (aH && bH) subtype = 'hh';
    else subtype = 'hv';
  }

  const sourceCell = grid[epR][epC];
  const comboColor = sourceCell ? tileParticleColor(sourceCell.type) : '#ffd864';
  haptic('heavy');

  startFXAnim('combo_' + types, {
    epicenter: { r: epR, c: epC },
    other:     { r: otherR, c: otherC },
    cells: cells,
    color: comboColor,
    subtype: subtype,
  }, () => {
    // FX done — apply the actual damage now.
    shake(18, 500);
    flashScreen('rgba(255,255,255,0.55)', 0.55, 220);
    haptic('success');
    for (const key of cells) {
      const [r, c] = key.split(',').map(Number);
      const cell = grid[r][c];
      if (cell) {
        spawnParticles(c * CELL + CELL / 2, r * CELL + CELL / 2, tileParticleColor(cell.type), 16, 2.0);
        spawnParticles(c * CELL + CELL / 2, r * CELL + CELL / 2, '#ffffff', 8, 1.6);
      }
    }
    game.cascadeDepth = 1;
    game.cascadeMax = Math.max(game.cascadeMax, 1);
    scoreMatchedCells(cells);
    const popList = [];
    for (const k of cells) popList.push(k);
    startPopAnim(popList, () => {
      for (const key of cells) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      const falls = applyGravity();
      startFallAnim(falls, () => processCascadeStep(null, null));
    });
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

/* =========================================================
   [30] Render — emoji tiles on dark canvas
   ========================================================= */

// Animation-aware render. Reads grid + active animations + particles every
// frame. Cells participating in an active swap/fall are skipped from the
// static draw and drawn separately at their interpolated positions.
// Pop animations apply to cells still in the grid (scale + alpha down).
function render() {
  if (!ctx) return;
  const cssW = COLS * CELL;
  const cssH = ROWS * CELL;
  ctx.clearRect(0, 0, cssW, cssH);

  // Screen shake for big hits
  const off = getShakeOffset();
  ctx.save();
  ctx.translate(off.x, off.y);

  // Backdrop
  ctx.fillStyle = '#0e0820';
  ctx.fillRect(-20, -20, cssW + 40, cssH + 40);

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let c = 1; c < COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * CELL + 0.5, 0);
    ctx.lineTo(c * CELL + 0.5, cssH);
    ctx.stroke();
  }
  for (let r = 1; r < ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * CELL + 0.5);
    ctx.lineTo(cssW, r * CELL + 0.5);
    ctx.stroke();
  }

  // Build skip set: which (r,c) cells are being animated by swap/fall and
  // therefore should NOT be drawn at their grid position.
  const skip = new Set();
  for (const a of animations) {
    if (a.type === 'swap') {
      skip.add(a.r1 + ',' + a.c1);
      skip.add(a.r2 + ',' + a.c2);
    } else if (a.type === 'fall') {
      for (const f of a.falls) skip.add(f.toRow + ',' + f.col);
    }
  }

  // Static tiles — drawn at grid position, with pop scale/alpha if applicable
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (skip.has(r + ',' + c)) continue;
      const cell = grid[r][c];
      if (!cell) continue;
      let scale = 1, alpha = 1;
      for (const a of animations) {
        if (a.type === 'pop' && a.cells.indexOf(r + ',' + c) !== -1) {
          const p = easeOut(a.p);
          scale = 1 - p;
          alpha = 1 - p;
        }
      }
      drawTileAt(cell, c * CELL, r * CELL, scale, alpha);
    }
  }

  // Animated tiles — swap + fall + fx
  for (const a of animations) {
    if (a.type === 'swap') {
      const p = easeInOut(a.p);
      const t1 = grid[a.r1][a.c1];
      const t2 = grid[a.r2][a.c2];
      const x1a = a.c1 * CELL, y1a = a.r1 * CELL;
      const x2a = a.c2 * CELL, y2a = a.r2 * CELL;
      if (t1) drawTileAt(t1, x1a + (x2a - x1a) * p, y1a + (y2a - y1a) * p, 1, 1);
      if (t2) drawTileAt(t2, x2a + (x1a - x2a) * p, y2a + (y1a - y2a) * p, 1, 1);
    } else if (a.type === 'fall') {
      const p = easeOut(a.p);
      for (const f of a.falls) {
        const x = f.col * CELL;
        const y = f.fromRow * CELL + (f.toRow - f.fromRow) * CELL * p;
        if (f.tile) drawTileAt(f.tile, x, y, 1, 1);
      }
    } else if (a.type === 'fx') {
      drawFX(a);
    }
  }

  // Selection ring on top
  if (game.selected) {
    const r = game.selected.r, c = game.selected.c;
    // Don't show ring if that cell is being animated (it'd float on empty)
    if (!skip.has(r + ',' + c)) {
      const x = c * CELL, y = r * CELL;
      ctx.save();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#ffd864';
      ctx.shadowColor = '#ffd864';
      ctx.shadowBlur = 14;
      const pad = 3;
      roundRectPath(x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, CELL * 0.16);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Booster armed — draw per-tile target reticles so the player sees
  // exactly which cells can be tapped. Corner brackets on every live
  // tile, color-coded by booster, pulsing in sync. Plus a tinted dashed
  // canvas border as the "armed mode" frame.
  if (state.armed.hammer || state.armed.rocket || state.armed.bomb) {
    let reticleColor, frameColor;
    if (state.armed.hammer)      { reticleColor = '#ff8c3a'; frameColor = '#ff8c3a'; }
    else if (state.armed.rocket) { reticleColor = '#4fb2ff'; frameColor = '#4fb2ff'; }
    else                         { reticleColor = '#ff5c7a'; frameColor = '#ff5c7a'; }
    const pulse = 0.55 + 0.45 * Math.sin(now() / 200);
    // Per-tile corner-bracket reticle (skip cells in active anims so we
    // don't draw a reticle on a tile mid-swap/fall).
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!grid[r][c]) continue;
        if (skip.has(r + ',' + c)) continue;
        drawTargetReticle(c * CELL, r * CELL, reticleColor, pulse);
      }
    }
    // Dashed armed-mode frame around the whole board
    ctx.save();
    ctx.strokeStyle = hexToRgba(frameColor, 0.6 + 0.4 * Math.sin(now() / 200));
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.lineDashOffset = -(now() / 40) % 14;
    ctx.shadowColor = frameColor;
    ctx.shadowBlur = 12;
    roundRectPath(2, 2, cssW - 4, cssH - 4, 10);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
    ctx.restore();
  }

  drawParticles();
  ctx.restore();
}

// Draw a single tile (cell object {type, sp, mod}) at canvas coords with
// scale + alpha. Specials get a colored plate with arrow/bomb/lightning
// icon overlay; regular cells use the cached emoji sprite.
function drawTileAt(cell, x, y, scale, alpha) {
  if (!cell || scale <= 0 || alpha <= 0) return;
  const cx = x + CELL / 2;
  const cy = y + CELL / 2;
  if (alpha !== 1) ctx.globalAlpha = alpha;

  if (cell.sp) {
    drawSpecialTile(cx, cy, CELL * 0.40 * scale, cell, alpha);
  } else {
    const size = CELL * 0.78 * scale;
    drawEmojiSprite(ctx, tileEmoji(cell.type), cx, cy, size);
  }

  if (alpha !== 1) ctx.globalAlpha = 1;
}

// Special-piece rendering — colored plate in the tile's accent color with
// a pulsing glow and a white vector icon (arrow / bomb / lightning) on top.
function drawSpecialTile(cx, cy, r, cell, alpha) {
  const pulse = 0.88 + 0.12 * Math.sin(now() / 220);
  const tileR = r * 1.08 * pulse;
  const color = tileParticleColor(cell.type);

  // Drop shadow
  ctx.save();
  ctx.translate(0, r * 0.16);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.fill();
  ctx.restore();

  // Outer color glow
  ctx.save();
  ctx.globalAlpha = (alpha || 1) * 0.7 * pulse;
  ctx.fillStyle = color;
  roundedSquare(cx, cy, tileR * 1.18, tileR * 0.32);
  ctx.fill();
  ctx.restore();

  // Solid colored plate
  ctx.fillStyle = color;
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.fill();

  // Bottom darken
  ctx.save();
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.clip();
  const dg = ctx.createLinearGradient(cx, cy, cx, cy + tileR);
  dg.addColorStop(0, 'rgba(0,0,0,0)');
  dg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = dg;
  ctx.fillRect(cx - tileR, cy - tileR, tileR * 2, tileR * 2);
  ctx.restore();

  // Outline
  ctx.strokeStyle = darkenColor(color);
  ctx.lineWidth = Math.max(2, r * 0.10);
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.stroke();

  // Top gloss
  ctx.save();
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.clip();
  const gloss = ctx.createLinearGradient(cx, cy - tileR, cx, cy - tileR * 0.2);
  gloss.addColorStop(0, 'rgba(255,255,255,0.45)');
  gloss.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gloss;
  ctx.fillRect(cx - tileR, cy - tileR, tileR * 2, tileR * 0.9);
  ctx.restore();

  // Icon: shadow first then white
  ctx.save();
  ctx.translate(1.5, 1.5);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  drawSpecialIcon(cell.sp, cx, cy, r);
  ctx.restore();
  ctx.fillStyle = '#ffffff';
  drawSpecialIcon(cell.sp, cx, cy, r);
}

function drawSpecialIcon(sp, cx, cy, r) {
  if (sp === SP_ARROW_H)      drawHorizArrowIcon(cx, cy, r * 0.78);
  else if (sp === SP_ARROW_V) drawVertArrowIcon(cx, cy, r * 0.78);
  else if (sp === SP_BOMB)    drawBombIcon(cx, cy, r * 0.70);
  else if (sp === SP_LIGHTNING) drawLightningIcon(cx, cy, r * 0.78);
}
function drawHorizArrowIcon(cx, cy, r) {
  const bodyW = r * 1.6, bodyH = r * 0.35, headSize = r * 0.55;
  ctx.beginPath();
  ctx.moveTo(cx - bodyW/2 - headSize*0.2, cy);
  ctx.lineTo(cx - bodyW/2 + headSize*0.4, cy - headSize/1.8);
  ctx.lineTo(cx - bodyW/2 + headSize*0.4, cy - bodyH/2);
  ctx.lineTo(cx + bodyW/2 - headSize*0.4, cy - bodyH/2);
  ctx.lineTo(cx + bodyW/2 - headSize*0.4, cy - headSize/1.8);
  ctx.lineTo(cx + bodyW/2 + headSize*0.2, cy);
  ctx.lineTo(cx + bodyW/2 - headSize*0.4, cy + headSize/1.8);
  ctx.lineTo(cx + bodyW/2 - headSize*0.4, cy + bodyH/2);
  ctx.lineTo(cx - bodyW/2 + headSize*0.4, cy + bodyH/2);
  ctx.lineTo(cx - bodyW/2 + headSize*0.4, cy + headSize/1.8);
  ctx.closePath();
  ctx.fill();
}
function drawVertArrowIcon(cx, cy, r) {
  const bodyH = r * 1.6, bodyW = r * 0.35, headSize = r * 0.55;
  ctx.beginPath();
  ctx.moveTo(cx, cy - bodyH/2 - headSize*0.2);
  ctx.lineTo(cx + headSize/1.8, cy - bodyH/2 + headSize*0.4);
  ctx.lineTo(cx + bodyW/2, cy - bodyH/2 + headSize*0.4);
  ctx.lineTo(cx + bodyW/2, cy + bodyH/2 - headSize*0.4);
  ctx.lineTo(cx + headSize/1.8, cy + bodyH/2 - headSize*0.4);
  ctx.lineTo(cx, cy + bodyH/2 + headSize*0.2);
  ctx.lineTo(cx - headSize/1.8, cy + bodyH/2 - headSize*0.4);
  ctx.lineTo(cx - bodyW/2, cy + bodyH/2 - headSize*0.4);
  ctx.lineTo(cx - bodyW/2, cy - bodyH/2 + headSize*0.4);
  ctx.lineTo(cx - headSize/1.8, cy - bodyH/2 + headSize*0.4);
  ctx.closePath();
  ctx.fill();
}
function drawBombIcon(cx, cy, r) {
  // Bomb body
  ctx.beginPath();
  ctx.arc(cx, cy + r * 0.1, r * 0.85, 0, Math.PI * 2);
  ctx.fill();
  // Highlight
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.arc(cx - r * 0.3, cy - r * 0.2, r * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // Fuse
  ctx.save();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = Math.max(1.5, r * 0.12);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + r * 0.3, cy - r * 0.55);
  ctx.quadraticCurveTo(cx + r * 0.6, cy - r * 0.95, cx + r * 0.45, cy - r * 1.05);
  ctx.stroke();
  ctx.restore();
  // Fuse spark
  ctx.save();
  ctx.fillStyle = '#ffd864';
  ctx.beginPath();
  ctx.arc(cx + r * 0.45, cy - r * 1.05, r * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}
function drawLightningIcon(cx, cy, r) {
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.05, cy - r * 0.95);
  ctx.lineTo(cx - r * 0.65, cy + r * 0.1);
  ctx.lineTo(cx - r * 0.2,  cy + r * 0.1);
  ctx.lineTo(cx - r * 0.4,  cy + r * 0.95);
  ctx.lineTo(cx + r * 0.65, cy - r * 0.15);
  ctx.lineTo(cx + r * 0.15, cy - r * 0.15);
  ctx.lineTo(cx + r * 0.45, cy - r * 0.95);
  ctx.closePath();
  ctx.fill();
}
function roundedSquare(cx, cy, halfSize, radius) {
  const x = cx - halfSize, y = cy - halfSize;
  const w = halfSize * 2;
  ctx.beginPath();
  if (typeof ctx.roundRect === 'function') {
    ctx.roundRect(x, y, w, w, radius);
  } else {
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + w - radius);
    ctx.quadraticCurveTo(x + w, y + w, x + w - radius, y + w);
    ctx.lineTo(x + radius, y + w);
    ctx.quadraticCurveTo(x, y + w, x, y + w - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
  }
}
// Booster target reticle — corner brackets at the 4 corners of a tile
// with a thin center crosshair. Pulses with the global armed pulse so
// every tile breathes in sync.
function drawTargetReticle(x, y, color, pulse) {
  const cx = x + CELL / 2;
  const cy = y + CELL / 2;
  const inset = CELL * 0.10;
  const len = CELL * 0.22;
  ctx.save();
  ctx.strokeStyle = hexToRgba(color, 0.55 + 0.35 * pulse);
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.shadowColor = color;
  ctx.shadowBlur = 8 * pulse;
  // Top-left
  ctx.beginPath();
  ctx.moveTo(x + inset, y + inset + len); ctx.lineTo(x + inset, y + inset); ctx.lineTo(x + inset + len, y + inset);
  ctx.stroke();
  // Top-right
  ctx.beginPath();
  ctx.moveTo(x + CELL - inset - len, y + inset); ctx.lineTo(x + CELL - inset, y + inset); ctx.lineTo(x + CELL - inset, y + inset + len);
  ctx.stroke();
  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(x + inset, y + CELL - inset - len); ctx.lineTo(x + inset, y + CELL - inset); ctx.lineTo(x + inset + len, y + CELL - inset);
  ctx.stroke();
  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(x + CELL - inset - len, y + CELL - inset); ctx.lineTo(x + CELL - inset, y + CELL - inset); ctx.lineTo(x + CELL - inset, y + CELL - inset - len);
  ctx.stroke();
  // Tiny center crosshair
  ctx.strokeStyle = hexToRgba(color, 0.4 + 0.3 * pulse);
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 0;
  const cr = CELL * 0.06;
  ctx.beginPath();
  ctx.moveTo(cx - cr, cy); ctx.lineTo(cx + cr, cy);
  ctx.moveTo(cx, cy - cr); ctx.lineTo(cx, cy + cr);
  ctx.stroke();
  ctx.restore();
}

function darkenColor(hex) {
  if (!hex || hex[0] !== '#' || hex.length < 7) return '#000000';
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const dr = Math.max(0, Math.floor(r * 0.45));
  const dg = Math.max(0, Math.floor(g * 0.45));
  const db = Math.max(0, Math.floor(b * 0.45));
  return '#' + dr.toString(16).padStart(2, '0') + dg.toString(16).padStart(2, '0') + db.toString(16).padStart(2, '0');
}

// =========================================================
// drawFX — dispatches on a.kind to render the active FX animation
// for this frame. Ported verbatim from Match Icon's drawFX. Each
// kind has its own multi-phase visual (charge → main → fade).
// Called from render()'s animations loop when a.type === 'fx'.
// =========================================================
function drawFX(a) {
  const p = a.p;

  if (a.kind === 'arrow_h') {
    // Horizontal arrow — light streak races outward along the row.
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const arrowColor = a.payload.color || '#ffd864';
    const reach = easeOut(p) * (COLS * CELL);
    ctx.save();
    const grad = ctx.createLinearGradient(ex - reach, ey, ex + reach, ey);
    const fade = 1 - p * 0.6;
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, hexToRgba(arrowColor, fade));
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, ey - CELL * 0.45, COLS * CELL, CELL * 0.9);
    ctx.fillStyle = 'rgba(255,255,255,' + fade + ')';
    ctx.fillRect(0, ey - CELL * 0.12, COLS * CELL, CELL * 0.24);
    for (const dir of [-1, 1]) {
      const tipX = ex + dir * reach;
      const grad2 = ctx.createRadialGradient(tipX, ey, 0, tipX, ey, CELL * 0.6);
      grad2.addColorStop(0, 'rgba(255,255,255,' + fade + ')');
      grad2.addColorStop(0.4, hexToRgba(arrowColor, fade * 0.7));
      grad2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath(); ctx.arc(tipX, ey, CELL * 0.6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'arrow_v') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const arrowColor = a.payload.color || '#ffd864';
    const reach = easeOut(p) * (ROWS * CELL);
    ctx.save();
    const grad = ctx.createLinearGradient(ex, ey - reach, ex, ey + reach);
    const fade = 1 - p * 0.6;
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, hexToRgba(arrowColor, fade));
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(ex - CELL * 0.45, 0, CELL * 0.9, ROWS * CELL);
    ctx.fillStyle = 'rgba(255,255,255,' + fade + ')';
    ctx.fillRect(ex - CELL * 0.12, 0, CELL * 0.24, ROWS * CELL);
    for (const dir of [-1, 1]) {
      const tipY = ey + dir * reach;
      const grad2 = ctx.createRadialGradient(ex, tipY, 0, ex, tipY, CELL * 0.6);
      grad2.addColorStop(0, 'rgba(255,255,255,' + fade + ')');
      grad2.addColorStop(0.4, hexToRgba(arrowColor, fade * 0.7));
      grad2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath(); ctx.arc(ex, tipY, CELL * 0.6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'bomb_blast') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const bombColor = a.payload.color || '#ff6a3e';
    const cells = a.payload.cells;
    ctx.save();
    // Phase 1: per-cell white outlines mark the blast zone
    if (p < 0.4) {
      const previewA = (p < 0.25 ? p / 0.25 : 1 - (p - 0.25) / 0.15);
      const pulse = 0.7 + 0.3 * Math.sin(p * 22);
      const fillA = previewA * 0.55 * pulse;
      const strokeA = Math.min(1, previewA * 1.2);
      ctx.lineWidth = 3;
      if (cells && cells.size) {
        for (const key of cells) {
          const [rr, cc] = key.split(',').map(Number);
          const tx = cc * CELL, ty = rr * CELL;
          ctx.fillStyle = hexToRgba(bombColor, fillA);
          ctx.fillRect(tx + 2, ty + 2, CELL - 4, CELL - 4);
          ctx.strokeStyle = hexToRgba('#ffffff', strokeA);
          ctx.strokeRect(tx + 2, ty + 2, CELL - 4, CELL - 4);
        }
      }
    }
    // Phase 2: fireball at epicenter
    if (p >= 0.2 && p <= 0.7) {
      const fireP = (p - 0.2) / 0.5;
      const fireR = easeOut(fireP) * CELL * 1.6;
      const fireA = (1 - fireP) * 0.95;
      const fg = ctx.createRadialGradient(ex, ey, 0, ex, ey, fireR);
      fg.addColorStop(0, 'rgba(255,255,255,' + fireA + ')');
      fg.addColorStop(0.25, 'rgba(255,240,180,' + fireA * 0.95 + ')');
      fg.addColorStop(0.55, hexToRgba(bombColor, fireA * 0.9));
      fg.addColorStop(0.85, hexToRgba(bombColor, fireA * 0.4));
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(ex - fireR, ey - fireR, fireR * 2, fireR * 2);
    }
    // Phase 3: 4 shockwave rings
    for (let i = 0; i < 4; i++) {
      const ringStart = i * 0.10;
      const ringDur = 0.55;
      const ringP = Math.max(0, Math.min(1, (p - ringStart) / ringDur));
      if (ringP <= 0 || ringP >= 1) continue;
      const radius = easeOut(ringP) * CELL * 3.0;
      const alpha = (1 - ringP) * 0.9;
      ctx.strokeStyle = hexToRgba(i === 0 ? '#ffffff' : (i === 1 ? '#fff5b0' : bombColor), alpha);
      ctx.lineWidth = (5 - i) * 2;
      ctx.beginPath(); ctx.arc(ex, ey, radius, 0, Math.PI * 2); ctx.stroke();
    }
    // Phase 4: debris arcs
    if (p > 0.15) {
      const debrisP = (p - 0.15) / 0.85;
      for (let i = 0; i < 14; i++) {
        const ang = (i / 14) * Math.PI * 2 + i * 0.4;
        for (let s = 0; s < 3; s++) {
          const sP = Math.max(0, debrisP - s * 0.06);
          if (sP <= 0) continue;
          const sDist = sP * CELL * 2.2;
          const sArc = Math.sin(sP * Math.PI) * CELL * 0.6;
          const sx = ex + Math.cos(ang) * sDist;
          const sy = ey + Math.sin(ang) * sDist - sArc;
          const sz = CELL * 0.16 * (1 - debrisP * 0.6) * (1 - s * 0.3);
          const sa = (1 - debrisP) * (1 - s * 0.25);
          ctx.fillStyle = hexToRgba(s === 0 ? '#fff5b0' : bombColor, sa);
          ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
    // Phase 5: smoke clouds
    if (p > 0.4) {
      const smokeP = (p - 0.4) / 0.6;
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2 + 0.2;
        const dist = smokeP * CELL * 1.4;
        const sx = ex + Math.cos(ang) * dist;
        const sy = ey + Math.sin(ang) * dist - smokeP * 8;
        const sz = CELL * 0.5 * (0.7 + smokeP * 0.5);
        const sa = (1 - smokeP) * 0.35;
        ctx.fillStyle = 'rgba(60,40,30,' + sa + ')';
        ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'lightning_strike') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const targets = a.payload.targets || [];
    const litColor = a.payload.color || '#9ad8ff';
    ctx.save();
    const strikePhase = Math.min(1, p / 0.35);
    const fadePhase = Math.max(0, (p - 0.35) / 0.65);
    // Source pulse
    if (p < 0.6) {
      const pulseA = Math.max(0, 1 - p / 0.6);
      const pulseR = CELL * (0.55 + 0.15 * Math.sin(p * 40));
      const pg = ctx.createRadialGradient(ex, ey, 0, ex, ey, pulseR);
      pg.addColorStop(0, 'rgba(255,255,255,' + pulseA + ')');
      pg.addColorStop(0.4, hexToRgba(litColor, pulseA * 0.9));
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.fillRect(ex - pulseR, ey - pulseR, pulseR * 2, pulseR * 2);
    }
    for (const tg of targets) {
      const tx = tg.c * CELL + CELL / 2;
      const ty = tg.r * CELL + CELL / 2;
      const reach = strikePhase;
      const endX = ex + (tx - ex) * reach;
      const endY = ey + (ty - ey) * reach;
      const segments = 10;
      const pts = [[ex, ey]];
      for (let i = 1; i < segments; i++) {
        const u = i / segments;
        const baseX = ex + (endX - ex) * u;
        const baseY = ey + (endY - ey) * u;
        const seed1 = Math.sin((tg.r * 13 + tg.c * 7 + i * 3.1) * 2.3);
        const seed2 = Math.sin((tg.r * 11 + tg.c * 5 + i * 4.7) * 1.9);
        const dx = tx - ex, dy = ty - ey;
        const nrm = Math.hypot(dx, dy) || 1;
        const perpX = -dy / nrm * seed1 * CELL * 0.3;
        const perpY = dx / nrm * seed1 * CELL * 0.3;
        const alongX = dx / nrm * seed2 * CELL * 0.08;
        const alongY = dy / nrm * seed2 * CELL * 0.08;
        pts.push([baseX + perpX + alongX, baseY + perpY + alongY]);
      }
      pts.push([endX, endY]);
      const boltAlpha = 1 - fadePhase;
      // Outer glow
      ctx.strokeStyle = hexToRgba(litColor, boltAlpha * 0.4);
      ctx.lineWidth = 16; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let i = 0; i < pts.length; i++) {
        if (i === 0) ctx.moveTo(pts[i][0], pts[i][1]);
        else ctx.lineTo(pts[i][0], pts[i][1]);
      }
      ctx.stroke();
      // Mid glow
      ctx.strokeStyle = hexToRgba(litColor, boltAlpha * 0.85);
      ctx.lineWidth = 8;
      ctx.beginPath();
      for (let i = 0; i < pts.length; i++) {
        if (i === 0) ctx.moveTo(pts[i][0], pts[i][1]);
        else ctx.lineTo(pts[i][0], pts[i][1]);
      }
      ctx.stroke();
      // Inner core
      ctx.strokeStyle = 'rgba(255,255,255,' + boltAlpha + ')';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < pts.length; i++) {
        if (i === 0) ctx.moveTo(pts[i][0], pts[i][1]);
        else ctx.lineTo(pts[i][0], pts[i][1]);
      }
      ctx.stroke();
      // Branches
      if (strikePhase > 0.5 && fadePhase < 0.5) {
        ctx.strokeStyle = hexToRgba(litColor, (1 - fadePhase) * 0.7);
        ctx.lineWidth = 2;
        for (let i = 2; i < pts.length - 1; i += 2) {
          const branchSeed = Math.sin((tg.r * 17 + tg.c * 11 + i * 5.7) * 1.7);
          if (branchSeed < 0) continue;
          const px = pts[i][0], py = pts[i][1];
          const dx = tx - ex, dy = ty - ey;
          const nrm = Math.hypot(dx, dy) || 1;
          const perpX = -dy / nrm * branchSeed * CELL * 0.5;
          const perpY = dx / nrm * branchSeed * CELL * 0.5;
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(px + perpX, py + perpY);
          ctx.stroke();
        }
      }
      // Target ring
      if (strikePhase >= 0.95) {
        const ringA = 1 - fadePhase;
        const ringR = CELL * (0.5 + fadePhase * 0.4);
        ctx.strokeStyle = hexToRgba(litColor, ringA);
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(tx, ty, ringR, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,' + ringA + ')';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(tx, ty, ringR * 0.6, 0, Math.PI * 2); ctx.stroke();

        sg.addColorStop(1, 'rgba(0,0,0,0)');

        ctx.beginPath(); ctx.arc(tx, ty, CELL * 0.5, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_arrow+arrow') {
    const ep = a.payload.epicenter;
    const oth = a.payload.other || ep;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const ox = oth.c * CELL + CELL / 2;
    const oy = oth.r * CELL + CELL / 2;
    const color = a.payload.color || '#ffd864';
    const subtype = a.payload.subtype || 'hv';
    ctx.save();
    if (p < 0.25) {
      const cp = p / 0.25;
      const rad = cp * CELL * 1.2;
      const cg = ctx.createRadialGradient(ex, ey, 0, ex, ey, rad);
      cg.addColorStop(0, 'rgba(255,255,255,1)');
      cg.addColorStop(0.5, hexToRgba(color, 0.9));
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.fillRect(ex - rad, ey - rad, rad * 2, rad * 2);

      const sp = Math.min(1, (p - 0.25) / 0.45);

      const reach = easeOut(sp);
      const drawHBeam = (cy) => {
        const hLen = reach * COLS * CELL;

        ctx.fillRect(cx - CELL * 0.12, 0, CELL * 0.24, ROWS * CELL);

      if (subtype === 'vv') { drawVBeam(ex); drawVBeam(ox); }
      else if (subtype === 'hh') { drawHBeam(ey); drawHBeam(oy); }
      else { drawHBeam(ey); drawVBeam(ex); }
      const novaR = CELL * 1.2;
      const ng = ctx.createRadialGradient(ex, ey, 0, ex, ey, novaR);
      ng.addColorStop(0, 'rgba(255,255,255,' + fade + ')');
      ng.addColorStop(0.5, hexToRgba(color, fade * 0.8));
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ng;
      ctx.fillRect(ex - novaR, ey - novaR, novaR * 2, novaR * 2);
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_arrow+bomb') {
    const ep = a.payload.epicenter;

    const ey = ep.r * CELL + CELL / 2;

        grad.addColorStop(0.5, hexToRgba(color, fade));
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, ry - CELL * 0.45, COLS * CELL, CELL * 0.9);
        ctx.fillStyle = 'rgba(255,255,255,' + fade * 0.8 + ')';
        ctx.fillRect(0, ry - CELL * 0.1, COLS * CELL, CELL * 0.2);
      }
    } else {
      const arr = []; for (const c of cols) arr.push(c); arr.sort((a, b) => a - b);
      for (const cc of arr) {
        const cx = cc * CELL + CELL / 2;
        const reach = easeOut(sweepP) * ROWS * CELL;
        const grad = ctx.createLinearGradient(cx, ey - reach, cx, ey + reach);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.5, hexToRgba(color, fade));
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;

        ctx.fillStyle = 'rgba(255,255,255,' + fade * 0.8 + ')';
        ctx.fillRect(cx - CELL * 0.1, 0, CELL * 0.2, ROWS * CELL);
      }
    }

      const fireA = (1 - expP) * 0.9;
      const fg = ctx.createRadialGradient(ex, ey, 0, ex, ey, fireR);

      fg.addColorStop(0.5, hexToRgba(color, fireA * 0.8));
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(ex - fireR, ey - fireR, fireR * 2, fireR * 2);

  }

  if (a.kind === 'combo_arrow+lightning') {

    ctx.save();

    ctx.fillStyle = 'rgba(40, 30, 100, ' + darkP * 0.4 + ')';
    ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);

      const rows = {}, cols = {};
      for (const k of cells) {
        const [r, c] = k.split(',').map(Number);
        rows[r] = (rows[r] || 0) + 1;
        cols[c] = (cols[c] || 0) + 1;
      }
      const litRows = []; for (const r in rows) if (rows[r] >= COLS) litRows.push(parseInt(r, 10));
      const litCols = []; for (const c in cols) if (cols[c] >= ROWS) litCols.push(parseInt(c, 10));
      const fade = Math.max(0, 1 - Math.max(0, p - 0.7) / 0.3);

        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, ry - CELL * 0.4, COLS * CELL, CELL * 0.8);
        ctx.fillStyle = 'rgba(255,255,255,' + fade * 0.85 + ')';
        ctx.fillRect(0, ry - CELL * 0.1, COLS * CELL, CELL * 0.2);
      }
      for (const cc of litCols) {
        const cx = cc * CELL + CELL / 2;
        const grad = ctx.createLinearGradient(cx, 0, cx, ROWS * CELL);
        grad.addColorStop(0, hexToRgba(color, fade * 0.9));
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(cx - CELL * 0.4, 0, CELL * 0.8, ROWS * CELL);
        ctx.fillStyle = 'rgba(255,255,255,' + fade * 0.85 + ')';
        ctx.fillRect(cx - CELL * 0.1, 0, CELL * 0.2, ROWS * CELL);
      }

    ctx.restore();
    return;
  }

  if (a.kind === 'combo_bomb+bomb') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const color = a.payload.color || '#ff6a3e';
    ctx.save();
    if (p < 0.25) {
      const prepP = p / 0.25;
      ctx.fillStyle = hexToRgba(color, 0.25 + 0.3 * Math.sin(prepP * 15));
      const zoneX = (ep.c - 2) * CELL;
      const zoneY = (ep.r - 2) * CELL;
      ctx.fillRect(zoneX, zoneY, CELL * 5, CELL * 5);
      ctx.strokeStyle = hexToRgba('#ffffff', 0.7);
      ctx.lineWidth = 4;
      ctx.strokeRect(zoneX, zoneY, CELL * 5, CELL * 5);
    }
    if (p >= 0.15 && p < 0.65) {
      const expP = (p - 0.15) / 0.5;
      const fireR = easeOut(expP) * CELL * 5;
      const fireA = (1 - expP * 0.6) * 0.95;
      const fg = ctx.createRadialGradient(ex, ey, 0, ex, ey, fireR);
      fg.addColorStop(0, 'rgba(255,255,255,' + fireA + ')');
      fg.addColorStop(0.15, 'rgba(255,250,200,' + fireA * 0.95 + ')');
      fg.addColorStop(0.4, 'rgba(255,140,40,' + fireA * 0.9 + ')');
      fg.addColorStop(0.75, hexToRgba(color, fireA * 0.7));
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(ex - fireR, ey - fireR, fireR * 2, fireR * 2);
    }
    for (let i = 0; i < 5; i++) {
      const ringP = Math.max(0, Math.min(1, (p - 0.15) - i * 0.08));
      if (ringP <= 0 || ringP >= 1) continue;
      const rad = easeOut(ringP) * CELL * 5.5;
      const a1 = (1 - ringP) * 0.9;
      ctx.strokeStyle = hexToRgba(i === 0 ? '#ffffff' : (i === 1 ? '#fff5b0' : color), a1);

      ctx.beginPath(); ctx.arc(ex, ey, rad, 0, Math.PI * 2); ctx.stroke();
    }
    if (p > 0.55) {
      const smokeP = (p - 0.55) / 0.45;
      for (let i = 0; i < 16; i++) {
        const ang = (i / 16) * Math.PI * 2 + 0.1;
        const dist = smokeP * CELL * 3.2;
        const sx = ex + Math.cos(ang) * dist;
        const sy = ey + Math.sin(ang) * dist - smokeP * 20;
        const sz = CELL * 0.9 * (0.6 + smokeP * 0.5);
        ctx.fillStyle = 'rgba(40,25,15,' + (1 - smokeP) * 0.55 + ')';
        ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
      }
      for (let i = 0; i < 24; i++) {
        const ang = (i / 24) * Math.PI * 2 + p * 4;
        const dist = smokeP * CELL * 4;
        const ex2 = ex + Math.cos(ang) * dist;
        const ey2 = ey + Math.sin(ang) * dist - smokeP * 16;
        ctx.fillStyle = hexToRgba(i % 2 === 0 ? '#ffd864' : color, (1 - smokeP) * 0.85);

    return;

  if (a.kind === 'combo_bomb+lightning') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const color = a.payload.color || '#ff6a3e';
    const cells = a.payload.cells || new Set();
    ctx.save();
    ctx.fillStyle = 'rgba(20, 10, 60, ' + (p < 0.5 ? 0.4 : Math.max(0, 0.4 - (p - 0.5) * 0.8)) + ')';
    ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
    // Identify bomb centers
    const centers = [];
    const checked = new Set();
    for (const k of cells) {
      const [r, c] = k.split(',').map(Number);
      let neighborCount = 0;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (cells.has((r + dr) + ',' + (c + dc))) neighborCount++;
      }
      if (neighborCount === 9 && !checked.has(k)) {
        centers.push({ r, c });
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) checked.add((r + dr) + ',' + (c + dc));
      }
    }
    // Phase 2: bolts to centers
    if (p >= 0.15 && p < 0.55) {
      const strikeP = (p - 0.15) / 0.4;
      for (const cn of centers) {
        const tx = cn.c * CELL + CELL / 2;
        const ty = cn.r * CELL + CELL / 2;
        const segments = 8;
        const pts = [[ex, ey]];
        for (let j = 1; j < segments; j++) {
          const u = j / segments;
          const baseX = ex + (tx - ex) * u;
          const baseY = ey + (ty - ey) * u;
          const jitter = Math.sin((cn.r * 13 + cn.c * 7 + j) * 2.3);
          const dx = tx - ex, dy = ty - ey;
          const nrm = Math.hypot(dx, dy) || 1;
          pts.push([baseX + -dy / nrm * jitter * CELL * 0.3, baseY + dx / nrm * jitter * CELL * 0.3]);
