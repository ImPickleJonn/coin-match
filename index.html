        pts.push([tx, ty]);
        const alpha = strikeP < 0.5 ? strikeP * 2 : 1 - (strikeP - 0.5) * 2;
        ctx.strokeStyle = hexToRgba('#9ad8ff', alpha * 0.6);
        ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          if (j === 0) ctx.moveTo(pts[j][0], pts[j][1]);
          else ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          if (j === 0) ctx.moveTo(pts[j][0], pts[j][1]);
          else ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
      }
    }
    // Phase 3: explosions
    if (p > 0.4) {
      for (let i = 0; i < centers.length; i++) {
        const cn = centers[i];
        const tx = cn.c * CELL + CELL / 2;
        const ty = cn.r * CELL + CELL / 2;
        const expP = Math.max(0, Math.min(1, (p - 0.4 - i * 0.03) / 0.55));
        if (expP <= 0) continue;
        const fireR = easeOut(expP) * CELL * 1.5;
        const fireA = (1 - expP) * 0.9;
        const fg = ctx.createRadialGradient(tx, ty, 0, tx, ty, fireR);
        fg.addColorStop(0, 'rgba(255,255,255,' + fireA + ')');
        fg.addColorStop(0.4, hexToRgba(color, fireA * 0.85));
        fg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fg;
        ctx.fillRect(tx - fireR, ty - fireR, fireR * 2, fireR * 2);
      }
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_lightning+lightning') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const cells = a.payload.cells || new Set();
    ctx.save();
    ctx.fillStyle = 'rgba(10, 5, 50, ' + (p < 0.6 ? 0.55 : Math.max(0, 0.55 - (p - 0.6) * 1.4)) + ')';
    ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
    if (p < 0.4) {
      const pulseP = p / 0.4;
      const rad = CELL * (1.0 + 0.4 * Math.sin(pulseP * 30));
      const cg = ctx.createRadialGradient(ex, ey, 0, ex, ey, rad);
      cg.addColorStop(0, 'rgba(255,255,255,1)');
      cg.addColorStop(0.3, 'rgba(200,240,255,0.9)');
      cg.addColorStop(0.7, hexToRgba('#9ad8ff', 0.7));
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.fillRect(ex - rad, ey - rad, rad * 2, rad * 2);
    }
    if (p >= 0.2 && p < 0.85) {
      const strikeP = (p - 0.2) / 0.65;
      const fade = strikeP < 0.5 ? strikeP * 2 : 1 - (strikeP - 0.5) * 2;
      let idx = 0;
      for (const k of cells) {
        const [r, c] = k.split(',').map(Number);
        if (r === ep.r && c === ep.c) continue;
        idx++;
        const tx = c * CELL + CELL / 2;
        const ty = r * CELL + CELL / 2;
        const myDelay = (idx % 8) * 0.04;
        const myP = Math.max(0, strikeP - myDelay);
        if (myP <= 0) continue;
        const reach = Math.min(1, myP * 2);
        const ex2 = ex + (tx - ex) * reach;
        const ey2 = ey + (ty - ey) * reach;
        const segments = 6;
        const pts = [[ex, ey]];
        for (let j = 1; j < segments; j++) {
          const u = j / segments;
          const baseX = ex + (ex2 - ex) * u;
          const baseY = ey + (ey2 - ey) * u;
          const jitter = Math.sin((r * 13 + c * 7 + j) * 2.3);
          const dx = tx - ex, dy = ty - ey;
          const nrm = Math.hypot(dx, dy) || 1;
          pts.push([baseX + -dy / nrm * jitter * CELL * 0.25, baseY + dx / nrm * jitter * CELL * 0.25]);
        }
        pts.push([ex2, ey2]);
        ctx.strokeStyle = hexToRgba('#9ad8ff', fade * 0.7);
        ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          if (j === 0) ctx.moveTo(pts[j][0], pts[j][1]);
          else ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,' + fade + ')';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          if (j === 0) ctx.moveTo(pts[j][0], pts[j][1]);
          else ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
        if (reach >= 0.95) {
          const sg = ctx.createRadialGradient(tx, ty, 0, tx, ty, CELL * 0.5);
          sg.addColorStop(0, 'rgba(255,255,255,' + fade + ')');
          sg.addColorStop(0.5, hexToRgba('#9ad8ff', fade * 0.7));
          sg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = sg;
          ctx.beginPath(); ctx.arc(tx, ty, CELL * 0.5, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
    ctx.restore();
    return;
  }
}

function roundRectPath(x, y, w, h, r) {
  if (typeof ctx.roundRect === 'function') { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); return; }
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* =========================================================
   [31] Input — tap-tap + swipe
   ========================================================= */

// =========================================================
// Input — drag-to-swipe (Match Icon pattern).
// onPointerDown: grab origin cell.
// onPointerMove: as soon as drag crosses DRAG_THRESHOLD in any
//                cardinal direction, fire attemptSwap and clear
//                dragStart so we don't double-fire.
// onPointerUp:   if no swipe happened, treat as tap-to-select;
//                a second adjacent tap completes a swap.
// During drag, spawn small sparkle dots along the finger path.
// =========================================================

const DRAG_THRESHOLD = 12;
let dragStart = null;
let isSwiping = false;

function cellFromEvent(ev) {
  const rect = canvas.getBoundingClientRect();
  const cellCss = rect.width / COLS;
  const px = (ev.clientX != null ? ev.clientX : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : null));
  const py = (ev.clientY != null ? ev.clientY : (ev.touches && ev.touches[0] ? ev.touches[0].clientY : null));
  if (px == null) return null;
  const x = px - rect.left;
  const y = py - rect.top;
  const c = Math.floor(x / cellCss);
  const r = Math.floor(y / cellCss);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return { r, c, x: px, y: py };
}

function onPointerDown(ev) {
  if (ev.cancelable) ev.preventDefault();
  if (game.busy) return;
  const cell = cellFromEvent(ev);
  if (!cell) return;
  isSwiping = true;
  // Hammer / rocket / bomb boosters target a single cell.
  if (state.armed.hammer || state.armed.rocket || state.armed.bomb) {
    attemptSwap(cell.r, cell.c, cell.r, cell.c);
    return;
  }
  dragStart = cell;
}

function onPointerMove(ev) {
  // Swipe trail dots — runs for the whole gesture, not just before swap.
  if (isSwiping) {
    const px = (ev.clientX != null ? ev.clientX : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : null));
    const py = (ev.clientY != null ? ev.clientY : (ev.touches && ev.touches[0] ? ev.touches[0].clientY : null));
    if (px != null && py != null) spawnSwipeDot(px, py);
  }
  if (!dragStart || game.busy) return;
  const rect = canvas.getBoundingClientRect();
  const px = (ev.clientX != null ? ev.clientX : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : null));
  const py = (ev.clientY != null ? ev.clientY : (ev.touches && ev.touches[0] ? ev.touches[0].clientY : null));
  if (px == null) return;
  const dx = px - dragStart.x;
  const dy = py - dragStart.y;
  if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
  // Threshold crossed: snap to a cardinal swap.
  let r2 = dragStart.r, c2 = dragStart.c;
  if (Math.abs(dx) > Math.abs(dy)) c2 += dx > 0 ? 1 : -1;
  else                              r2 += dy > 0 ? 1 : -1;
  if (r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) { dragStart = null; return; }
  const from = dragStart;
  dragStart = null;
  game.selected = null;
  attemptSwap(from.r, from.c, r2, c2);
}

function onPointerUp(ev) {
  isSwiping = false;
  if (game.busy || !dragStart) { dragStart = null; return; }
  // No swipe happened — treat as tap-to-select with optional adjacent commit.
  const cell = dragStart;
  dragStart = null;
  if (game.selected) {
    const dr = Math.abs(game.selected.r - cell.r);
    const dc = Math.abs(game.selected.c - cell.c);
    if (dr + dc === 1) {
      const from = game.selected;
      game.selected = null;
      attemptSwap(from.r, from.c, cell.r, cell.c);
      return;
    }
  }
  game.selected = (game.selected && game.selected.r === cell.r && game.selected.c === cell.c) ? null : cell;
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove',  onPointerMove,  { passive: false });
canvas.addEventListener('touchend',   onPointerUp);
canvas.addEventListener('touchcancel', () => { dragStart = null; isSwiping = false; });
canvas.addEventListener('mouseleave', () => { dragStart = null; isSwiping = false; });

/* =========================================================
   [32] VFX — score-fly, score bump, combo overlay, screen flash
       (Direct port from Match Icon spawnScoreFly / scoreBump.)
   ========================================================= */

function spawnScoreFly(col, row, text) {
  const rect = canvas.getBoundingClientRect();
  const startX = rect.left + col * CELL + CELL / 2;
  const startY = rect.top  + row * CELL + CELL / 2;
  const target = document.getElementById('goldScore');
  if (!target) return;
  const trect = target.getBoundingClientRect();
  const endX = trect.left + trect.width / 2;
  const endY = trect.top  + trect.height / 2;

  const fly = document.createElement('div');
  fly.className = 'score-fly';
  fly.textContent = text;
  fly.style.left = startX + 'px';
  fly.style.top  = startY + 'px';
  document.body.appendChild(fly);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fly.style.left = endX + 'px';
      fly.style.top  = endY + 'px';
      fly.classList.add('flying');
    });
  });
  setTimeout(() => { if (fly.parentNode) fly.parentNode.removeChild(fly); }, 1000);
}

function bumpScore() {
  const el = document.getElementById('goldScore');
  if (!el) return;
  el.classList.remove('score-bump');
  void el.offsetWidth;
  el.classList.add('score-bump');
  setTimeout(() => el.classList.remove('score-bump'), 400);
}

function showComboOverlay(text) {
  const wrap = document.getElementById('floatLayer');
  if (!wrap) return;
  const el = document.createElement('div');
  el.className = 'combo-overlay';
  el.textContent = text;
  wrap.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 1100);
}

function flashScreen(color, peakAlpha, durMs) {
  const overlay = document.getElementById('screenFlash');
  if (!overlay) return;
  overlay.style.background = color;
  overlay.style.opacity = peakAlpha;
  overlay.style.transition = 'none';
  void overlay.offsetWidth;
  overlay.style.transition = 'opacity ' + durMs + 'ms ease-out';
  overlay.style.opacity = '0';
}

function flashEnergyEmpty() {
  const row = document.getElementById('energy-wrap');
  if (!row) return;
  row.classList.add('empty');
  setTimeout(() => row.classList.remove('empty'), 600);
}

/* =========================================================
   [33] UI refresh
   ========================================================= */

function fmtNum(n) {
  n = Math.floor(n);
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e4) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toLocaleString('en-US');
}
function refreshAllUI() {
  refreshGoldUI();
  refreshEnergyUI();
  refreshBetBtn();
  refreshLastMatch();
  refreshBoosterCounts();
  refreshMetersUI();
  refreshMasterBlock();
  refreshVillageScreen();
}
// refreshGoldUI() doesn't directly write text — the rAF ticker advances
// `displayedGold` each frame and calls refreshGoldDisplay() to update DOM.
// Callers that change state.coins just invoke refreshGoldUI() and the
// ticker takes over animating to the new value.
function refreshGoldUI() {
  refreshGoldDisplay();
}
function refreshGoldDisplay() {
  const v = fmtNum(displayedGold);
  const el = document.getElementById('goldScore');
  if (el) el.textContent = v;
  const hud = document.getElementById('hud-coins');
  if (hud) hud.textContent = v;
}
function refreshEnergyUI() {
  const numEl = document.getElementById('energy-num');
  const maxEl = document.getElementById('energy-max');
  if (numEl) numEl.textContent = state.energy;
  if (maxEl) maxEl.textContent = state.energyMax;
  const fill = document.getElementById('energy-fill');
  if (fill) fill.style.width = (state.energy / state.energyMax * 100) + '%';
  const tm = document.getElementById('energy-timer');
  if (tm) tm.textContent = energyCountdownStr();
  const row = document.getElementById('energy-wrap');
  if (row) row.classList.toggle('empty', state.energy <= 0);
}
function refreshBetBtn() {
  const bet = effectiveBet();
  const el = document.getElementById('bet-x');
  if (el) el.textContent = bet.label;
}
function refreshLastMatch() {
  const lm = document.getElementById('lastMatch');
  if (!lm) return;
  if (state.lastMatchGold <= 0) { lm.innerHTML = '+0'; return; }
  let html = '<span class="v">+' + fmtNum(state.lastMatchGold) + '</span>';
  if (game.cascadeMax >= 2) html += '  <span class="cascade">CASCADE×' + game.cascadeMax + '</span>';
  lm.innerHTML = html;
}
function refreshBoosterCounts() {
  ['hammer', 'rocket', 'bomb', 'shuffle'].forEach(k => {
    const cnt = document.getElementById('cnt-' + k);
    const btn = document.getElementById('b-' + k);
    if (cnt) cnt.textContent = state.boost[k] || 0;
    if (btn) {
      btn.classList.toggle('empty', (state.boost[k] || 0) <= 0);
      btn.classList.toggle('armed', !!state.armed[k]);
    }
  });
}
function refreshMetersUI() {
  for (const k of ['hammer', 'pig', 'shield']) {
    const v = state.meter[k];
    const fill = document.getElementById('fill-' + k);
    const lbl = document.getElementById('label-' + k);
    const block = document.getElementById('meter-' + k);
    if (fill) fill.style.width = (v / METER_CAP * 100) + '%';
    if (block) block.classList.toggle('armed', v >= METER_CAP);
    if (lbl) {
      if (v >= METER_CAP) { lbl.textContent = 'TAP!'; lbl.classList.add('full'); }
      else                { lbl.textContent = v + '/' + METER_CAP; lbl.classList.remove('full'); }
    }
    // Booster-thumb pulses near and at charge
    const thumb = block && block.querySelector('.booster-thumb');
    if (thumb) {
      thumb.classList.toggle('charged', v >= METER_CAP);
      thumb.classList.toggle('near-charged', v >= METER_CAP * 0.7 && v < METER_CAP);
    }
  }
}
function refreshMasterBlock() {
  const ms = getMasterState();
  document.getElementById('masterAv').textContent = ms.bot.emoji;
  document.getElementById('masterName').textContent = ms.bot.name.toUpperCase();
  document.getElementById('masterPile').textContent = fmtNum(ms.pile);
  const wrap = document.getElementById('masterBuildings');
  wrap.innerHTML = '';
  for (const s of ms.structures) {
    const c = document.createElement('div');
    c.className = 'mb-cell' + (s.smashed ? ' damaged' : '');
    c.textContent = s.emoji;
    wrap.appendChild(c);
  }
  refreshMasterTimer();
}
function refreshMasterTimer() {
  const el = document.getElementById('masterTimer');
  if (!el) return;
  const ms = masterMillisLeft();
  const min = Math.floor(ms / 60000);
  const sec = Math.floor((ms % 60000) / 1000);
  el.textContent = min + ':' + String(sec).padStart(2, '0');
  if (ms < 1000) refreshMasterBlock();
}

/* =========================================================
   [34] Village screen
   ========================================================= */

function getStructLevel(id) { return state.village[id] || 0; }
function structureCost(s, level) { return s.base * Math.pow(2, level - 1); }
function refreshVillageScreen() {
  const theme = THEMES[state.theme];
  const vn = document.getElementById('village-name');
  if (vn) vn.textContent = theme.nameEmoji + ' ' + theme.name;
  let levels = 0, max = 0;
  for (const s of theme.structures) { levels += getStructLevel(s.id); max += 5; }
  const vpf = document.getElementById('vp-fill');
  if (vpf) vpf.style.width = (levels / max * 100) + '%';
  const vpt = document.getElementById('vp-text');
  if (vpt) vpt.textContent = levels + ' / ' + max;
  const list = document.getElementById('struct-list');
  if (!list) return;
  list.innerHTML = '';
  for (const s of theme.structures) {
    const lvl = getStructLevel(s.id);
    const maxed = lvl >= 5;
    const cost = maxed ? 0 : structureCost(s, lvl + 1);
    const stars = '★'.repeat(lvl) + '☆'.repeat(5 - lvl);
    const card = document.createElement('div');
    card.className = 'struct-card';
    const action = maxed
      ? '<div class="maxed-badge">' + t('maxed') + '</div>'
      : '<button class="btn gold small" data-build="' + s.id + '">' + (lvl === 0 ? t('build') : t('upgrade')) + '</button>' +
        '<div class="struct-cost">' + fmtNum(cost) + ' 💰</div>';
    card.innerHTML =
      '<div class="struct-icon">' + s.emoji + '</div>' +
      '<div class="struct-info">' +
        '<div class="struct-name">' + s.name + '</div>' +
        '<div class="struct-lvl">' + t('lvl') + ' ' + lvl + ' / 5  <span class="stars">' + stars + '</span></div>' +
      '</div>' +
      '<div class="struct-action">' + action + '</div>';
    list.appendChild(card);
  }
  list.querySelectorAll('[data-build]').forEach(btn => {
    btn.addEventListener('click', () => buildStructure(btn.getAttribute('data-build')));
  });
}
function buildStructure(id) {
  const theme = THEMES[state.theme];
  const s = theme.structures.find(x => x.id === id);
  if (!s) return;
  const lvl = getStructLevel(id);
  if (lvl >= 5) return;
  const cost = structureCost(s, lvl + 1);
  if (state.coins < cost) { toast(t('not_enough_coins')); haptic('err'); return; }
  state.coins -= cost;
  state.village[id] = lvl + 1;
  haptic('success');
  saveState();
  refreshAllUI();
  let levels = 0, max = 0;
  for (const sd of theme.structures) { levels += getStructLevel(sd.id); max += 5; }
  if (levels >= max) setTimeout(showIslandCompleteModal, 250);
}
function showIslandCompleteModal() {
  const bonus = 5000;
  state.coins += bonus;
  state.totalGoldEarnedEver += bonus;
  const theme = THEMES[state.theme];
  const html =
    '<div class="tier-up">' +
      '<h2>' + t('island_complete') + '</h2>' +
      '<div class="big">' + theme.nameEmoji + '</div>' +
      '<div class="new-name">' + theme.name + '</div>' +
      '<div class="sub" style="margin-top:6px;">' + t('bonus_coins', { n: fmtNum(bonus) }) + '</div>' +
      '<div class="actions"><button class="btn gold" id="ic-ok">' + t('lets_go') + '</button></div>' +
    '</div>';
  openModal(html);
  haptic('success');
  document.getElementById('ic-ok').addEventListener('click', () => { closeModal(); refreshAllUI(); });
}

/* =========================================================
   [35] Smash / Raid mini-events
   ========================================================= */

const eventOverlay = document.getElementById('event-overlay');
function openEvent() { eventOverlay.classList.add('show'); }
function closeEvent() {
  eventOverlay.classList.remove('show');
  document.getElementById('ev-final').classList.remove('show');
  document.getElementById('ev-done').style.display = 'none';
  document.getElementById('ev-content').innerHTML = '';
}
document.getElementById('ev-done').addEventListener('click', closeEvent);

function startSmash() {
  if (state.meter.hammer < METER_CAP) return;
  state.meter.hammer = 0;
  refreshMetersUI();
  haptic('heavy');
  const ms = getMasterState();
  document.getElementById('ev-title').textContent = t('smash');
  document.getElementById('ev-master').textContent = ms.bot.name;
  document.getElementById('ev-info').textContent = t('tap_to_smash');
  const available = ms.structures.filter(s => !s.smashed);
  const picks = [];
  const pool = available.slice();
  while (picks.length < 3 && pool.length > 0) {
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  while (picks.length < 3) picks.push(ms.structures[picks.length % ms.structures.length]);
  const content = document.getElementById('ev-content');
  content.innerHTML = '<div class="smash-buildings">' + picks.map((p, i) =>
    '<div class="smash-bd" data-idx="' + p.idx + '" data-smashed="' + (p.smashed ? '1' : '0') + '">' + p.emoji + '</div>'
  ).join('') + '</div>';
  content.querySelectorAll('.smash-bd').forEach(el => {
    el.addEventListener('click', () => {
      if (el.classList.contains('smashed') || el.getAttribute('data-smashed') === '1') return;
      doSmash(ms.masterId, parseInt(el.getAttribute('data-idx'), 10), el);
    });
  });
  openEvent();
}
function doSmash(masterId, idx, el) {
  const ms = getMasterState();
  const bet = effectiveBet();
  const base = 500 + Math.floor(ms.bot.pileBase * 0.05);
  const reward = Math.floor(base * (0.8 + Math.random() * 0.5) * bet.mult);
  const dmg = state.masterDamage[masterId] || { smashed: [], pile: ms.pile };
  if (!dmg.smashed.includes(idx)) dmg.smashed.push(idx);
  dmg.pile = Math.max(0, dmg.pile - Math.floor(reward * 0.3));
  state.masterDamage[masterId] = dmg;
  state.coins += reward;
  state.totalGoldEarnedEver += reward;
  state.vaultLifetimeCoins += reward;
  state.totalSmashEver++;
  haptic('heavy');
  el.classList.add('smashed');
  setTimeout(() => {
    const final = document.getElementById('ev-final');
    final.textContent = '+' + fmtNum(reward) + ' 💰';
    final.classList.add('show');
    document.getElementById('ev-done').style.display = 'inline-flex';
    document.getElementById('ev-done').textContent = t('continue');
    toast(t('smashed', { n: fmtNum(reward) }));
    bumpScore();
    saveState();
    refreshAllUI();
  }, 500);
}

function startRaid() {
  if (state.meter.pig < METER_CAP) return;
  state.meter.pig = 0;
  refreshMetersUI();
  haptic('heavy');
  const ms = getMasterState();
  document.getElementById('ev-title').textContent = t('raid');
  document.getElementById('ev-master').textContent = ms.bot.name;
  document.getElementById('ev-info').textContent = t('tap_to_dig');
  const bet = effectiveBet();
  const piePer = Math.floor(ms.pile * (0.06 + Math.random() * 0.06)) * bet.mult;
  const emptyIdx = Math.floor(Math.random() * 4);
  const spots = [0,1,2,3].map(i => ({
    idx: i, empty: i === emptyIdx,
    reward: i === emptyIdx ? 0 : Math.floor(piePer * (0.7 + Math.random() * 0.6)),
  }));
  const content = document.getElementById('ev-content');
  content.innerHTML = '<div class="raid-spots">' + spots.map(s =>
    '<div class="raid-spot" data-spot="' + s.idx + '"></div>').join('') + '</div>';
  let dug = 0, total = 0, hits = 0;
  content.querySelectorAll('.raid-spot').forEach((el, i) => {
    el.addEventListener('click', () => {
      if (el.classList.contains('dug') || dug >= 3) return;
      const s = spots[i];
      dug++;
      el.classList.add('dug');
      if (s.empty) {
        el.classList.add('empty');
        el.innerHTML = '<div class="em-icon">🕳️</div><div class="reward">empty</div>';
      } else {
        el.innerHTML = '<div class="em-icon">💰</div><div class="reward">+' + fmtNum(s.reward) + '</div>';
        total += s.reward; hits++;
      }
      haptic('med');
      if (dug >= 3) finishRaid(ms.masterId, total, hits === 3);
    });
  });
  openEvent();
}
function finishRaid(masterId, totalGold, perfect) {
  state.coins += totalGold;
  state.totalGoldEarnedEver += totalGold;
  state.vaultLifetimeCoins += totalGold;
  state.totalRaidEver++;
  const dmg = state.masterDamage[masterId] || { smashed: [], pile: getCurrentMaster().bot.pileBase };
  dmg.pile = Math.max(0, dmg.pile - totalGold);
  state.masterDamage[masterId] = dmg;
  haptic('success');
  setTimeout(() => {
    const final = document.getElementById('ev-final');
    let txt = '+' + fmtNum(totalGold) + ' 💰';
    if (perfect) txt = '🌟 ' + t('perfect') + '  ' + txt;
    final.textContent = txt;
    final.classList.add('show');
    document.getElementById('ev-done').style.display = 'inline-flex';
    document.getElementById('ev-done').textContent = t('continue');
    toast(t('raided', { n: fmtNum(totalGold) }));
    bumpScore();
    saveState();
    refreshAllUI();
  }, 600);
}

/* =========================================================

function setBoosterArmed(kind, on) {
  const el = document.getElementById('b-' + kind);
  if (el) el.classList.toggle('armed', !!on);
}
function armBooster(kind) {
  if ((state.boost[kind] || 0) <= 0) { toast('No ' + kind + ' — buy in shop'); haptic('err'); return; }
  if (state.armed[kind]) { state.armed[kind] = false; setBoosterArmed(kind, false); return; }
  for (const k of ['hammer', 'rocket', 'bomb']) state.armed[k] = false;
  state.armed[kind] = true;
  for (const k of ['hammer', 'rocket', 'bomb']) setBoosterArmed(k, state.armed[k]);
  toast(kind.toUpperCase() + ' armed — tap a tile');
}
document.getElementById('b-hammer').addEventListener('click', () => armBooster('hammer'));
document.getElementById('b-rocket').addEventListener('click', () => armBooster('rocket'));
document.getElementById('b-bomb').addEventListener('click',   () => armBooster('bomb'));
document.getElementById('b-shuffle').addEventListener('click', () => {

  state.boost.shuffle--;
  reshuffleGrid();
  render();
  haptic('med');
  saveState();
  refreshAllUI();
});

function showTab(tab) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  const target = document.getElementById('screen-' + tab);
  if (target) target.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === tab));

  if (tab === 'village') refreshVillageScreen();
  if (tab === 'shop')    renderShop();

const modalBack = document.getElementById('modal-back');
const modalEl = document.getElementById('modal');
function openModal(html) {
  modalEl.innerHTML = '<div class="modal-close" id="modal-close">×</div>' + html;
  modalBack.classList.add('show');
  const close = document.getElementById('modal-close');

modalBack.addEventListener('click', (ev) => { if (ev.target === modalBack) closeModal(); });

/* =========================================================
   [38] Daily chest + welcome + settings
   ========================================================= */

function todayYMD() { const d = new Date(); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function yesterdayYMD() { const d = new Date(); d.setUTCDate(d.getUTCDate() - 1); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function canClaimDaily() { return state.dailyChestYMD !== todayYMD(); }
function nextChestDay() {
  if (state.dailyChestDay >= 7) return 1;
  if (state.dailyChestYMD && state.dailyChestYMD !== yesterdayYMD()) return 1;
  return state.dailyChestDay + 1;
}
function showDailyModal() {
  const next = nextChestDay();
  const claimable = canClaimDaily();
  let cells = '';
  for (let i = 0; i < 7; i++) {
    const day = i + 1;
    const item = DAILY_CHEST[i];
    const isToday = (claimable && day === next) || (!claimable && day === state.dailyChestDay);
    const claimedByPrior = !claimable && day < state.dailyChestDay;
    const futureDay = claimable ? (day > next) : (day > state.dailyChestDay);
    cells += '<div class="chest-day' + (isToday ? ' today' : '') + (claimedByPrior ? ' claimed' : '') + (futureDay ? ' future' : '') + '">' +
      '<div class="d">' + day + '</div><div class="em">' + item.em + '</div>' +
      '<div class="amt">+' + fmtNum(item.coins) + (item.energy ? ' ⚡' + item.energy : '') + '</div></div>';
  }
  const html =
    '<h2>' + t('daily_chest') + '</h2>' +
    '<div class="sub">' + t('daily_streak', { n: state.streak }) + '</div>' +
    '<div class="chest-grid">' + cells + '</div>' +
    '<div class="actions">' + (claimable
      ? '<button class="btn gold full" id="claim-daily">' + t('claim') + ' · Day ' + next + '</button>'
      : '<div style="text-align:center;color:#8a8ca0;font-size:13px;">' + t('come_back_tomorrow') + '</div>') + '</div>';
  openModal(html);
  if (claimable) {
    document.getElementById('claim-daily').addEventListener('click', () => { claimDaily(); closeModal(); });
  }
}
function claimDaily() {
  if (!canClaimDaily()) return;
  const next = nextChestDay();
  const item = DAILY_CHEST[next - 1];
  if (state.dailyChestYMD === yesterdayYMD()) state.streak = (state.streak || 0) + 1;
  else state.streak = 1;
  state.coins += item.coins;
  state.totalGoldEarnedEver += item.coins;
  state.vaultLifetimeCoins += item.coins;
  if (item.energy) state.energy = Math.min(state.energyMax + item.energy, state.energy + item.energy);
  state.dailyChestYMD = todayYMD();
  state.dailyChestDay = next;
  haptic('success');
  bumpScore();
  saveState();
  refreshAllUI();
  toast('+' + fmtNum(item.coins) + ' 💰' + (item.energy ? ' +' + item.energy + ' ⚡' : ''));
}

function showWelcomeModal() {
  const html =
    '<h2>' + t('welcome_title') + '</h2>' +
    '<div class="welcome-grid">' +
      '<div class="em">💰</div><div><span class="lbl">Match</span><br>' + t('welcome_match') + '</div>' +
      '<div class="em">⚡</div><div><span class="lbl">Cascade</span><br>' + t('welcome_cascade') + '</div>' +
      '<div class="em">🔨</div><div><span class="lbl">Steal</span><br>' + t('welcome_charge') + '</div>' +
      '<div class="em">🏠</div><div><span class="lbl">Village</span><br>' + t('welcome_village') + '</div>' +
    '</div>' +
    '<div class="actions"><button class="btn gold full" id="wel-ok">' + t('lets_go') + '</button></div>';
  openModal(html);
  document.getElementById('wel-ok').addEventListener('click', () => {
    state.welcomed = true; saveState(); closeModal();
  });
}

function showSettingsModal() {
  const html =
    '<h2>' + t('settings') + '</h2>' +
    '<div style="font-size:12px;color:#c7cdd9;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;font-weight:800;">' + t('language') + '</div>' +
    '<div class="lang-grid" id="lang-grid"></div>' +
    '<div style="text-align:center;font-size:11px;color:#5a4ab0;margin-top:10px;">' + VERSION + '</div>';
  openModal(html);
  const grid = document.getElementById('lang-grid');
  for (const l of LANGS) {
    const cell = document.createElement('div');
    cell.className = 'lang-cell' + (l.code === state.lang ? ' active' : '');
    cell.innerHTML = '<span class="flag">' + l.flag + '</span>' + l.name;
    cell.addEventListener('click', () => {
      state.lang = l.code; saveState(); applyI18n(); refreshAllUI(); closeModal();
      setTimeout(showSettingsModal, 80);
    });
    grid.appendChild(cell);
  }
}

// Daily button (the center RULES button repurposed) opens daily chest
document.getElementById('rules-btn').addEventListener('click', showDailyModal);
// Master avatar long-press = settings (placeholder for v0.4)
document.getElementById('playerAv').addEventListener('click', showSettingsModal);

/* =========================================================
   [39] Shop + leaderboard
   ========================================================= */

function renderShop() {
  const items = (SKUS && SKUS.length) ? SKUS.map(s => ({
    id: s.id, ico: shopIcon(s.id), title: s.title, desc: s.description, price: s.price,
    featured: s.id === 'starter_pack',
  })) : STAR_SHOP_FALLBACK;
  const list = document.getElementById('shop-list');
  if (!list) return;
  list.innerHTML = '';
  for (const it of items) {
    const card = document.createElement('div');
    card.className = 'shop-item' + (it.featured ? ' featured' : '');
    card.innerHTML =
      '<div class="ico">' + it.ico + '</div>' +
      '<div class="info"><div class="ti">' + it.title + '</div><div class="desc">' + it.desc + '</div></div>' +
      '<div class="price">' + it.price + ' ⭐</div>';
    card.addEventListener('click', () => buySku(it.id));
    list.appendChild(card);
  }
  if (!IAP_ENABLED) {
    const note = document.createElement('div');
    note.style.cssText = 'font-size:11px;color:#8a8ca0;text-align:center;margin:8px 0;padding:8px;background:rgba(20,12,40,0.7);border-radius:9px;border:1.5px solid #3a2a6a;';
    note.textContent = t('no_iap');
    list.appendChild(note);
  }
}
function shopIcon(id) {
  const m = { starter_pack:'🎁', coins_small:'💰', coins_medium:'💰', coins_large:'💰', coins_mega:'💰',
              energy_refill:'⚡', energy_full:'⚡', hammer_pack:'🔨', rocket_pack:'🚀', bomb_pack:'💣',
              shuffle_pack:'🔄', free_pack:'⚡⚡', shield_24h:'🛡️', battle_pass:'⭐', test_purchase:'🧪',
              bet_booster:'⚡', wild_booster:'🎰', bag_booster:'💰' };
  return m[id] || '💎';
}

let lbMode = 'regular';
async function loadLeaderboard() {
  try {
    const r = await fetch('/api/leaderboard?mode=' + lbMode);
    const d = await r.json();
    renderLeaderboard(d.top || []);
  } catch (e) { document.getElementById('lb-list').textContent = '—'; }
}
function renderLeaderboard(top) {
  const list = document.getElementById('lb-list');
  if (!list) return;
  if (!top.length) { list.textContent = 'Be the first on the board!'; return; }
  const myId = (TG && TG.initDataUnsafe && TG.initDataUnsafe.user && TG.initDataUnsafe.user.id) || null;
  list.innerHTML = top.slice(0, 50).map((e, i) =>
    '<div class="lb-row' + (myId && e.uid === myId ? ' me' : '') + '">' +
      '<div class="rank">' + (i + 1) + '</div>' +
      '<div class="name">' + escapeHtml(e.name) + (myId && e.uid === myId ? ' (you)' : '') + '</div>' +
      '<div class="score">' + fmtNum(e.score) + ' 💰</div></div>').join('');
}
function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch])); }
document.querySelectorAll('.lb-tab').forEach(el => {
  el.addEventListener('click', () => {
    lbMode = el.getAttribute('data-m');
    document.querySelectorAll('.lb-tab').forEach(x => x.classList.toggle('active', x === el));
    loadLeaderboard();
  });
});

/* =========================================================
   [40] Toast + boot
   ========================================================= */

let toastTimer = 0;
function toast(msg) {
  const el = document.getElementById('toast-el');
  if (!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 1900);
}

(async function boot() {
  tgReady();
  applyI18n();
  pruneOldMasterDamage();
  spawnFreshGrid();
  sizeCanvas();
  // Initialize the ticker to current value so the first frame doesn't roll
  // from 0 to N (only animate transitions, not the initial load).
  displayedGold = state.coins;
  refreshAllUI();
  // Kick the main render loop — runs every frame for animations + particles.
  requestAnimationFrame(tick);

  if (!state.welcomed) setTimeout(showWelcomeModal, 350);
  else if (canClaimDaily()) setTimeout(showDailyModal, 500);

  await fetchServerFlags();
  if (TG && TG.initData) {
    try {
      const r = await fetch('/api/state/load', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: TG.initData }),
      });
      const d = await r.json();
      if (d.exists && d.state) { Object.assign(state, d.state); saveState(); refreshAllUI(); }
    } catch (e) {}
  }
  setInterval(pollPurchases, 5000);
  if (TG && TG.initData) {
    fetch('/api/heartbeat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: TG.initData, lang: state.lang, streak: state.streak }),
    }).catch(() => {});
  }
})();

</script>
