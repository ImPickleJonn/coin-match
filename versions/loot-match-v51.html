    const sx = ((i * 73) % 100) / 100 * W;
    const sy = ((i * 41) % 60) / 100 * H * 0.55;
    const tw = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(tt * 1.3 + i));
    c.globalAlpha = 0.45 * tw;
    c.fillStyle = '#fff8c4';
    c.fillRect(sx, sy, 2, 2);
  }
  c.globalAlpha = 1;

  // ---- GHOST PREVIEW — low-alpha render of what the character looks
  //      like when EVERYTHING is at lvl 5. Gives the player a clear
  //      visual goal: the silhouette of features they haven't unlocked
  //      yet (full hat, throne pile, bling halo) shows through. As they
  //      level up, the solid version on top "fills in" the silhouette.
  const cxC = W * 0.5;
  const groundY = H * 0.82;
  const totalNow = lv.size + lv.feed + lv.crown + lv.throne + lv.bling;
  if (totalNow < 25 && !_worldExplode) {
    const maxLv = { size: 5, feed: 5, crown: 5, throne: 5, bling: 5 };
    c.save();
    c.globalAlpha = 0.15;
    // Throne ghost
    drawCoinThrone(c, cxC, groundY, W * 0.5, 5, pal);
    // Character ghost — PNG if loaded, else canvas drawer fallback
    const ghostThroneH = 8 + 5 * 8;
    const ghostR = Math.min(W, H) * 0.28 * 1.02;
    const ghostKey = theme.character === 'dragon' ? '_u_character_dragon' : '_u_character_pig';
    const ghostEntry = tileImages[ghostKey];
    if (ghostEntry && ghostEntry.isPng && ghostEntry.canvas) {
      const drawR = ghostR * 1.55;
      c.drawImage(ghostEntry.canvas, cxC - drawR, groundY - ghostThroneH - ghostR * 0.85 - drawR, drawR * 2, drawR * 2);
    } else {
      const drawG = theme.character === 'dragon' ? drawCharDragon : drawCharPig;
      drawG(c, cxC, groundY - ghostThroneH - ghostR * 0.85, ghostR, maxLv, pal, tt);
    }
    // Hint label centered above
    c.globalAlpha = 0.55;
    c.fillStyle = '#ffffff';
    c.strokeStyle = 'rgba(0,0,0,0.6)';
    c.lineWidth = 3;
    c.font = 'bold ' + Math.floor(H * 0.040) + 'px -apple-system, sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'top';
    const goalText = '✨ ' + totalNow + ' / 25';
    c.strokeText(goalText, cxC, H * 0.05);
    c.fillText(goalText, cxC, H * 0.05);
    c.restore();
  }

  // ---- THRONE (drawn first so character sits on top of it) ----
  if (lv.throne > 0) drawCoinThrone(c, cxC, groundY, W * 0.5, lv.throne, pal);

  // ---- CHARACTER ----
  // Explosion timeline (if active) controls scale/alpha overrides.
  const explode = _worldExplode;
  let explodeScale = 1, explodeAlpha = 1, explodeShake = 0;
  if (explode) {
    const dt = (now() - explode.startedAt) / explode.duration;   // 0..1
    if (dt < 0.4) {
      // Inflate phase
      explodeScale = 1 + dt * 1.8;
      explodeShake = 6 * dt;
    } else if (dt < 0.55) {
      // Squish + pop frame
      explodeScale = 2.3 + Math.sin((dt - 0.4) * 30) * 0.25;
      explodeShake = 10;
    } else if (dt < 0.75) {
      // Char disappears (POP!) — alpha to 0 fast
      explodeAlpha = Math.max(0, 1 - (dt - 0.55) / 0.20);
      explodeScale = 2.5;
      explodeShake = 4;
    } else {
      // Pause then new baby appears
      explodeAlpha = Math.max(0, (dt - 0.85) / 0.15);
      explodeScale = 0.4 + Math.max(0, (dt - 0.85)) * 2.5;
      explodeShake = 0;
    }
  }
  // Per-card upgrade reaction — jump up + squash on landing for joy.
  // Uses dt in 0..1 over a 500ms window.
  let bump = 1, bumpY = 0;
  if (_charBumpAt) {
    const elapsed = now() - _charBumpAt;
    if (elapsed < 500) {
      const u = elapsed / 500;
      if (u < 0.30) {
        // Crouch
        bump = 1 - 0.08 * (u / 0.30);
        bumpY = 0;
      } else if (u < 0.60) {
        // Jump up + stretch
        const j = (u - 0.30) / 0.30;
        bump = 0.92 + 0.18 * Math.sin(j * Math.PI);
        bumpY = -Math.sin(j * Math.PI) * 22;
      } else if (u < 0.80) {
        // Land squash
        const k = (u - 0.60) / 0.20;
        bump = 1.10 - 0.20 * k;
        bumpY = -2 + 2 * k;
      } else {
        // Settle
        const k = (u - 0.80) / 0.20;
        bump = 0.90 + 0.10 * k;
        bumpY = 0;
      }
    }
  }
  // Idle bob (gentle vertical sway)
  const bob = Math.sin(tt * 2.0) * 3;

  // Character base size — grows with foundation/size level (40% → 100%)
  const sizeLvl = lv.size;
  const charScale = (sizeLvl === 0 ? 0.42 : 0.42 + sizeLvl * 0.12) * explodeScale * bump;
  const charBaseR = Math.min(W, H) * 0.28;
  const charR = charBaseR * charScale;
  // Sit on top of throne (throne adds height; character rises with it)
  const throneH = lv.throne > 0 ? (8 + lv.throne * 8) : 0;
  const cyC = groundY - throneH - charR * 0.85 + bob + bumpY;

  // Shake offset
  const shakeX = explodeShake ? (Math.random() - 0.5) * explodeShake : 0;
  const shakeY = explodeShake ? (Math.random() - 0.5) * explodeShake : 0;

  c.save();
  c.globalAlpha = explodeAlpha;
  // Shadow under the character
  c.fillStyle = 'rgba(0,0,0,0.4)';
  c.beginPath();
  c.ellipse(cxC + shakeX, groundY - throneH + 4, charR * 0.7, charR * 0.18, 0, 0, Math.PI * 2);
  c.fill();

  // Dispatch: prefer real-art PNG (Nano Banana Pro) over canvas drawer.
  // The PNG already has the kawaii outline + accessories baked in, so
  // we just blit it at the computed character size. The canvas drawers
  // remain as offline fallback.
  const heroKey = theme.character === 'dragon' ? '_u_character_dragon' : '_u_character_pig';
  const heroEntry = tileImages[heroKey];
  if (heroEntry && heroEntry.isPng && heroEntry.canvas) {
    const drawR = charR * 1.55;       // PNG occupies a bit more canvas (~80% subject fill)
    c.drawImage(heroEntry.canvas, cxC + shakeX - drawR, cyC + shakeY - drawR, drawR * 2, drawR * 2);
  } else {
    const draw = theme.character === 'dragon' ? drawCharDragon : drawCharPig;
    draw(c, cxC + shakeX, cyC + shakeY, charR, lv, pal, tt);
  }
  c.restore();

  // ---- BLING (sparkles, chains around character) ----
  if (lv.bling > 0) drawCharBling(c, cxC, cyC, charR, lv.bling, pal, tt);

  // ---- Floating hearts from joy-jumps ----
  if (typeof drawCharHearts === 'function') drawCharHearts(c);

  // ---- Falling-coin upgrade animation overlay ----
  if (mountainCoinAnims.length) {
    const entry = tileImages && tileImages._t_coin;
    const src = entry && entry.canvas ? entry.canvas : null;
    if (src) {
      for (const p of mountainCoinAnims) {
        const size = p.baseSize;
        c.globalAlpha = p.alpha;
        c.drawImage(src, p.x - size/2, p.y - size/2, size, size);
      }
      c.globalAlpha = 1;
    }
  }
  // ---- Explosion overlay flash ----
  if (explode) {
    const dt = (now() - explode.startedAt) / explode.duration;
    if (dt >= 0.50 && dt < 0.62) {
      const a = 1 - (dt - 0.50) / 0.12;
      c.fillStyle = 'rgba(255, 240, 180, ' + (0.85 * a) + ')';
      c.fillRect(0, 0, W, H);
    }
  }
}

// ============== Common character helpers ==============

// Pile of coins under character. Higher level = taller pile.
function drawCoinThrone(c, cx, baseY, maxW, level, pal) {
  const rows = level;        // 1..5
  for (let row = 0; row < rows; row++) {
    const y = baseY - 8 - row * 12;
    const w = maxW * (0.95 - row * 0.10);
    const coinCount = Math.max(4, Math.floor(w / 14));
    for (let i = 0; i < coinCount; i++) {
      const t = i / (coinCount - 1);
      const x = cx - w / 2 + t * w;
      const yJit = ((i * 17) % 5) - 2;
      drawSmallCoin(c, x, y + yJit, 9, pal);
    }
  }
}
function drawSmallCoin(c, x, y, r, pal) {
  const grad = c.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  grad.addColorStop(0, pal.accentHi || '#fff4b0');
  grad.addColorStop(0.6, pal.accent || '#ffd864');
  grad.addColorStop(1, pal.accentLo || '#a06a14');
  c.fillStyle = grad;
  c.beginPath();
  c.arc(x, y, r, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = 'rgba(80, 40, 6, 0.7)';
  c.lineWidth = 1;
  c.stroke();
}

// ============== CAPTAIN PIGGY drawer — chunky cute cartoon pig ==============
// Animation: squash+stretch breathing, independently-wiggling ears, curly
// wagging tail, blink with random offset, brows go up when happy.
function drawCharPig(c, cx, cy, r, lv, pal, tt) {
  // Per-character cycle helpers
  const breath = Math.sin(tt * 2.2);
  const squashX = 1 + breath * 0.035;
  const squashY = 1 - breath * 0.04;
  // Ears wiggle a bit out of phase
  const earWigL = Math.sin(tt * 3.0)        * 0.16;
  const earWigR = Math.sin(tt * 2.7 + 0.9)  * 0.16;
  // Curly tail wag
  const tailAngle = Math.sin(tt * 4.5) * 0.6;
  // Blink: short snap closed every ~3.2s, offset by an eye-specific phase
  const blinkPhase = (tt * 0.45) % 1;
  const blinking = blinkPhase < 0.04;
  // Brows lift when fed (excited)
  const browLift = lv.feed >= 1 ? -r * 0.06 : 0;
  // Outline thickness — chunky toon
  const OL = '#3a1a05';
  const lwBig = Math.max(3, r * 0.075);
  const lwMid = Math.max(2, r * 0.045);
  const lwSm  = Math.max(1.5, r * 0.030);

  const bodyW = r * 1.20 * squashX * (1 + lv.feed * 0.025);
  const bodyH = r * 1.10 * squashY * (1 + lv.feed * 0.015);

  // ---- Curly tail (drawn first, behind body) ----
  c.save();
  c.translate(cx + bodyW * 0.62, cy);
  c.rotate(tailAngle);
  c.strokeStyle = pal.bodyShadow || '#c8344f';
  c.lineWidth = lwMid;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(r * 0.15, -r * 0.08,  r * 0.30,  r * 0.12, r * 0.20,  r * 0.05);
  c.bezierCurveTo(r * 0.05, -r * 0.05, -r * 0.05,  r * 0.18, r * 0.10, -r * 0.18);
  c.stroke();
  c.restore();

  // ---- Tiny stubby legs (peek under body) ----
  c.fillStyle = pal.bodyShadow || '#c8344f';
  c.strokeStyle = OL;
  c.lineWidth = lwSm;
  for (const sgn of [-1, 1]) {
    const fx = cx + sgn * bodyW * 0.28;
    const fy = cy + bodyH * 0.80;
    c.beginPath();
    c.ellipse(fx, fy, r * 0.13, r * 0.10, 0, 0, Math.PI * 2);
    c.fill();
    c.stroke();
  }

  // ---- BODY (chunky soft round-rect blob, one shape for head+belly) ----
  c.fillStyle = pal.body || '#ffafce';
  c.strokeStyle = OL;
  c.lineWidth = lwBig;
  c.lineJoin = 'round';
  c.beginPath();
  c.ellipse(cx, cy, bodyW, bodyH, 0, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  // Soft belly shadow on lower-right
  c.save();
  c.beginPath();
  c.ellipse(cx, cy, bodyW, bodyH, 0, 0, Math.PI * 2);
  c.clip();
  c.fillStyle = 'rgba(150, 50, 90, 0.22)';
  c.beginPath();
  c.ellipse(cx + bodyW * 0.18, cy + bodyH * 0.50, bodyW * 0.85, bodyH * 0.55, 0, 0, Math.PI * 2);
  c.fill();
  // Glossy highlight on upper-left (a single white smear)
  c.fillStyle = 'rgba(255, 255, 255, 0.45)';
  c.beginPath();
  c.ellipse(cx - bodyW * 0.35, cy - bodyH * 0.45, bodyW * 0.22, bodyH * 0.12, -0.3, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // ---- EARS (floppy triangles, wiggle independently) ----
  c.fillStyle = pal.ear || '#ff77a8';
  c.strokeStyle = OL;
  c.lineWidth = lwSm;
  for (const cfg of [
    { sgn: -1, wig: earWigL },
    { sgn:  1, wig: earWigR },
  ]) {
    c.save();
    c.translate(cx + cfg.sgn * bodyW * 0.55, cy - bodyH * 0.72);
    c.rotate(cfg.sgn * (0.4 + cfg.wig));
    c.beginPath();
    c.moveTo(0, 0);
    c.quadraticCurveTo(r * 0.05, -r * 0.30, r * 0.18, -r * 0.20);
    c.quadraticCurveTo(r * 0.20, -r * 0.04, r * 0.05, r * 0.04);
    c.closePath();
    c.fill();
    c.stroke();
    // Inner ear shadow
    c.fillStyle = 'rgba(150, 40, 80, 0.45)';
    c.beginPath();
    c.moveTo(r * 0.02, -r * 0.04);
    c.quadraticCurveTo(r * 0.08, -r * 0.16, r * 0.13, -r * 0.13);
    c.quadraticCurveTo(r * 0.15, -r * 0.03, r * 0.06, r * 0.02);
    c.closePath();
    c.fill();
    c.fillStyle = pal.ear || '#ff77a8';
    c.restore();
  }

  // ---- SNOUT (oval below center) ----
  const snoutY = cy + bodyH * 0.18;
  c.fillStyle = pal.snout || '#ffd0e0';
  c.strokeStyle = OL;
  c.lineWidth = lwSm;
  c.beginPath();
  c.ellipse(cx, snoutY, bodyW * 0.36, bodyH * 0.28, 0, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  // Nostrils (small ovals)
  c.fillStyle = OL;
  c.beginPath();
  c.ellipse(cx - bodyW * 0.10, snoutY, r * 0.05, r * 0.07, 0, 0, Math.PI * 2);
  c.ellipse(cx + bodyW * 0.10, snoutY, r * 0.05, r * 0.07, 0, 0, Math.PI * 2);
  c.fill();

  // ---- CHEEK BLUSH (always — extra rosy if recently fed) ----
  c.save();
  c.globalAlpha = lv.feed >= 1 ? 0.65 : 0.4;
  c.fillStyle = '#ff6a8a';
  c.beginPath();
  c.ellipse(cx - bodyW * 0.55, cy + bodyH * 0.10, bodyW * 0.14, bodyH * 0.07, 0, 0, Math.PI * 2);
  c.ellipse(cx + bodyW * 0.55, cy + bodyH * 0.10, bodyW * 0.14, bodyH * 0.07, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // ---- EYES (big round whites with pupil + huge shine) ----
  const eyeY = cy - bodyH * 0.20 + browLift;
  const eyeOffsetX = bodyW * 0.30;
  for (const sgn of [-1, 1]) {
    const ex = cx + sgn * eyeOffsetX;
    if (blinking) {
      // Closed: a curved line
      c.strokeStyle = OL;
      c.lineWidth = lwMid;
      c.lineCap = 'round';
      c.beginPath();
      c.moveTo(ex - r * 0.13, eyeY);
      c.quadraticCurveTo(ex, eyeY + r * 0.06, ex + r * 0.13, eyeY);
      c.stroke();
      continue;
    }
    // Eye white
    c.fillStyle = '#ffffff';
    c.strokeStyle = OL;
    c.lineWidth = lwSm;
    c.beginPath();
    c.ellipse(ex, eyeY, r * 0.17, r * 0.20, 0, 0, Math.PI * 2);
    c.fill();
    c.stroke();
    // $ pupil (lvl 1+) or normal dark pupil
    if (lv.feed >= 1) {
      c.fillStyle = pal.accent || '#ffd864';
      c.beginPath();
      c.ellipse(ex, eyeY + r * 0.02, r * 0.11, r * 0.13, 0, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = pal.accentLo || '#a06a14';
      c.lineWidth = lwSm * 0.6;
      c.stroke();
      c.fillStyle = OL;
      c.font = 'bold ' + Math.floor(r * 0.20) + 'px -apple-system, sans-serif';
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText('$', ex, eyeY + r * 0.03);
    } else {
      // Big dark pupil
      c.fillStyle = OL;
      c.beginPath();
      c.ellipse(ex, eyeY + r * 0.02, r * 0.09, r * 0.12, 0, 0, Math.PI * 2);
      c.fill();
    }
    // Two-dot shine on the pupil for that "alive" cartoon look
    c.fillStyle = '#ffffff';
    c.beginPath();
    c.arc(ex - r * 0.04, eyeY - r * 0.05, r * 0.035, 0, Math.PI * 2);
    c.arc(ex + r * 0.05, eyeY + r * 0.03, r * 0.015, 0, Math.PI * 2);
    c.fill();
  }

  // ---- EYEBROWS (only show when fed — surprised happy look) ----
  if (lv.feed >= 1) {
    c.strokeStyle = OL;
    c.lineWidth = lwSm;
    c.lineCap = 'round';
    for (const sgn of [-1, 1]) {
      const bx = cx + sgn * bodyW * 0.30;
      const by = eyeY - r * 0.27;
      c.beginPath();
      c.moveTo(bx - r * 0.10, by + r * 0.04);
      c.quadraticCurveTo(bx, by - r * 0.02, bx + r * 0.10, by + r * 0.04);
      c.stroke();
    }
  }

  // ---- MOUTH (changes with feed level — happy smile → coins stuffed → tongue out) ----
  const mouthY = cy + bodyH * 0.55;
  c.strokeStyle = OL;
  c.lineWidth = lwMid;
  c.lineCap = 'round';
  if (lv.feed >= 4) {
    // Tongue stuck out (overstuffed!)
    c.fillStyle = OL;
    c.beginPath();
    c.arc(cx, mouthY, r * 0.18, 0, Math.PI);
    c.fill();
    c.fillStyle = '#ff6a8a';
    c.beginPath();
    c.ellipse(cx + r * 0.04, mouthY + r * 0.16, r * 0.12, r * 0.13, 0, 0, Math.PI * 2);
    c.fill();
    c.stroke();
  } else if (lv.feed >= 2) {
    // Open mouth with coins stuffed in
    c.fillStyle = OL;
    c.beginPath();
    c.arc(cx, mouthY, r * 0.18, 0, Math.PI);
    c.fill();
    c.stroke();
    const coins = Math.min(3, lv.feed - 1);
    for (let k = 0; k < coins; k++) {
      drawSmallCoin(c, cx + (k - (coins - 1) / 2) * r * 0.18, mouthY + r * 0.06, r * 0.085, pal);
    }
  } else {
    // Plain happy smile (curve only)
    c.beginPath();
    c.moveTo(cx - r * 0.16, mouthY);
    c.quadraticCurveTo(cx, mouthY + r * 0.15, cx + r * 0.16, mouthY);
    c.stroke();
  }

  // ---- BLING items on the body (chains, gold tooth, etc.) ----
  if (lv.bling > 0) drawPigBling(c, cx, cy, bodyW, bodyH, r, lv.bling, pal, OL, lwSm);

  // ---- HAT / CROWN on top ----
  if (lv.crown > 0) drawPirateHat(c, cx, cy - bodyH * 0.85, r, lv.crown, pal);
}

// Body-level bling: chains, etc.
function drawPigBling(c, cx, cy, bw, bh, r, level, pal, OL, lw) {
  // Gold chain necklace at lvl 1+
  c.save();
  c.beginPath();
  c.ellipse(cx, cy, bw, bh, 0, 0, Math.PI * 2);
  c.clip();
  const chainY = cy + bh * 0.30;
  c.strokeStyle = pal.accent || '#ffd864';
  c.lineWidth = lw * 2.2;
  c.beginPath();
  c.moveTo(cx - bw * 0.5, chainY);
  c.quadraticCurveTo(cx, chainY + bh * 0.18, cx + bw * 0.5, chainY);
  c.stroke();
  c.strokeStyle = pal.accentLo || '#a06a14';
  c.lineWidth = lw * 0.6;
  c.beginPath();
  c.moveTo(cx - bw * 0.5, chainY);
  c.quadraticCurveTo(cx, chainY + bh * 0.18, cx + bw * 0.5, chainY);
  c.stroke();
  // Hanging gold pendant
  c.fillStyle = pal.accent || '#ffd864';
  c.strokeStyle = pal.accentLo || '#a06a14';
  c.lineWidth = lw * 0.6;
  c.beginPath();
  c.arc(cx, chainY + bh * 0.20, r * 0.10, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  c.fillStyle = OL;
  c.font = 'bold ' + Math.floor(r * 0.14) + 'px -apple-system, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('$', cx, chainY + bh * 0.21);
  c.restore();
  // Gold tooth — visible only when mouth is open (lvl 3+ AND feed >= 2)
  // (Skipping for clarity — covered by the bling sparkle ring outside body.)
}

function drawPirateHat(c, cx, topY, r, level, pal) {
  // Pirate tricorn / captain's hat — gets fancier per level.
  const w = r * (0.95 + level * 0.10);
  const h = r * (0.30 + level * 0.05);
  c.fillStyle = pal.hat || '#1a1a1a';
  c.strokeStyle = pal.bodyShadow || '#c8344f';
  c.lineWidth = Math.max(1.5, r * 0.035);
  c.beginPath();
  c.moveTo(cx - w * 0.55, topY + h * 0.95);
  c.quadraticCurveTo(cx - w * 0.45, topY + h * 0.20, cx, topY);
  c.quadraticCurveTo(cx + w * 0.45, topY + h * 0.20, cx + w * 0.55, topY + h * 0.95);
  c.quadraticCurveTo(cx, topY + h * 0.78, cx - w * 0.55, topY + h * 0.95);
  c.closePath();
  c.fill();
  c.stroke();
  // Hat band at level 2+
  if (level >= 2) {
    c.fillStyle = pal.hatBand || '#c8344f';
    c.fillRect(cx - w * 0.42, topY + h * 0.55, w * 0.84, h * 0.18);
  }
  // Skull emblem at level 3+
  if (level >= 3) {
    c.fillStyle = '#fff';
    c.font = 'bold ' + Math.floor(r * 0.22) + 'px -apple-system, sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('💀', cx, topY + h * 0.40);
  }
  // Feather at level 4+
  if (level >= 4) {
    c.fillStyle = pal.accent || '#ffd864';
    c.strokeStyle = pal.accentLo || '#a06a14';
    c.lineWidth = Math.max(1, r * 0.020);
    c.beginPath();
    c.moveTo(cx + w * 0.40, topY + h * 0.15);
    c.quadraticCurveTo(cx + w * 0.75, topY - h * 1.2, cx + w * 0.90, topY - h * 1.0);
    c.quadraticCurveTo(cx + w * 0.65, topY - h * 0.5, cx + w * 0.40, topY + h * 0.15);
    c.closePath();
    c.fill();
    c.stroke();
  }
  // Crown (level 5 — pirate goes ROYAL)
  if (level >= 5) {
    c.fillStyle = pal.accent || '#ffd864';
    c.strokeStyle = pal.accentLo || '#a06a14';
    c.lineWidth = Math.max(1.5, r * 0.025);
    c.beginPath();
    c.moveTo(cx - w * 0.35, topY - h * 0.15);
    c.lineTo(cx - w * 0.30, topY - h * 0.50);
    c.lineTo(cx - w * 0.15, topY - h * 0.25);
    c.lineTo(cx,            topY - h * 0.65);
    c.lineTo(cx + w * 0.15, topY - h * 0.25);
    c.lineTo(cx + w * 0.30, topY - h * 0.50);
    c.lineTo(cx + w * 0.35, topY - h * 0.15);
    c.closePath();
    c.fill();
    c.stroke();
  }
}

// ============== BABY DRAKE drawer — chunky cute baby dragon ==============
function drawCharDragon(c, cx, cy, r, lv, pal, tt) {
  const OL = '#0a0510';
  const lwBig = Math.max(3, r * 0.075);
  const lwMid = Math.max(2, r * 0.045);
  const lwSm  = Math.max(1.5, r * 0.030);
  // Breathing
  const breath = Math.sin(tt * 2.2);
  const sqx = 1 + breath * 0.035;
  const sqy = 1 - breath * 0.04;
  // Wings flap at crown >= 2 (folded otherwise)
  const wingFlap = Math.sin(tt * 2.8) * 0.5;
  const blinkPhase = (tt * 0.42 + 0.3) % 1;
  const blinking = blinkPhase < 0.04;

  const bodyW = r * 1.12 * sqx * (1 + lv.feed * 0.025);
  const bodyH = r * 1.06 * sqy * (1 + lv.feed * 0.015);

  // ---- TAIL (curls behind body, with spikes) ----
  c.save();
  c.translate(cx + bodyW * 0.55, cy + bodyH * 0.10);
  const tailWag = Math.sin(tt * 3.0) * 0.3;
  c.rotate(0.4 + tailWag);
  c.strokeStyle = pal.bodyShadow || '#2a5a1a';
  c.fillStyle   = pal.body || '#5a8c3a';
  c.lineWidth = lwMid;
  c.lineCap = 'round';
  // Tail body (tapered curve)
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(r * 0.40, -r * 0.05, r * 0.55, r * 0.20, r * 0.45, r * 0.40);
  c.bezierCurveTo(r * 0.40, r * 0.55, r * 0.32, r * 0.55, r * 0.30, r * 0.42);
  c.bezierCurveTo(r * 0.30, r * 0.30, r * 0.40, r * 0.15, 0, r * 0.10);
  c.closePath();
  c.fill();
  c.strokeStyle = OL;
  c.lineWidth = lwSm;
  c.stroke();
  // Spade tip on tail
  c.fillStyle = pal.bodyShadow || '#2a5a1a';
  c.beginPath();
  c.moveTo(r * 0.40, r * 0.45);
  c.lineTo(r * 0.58, r * 0.32);
  c.lineTo(r * 0.50, r * 0.55);
  c.lineTo(r * 0.32, r * 0.62);
  c.closePath();
  c.fill();
  c.stroke();
  c.restore();

  // ---- WINGS (folded little ones always; spread at crown ≥ 2) ----
  if (lv.crown >= 2) {
    const wingsExtra = (lv.crown - 1) * 0.12;
    c.fillStyle = pal.bodyShadow || '#2a5a1a';
    c.strokeStyle = OL;
    c.lineWidth = lwMid;
    for (const sgn of [-1, 1]) {
      c.save();
      c.translate(cx + sgn * bodyW * 0.55, cy - bodyH * 0.05);
      c.rotate(sgn * (0.2 + wingFlap * 0.25));
      // Wing main
      c.beginPath();
      c.moveTo(0, 0);
      c.quadraticCurveTo(sgn * r * (0.55 + wingsExtra), -r * (0.65 + wingsExtra),
                         sgn * r * (0.85 + wingsExtra), -r * (0.20));
      c.lineTo(sgn * r * 0.45, r * 0.10);
      c.closePath();
      c.fill();
      c.stroke();
      // Inner wing membrane lines
      c.strokeStyle = OL;
      c.lineWidth = lwSm;
      c.beginPath();
      c.moveTo(0, 0);
      c.lineTo(sgn * r * (0.60 + wingsExtra), -r * 0.35);
      c.moveTo(0, 0);
      c.lineTo(sgn * r * (0.75 + wingsExtra), -r * 0.10);
      c.stroke();
      c.restore();
    }
  } else {
    // Folded baby wings
    c.fillStyle = pal.bodyShadow || '#2a5a1a';
    c.strokeStyle = OL;
    c.lineWidth = lwSm;
    for (const sgn of [-1, 1]) {
      c.beginPath();
      c.ellipse(cx + sgn * bodyW * 0.50, cy - bodyH * 0.10, r * 0.18, r * 0.28, sgn * 0.4, 0, Math.PI * 2);
      c.fill();
      c.stroke();
    }
  }

  // ---- BACK SPIKES (always 3, more with size lvl) ----
  c.fillStyle = pal.bodyShadow || '#2a5a1a';
  c.strokeStyle = OL;
  c.lineWidth = lwSm;
  const spikeCount = 3 + lv.size;
  for (let i = 0; i < spikeCount; i++) {
    const t = (i + 1) / (spikeCount + 1);
    const sx = cx + (t - 0.5) * bodyW * 1.4;
    const arcH = Math.sin(t * Math.PI);
    const sy = cy - bodyH * 0.78 - arcH * r * 0.20;
    const sh = r * (0.16 + arcH * 0.08);
    c.beginPath();
    c.moveTo(sx - r * 0.09, sy);
    c.lineTo(sx, sy - sh);
    c.lineTo(sx + r * 0.09, sy);
    c.closePath();
    c.fill();
    c.stroke();
  }

  // ---- BODY (round green blob) ----
  c.fillStyle = pal.body || '#5a8c3a';
  c.strokeStyle = OL;
  c.lineWidth = lwBig;
  c.lineJoin = 'round';
  c.beginPath();
  c.ellipse(cx, cy, bodyW, bodyH, 0, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  // Belly (lighter patch oval)
  c.fillStyle = pal.snout || '#a8d27a';
  c.beginPath();
  c.ellipse(cx, cy + bodyH * 0.22, bodyW * 0.65, bodyH * 0.55, 0, 0, Math.PI * 2);
  c.fill();
  // Belly scale lines
  c.strokeStyle = 'rgba(40, 70, 20, 0.45)';
  c.lineWidth = lwSm * 0.6;
  for (const t of [-0.25, 0, 0.25]) {
    c.beginPath();
    c.moveTo(cx - bodyW * 0.50, cy + bodyH * (0.22 + t));
    c.quadraticCurveTo(cx, cy + bodyH * (0.32 + t), cx + bodyW * 0.50, cy + bodyH * (0.22 + t));
    c.stroke();
  }
  // Glossy highlight
  c.save();
  c.beginPath();
  c.ellipse(cx, cy, bodyW, bodyH, 0, 0, Math.PI * 2);
  c.clip();
  c.fillStyle = 'rgba(255, 255, 255, 0.30)';
  c.beginPath();
  c.ellipse(cx - bodyW * 0.35, cy - bodyH * 0.45, bodyW * 0.22, bodyH * 0.12, -0.3, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // ---- SNOUT (slightly forward of body) ----
  const snoutY = cy + bodyH * 0.10;
  c.fillStyle = pal.body || '#5a8c3a';
  c.strokeStyle = OL;
  c.lineWidth = lwSm;
  c.beginPath();
  c.ellipse(cx, snoutY, bodyW * 0.50, bodyH * 0.32, 0, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  // Nostrils
  c.fillStyle = OL;
  c.beginPath();
  c.ellipse(cx - bodyW * 0.18, snoutY - bodyH * 0.04, r * 0.05, r * 0.07, 0, 0, Math.PI * 2);
  c.ellipse(cx + bodyW * 0.18, snoutY - bodyH * 0.04, r * 0.05, r * 0.07, 0, 0, Math.PI * 2);
  c.fill();
  // Fire puffs at bling >= 1
  if (lv.bling >= 1) {
    const puff = 0.5 + 0.5 * Math.sin(tt * 5);
    for (const sgn of [-1, 1]) {
      const fx = cx + sgn * bodyW * 0.18;
      const fy = snoutY + bodyH * 0.04 + puff * r * 0.06;
      c.fillStyle = 'rgba(255, 180, 60, ' + (0.55 + puff * 0.4) + ')';
      c.beginPath();
      c.arc(fx, fy, r * 0.07 + puff * r * 0.04, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = 'rgba(255, 240, 160, ' + (0.45 + puff * 0.4) + ')';
      c.beginPath();
      c.arc(fx, fy + r * 0.01, r * 0.035, 0, Math.PI * 2);
      c.fill();
    }
  }

  // ---- HORNS (start at bling, grow with crown) ----
  const horn = Math.max(0, lv.crown);
  if (horn > 0) {
    c.fillStyle = '#e0c898';
    c.strokeStyle = OL;
    c.lineWidth = lwSm;
    for (const sgn of [-1, 1]) {
      const hx = cx + sgn * bodyW * 0.25;
      const hy = cy - bodyH * 0.75;
      c.beginPath();
      c.moveTo(hx - r * 0.04, hy);
      c.quadraticCurveTo(hx + sgn * r * 0.05, hy - r * 0.22, hx + sgn * r * 0.08, hy - r * (0.28 + horn * 0.04));
      c.quadraticCurveTo(hx + sgn * r * 0.02, hy - r * 0.20, hx + r * 0.04, hy);
      c.closePath();
      c.fill();
      c.stroke();
    }
  }

  // ---- EYES (big rounder than pig's, sparkly) ----
  const eyeY = cy - bodyH * 0.25;
  const eyeOffsetX = bodyW * 0.32;
  for (const sgn of [-1, 1]) {
    const ex = cx + sgn * eyeOffsetX;
    if (blinking) {
      c.strokeStyle = OL;
      c.lineWidth = lwMid;
      c.lineCap = 'round';
      c.beginPath();
      c.moveTo(ex - r * 0.14, eyeY);
      c.quadraticCurveTo(ex, eyeY + r * 0.06, ex + r * 0.14, eyeY);
      c.stroke();
      continue;
    }
    // Eye white
    c.fillStyle = '#ffffff';
    c.strokeStyle = OL;
    c.lineWidth = lwSm;
    c.beginPath();
    c.ellipse(ex, eyeY, r * 0.19, r * 0.22, 0, 0, Math.PI * 2);
    c.fill();
    c.stroke();
    if (lv.feed >= 1) {
      c.fillStyle = pal.accent || '#7ec2ff';
      c.beginPath();
      c.ellipse(ex, eyeY + r * 0.02, r * 0.13, r * 0.15, 0, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = OL;
      c.font = 'bold ' + Math.floor(r * 0.22) + 'px -apple-system, sans-serif';
      c.textAlign = 'center';
      c.textBaseline = 'middle';
      c.fillText('$', ex, eyeY + r * 0.03);
    } else {
      // Big oval pupil with slit (dragon-like)
      c.fillStyle = OL;
      c.beginPath();
      c.ellipse(ex, eyeY + r * 0.02, r * 0.05, r * 0.16, 0, 0, Math.PI * 2);
      c.fill();
    }
    // Sparkle shine
    c.fillStyle = '#ffffff';
    c.beginPath();
    c.arc(ex - r * 0.05, eyeY - r * 0.07, r * 0.04, 0, Math.PI * 2);
    c.arc(ex + r * 0.06, eyeY + r * 0.04, r * 0.018, 0, Math.PI * 2);
    c.fill();
  }

  // ---- MOUTH (smile / open with gem / tongue out) ----
  const mouthY = cy + bodyH * 0.40;
  c.strokeStyle = OL;
  c.lineWidth = lwMid;
  c.lineCap = 'round';
  if (lv.feed >= 4) {
    // Tongue out
    c.fillStyle = OL;
    c.beginPath();
    c.arc(cx, mouthY, r * 0.18, 0, Math.PI);
    c.fill();
    c.stroke();
    c.fillStyle = '#ff6a8a';
    c.beginPath();
    c.ellipse(cx, mouthY + r * 0.13, r * 0.12, r * 0.13, 0, 0, Math.PI * 2);
    c.fill();
    // Tiny gem teeth
    c.fillStyle = '#fff';
    c.fillRect(cx - r * 0.10, mouthY, r * 0.04, r * 0.06);
    c.fillRect(cx + r * 0.06, mouthY, r * 0.04, r * 0.06);
  } else if (lv.feed >= 2) {
    c.fillStyle = OL;
    c.beginPath();
    c.arc(cx, mouthY, r * 0.18, 0, Math.PI);
    c.fill();
    c.stroke();
    c.fillStyle = '#fff';
    c.fillRect(cx - r * 0.10, mouthY, r * 0.04, r * 0.06);
    c.fillRect(cx + r * 0.06, mouthY, r * 0.04, r * 0.06);
    drawSmallCoin(c, cx, mouthY + r * 0.07, r * 0.08, pal);
  } else {
    c.beginPath();
    c.moveTo(cx - r * 0.16, mouthY);
    c.quadraticCurveTo(cx, mouthY + r * 0.13, cx + r * 0.16, mouthY);
    c.stroke();
  }

  // ---- CHEEK BLUSH ----
  c.save();
  c.globalAlpha = lv.feed >= 1 ? 0.65 : 0.45;
  c.fillStyle = '#ff8a4a';
  c.beginPath();
  c.ellipse(cx - bodyW * 0.50, cy + bodyH * 0.10, bodyW * 0.13, bodyH * 0.07, 0, 0, Math.PI * 2);
  c.ellipse(cx + bodyW * 0.50, cy + bodyH * 0.10, bodyW * 0.13, bodyH * 0.07, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // ---- HAT / CROWN ----
  if (lv.crown > 0) drawDragonCrown(c, cx, cy - bodyH * 0.90, r, lv.crown, pal);
}

function drawDragonCrown(c, cx, topY, r, level, pal) {
  // Tiny crown made of coins/jewels
  const w = r * (0.55 + level * 0.10);
  const h = r * (0.18 + level * 0.05);
  c.fillStyle = pal.accent || '#7ec2ff';
  c.strokeStyle = pal.accentLo || '#1a4a8a';
  c.lineWidth = Math.max(1.5, r * 0.030);
  c.beginPath();
  c.moveTo(cx - w * 0.5, topY + h);
  c.lineTo(cx - w * 0.5, topY + h * 0.2);
  c.lineTo(cx - w * 0.30, topY + h * 0.5);
  c.lineTo(cx - w * 0.10, topY);
  c.lineTo(cx + w * 0.10, topY);
  c.lineTo(cx + w * 0.30, topY + h * 0.5);
  c.lineTo(cx + w * 0.5, topY + h * 0.2);
  c.lineTo(cx + w * 0.5, topY + h);
  c.closePath();
  c.fill();
  c.stroke();
  // Gems on the crown at higher levels
  if (level >= 3) {
    c.fillStyle = '#ff3b7a';
    c.beginPath();
    c.arc(cx, topY + h * 0.6, r * 0.05, 0, Math.PI * 2);
    c.fill();
  }
  if (level >= 4) {
    c.fillStyle = pal.accent || '#7ec2ff';
    c.beginPath();
    c.arc(cx - w * 0.30, topY + h * 0.65, r * 0.04, 0, Math.PI * 2);
    c.arc(cx + w * 0.30, topY + h * 0.65, r * 0.04, 0, Math.PI * 2);
    c.fill();
  }
}

// Bling sparkles around the character
function drawCharBling(c, cx, cy, r, level, pal, tt) {
  const cnt = 4 + level * 3;
  const ringR = r * 1.2;
  const color = pal.aura || 'rgba(255, 232, 140, 0.85)';
  for (let i = 0; i < cnt; i++) {
    const a = (i / cnt) * Math.PI * 2 + tt * 0.6;
    const wob = Math.sin(tt * 2 + i) * r * 0.08;
    const sx = cx + Math.cos(a) * (ringR + wob);
    const sy = cy + Math.sin(a) * (ringR * 0.6 + wob);
    const tw = 0.5 + 0.5 * Math.sin(tt * 3 + i);
    c.fillStyle = color;
    c.globalAlpha = 0.6 * tw;
    c.beginPath();
    c.arc(sx, sy, 2 + tw * 1.5, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;
  // Stars sparkling — level 3+ adds bigger sparkle stars
  if (level >= 3) {
    for (let i = 0; i < level - 2; i++) {
      const a = (i / Math.max(1, level - 2)) * Math.PI * 2 + tt * 0.4;
      const sx = cx + Math.cos(a) * ringR * 1.1;
      const sy = cy + Math.sin(a) * ringR * 0.7;
      const tw = 0.5 + 0.5 * Math.sin(tt * 2 + i);
      drawSparkle(c, sx, sy, 8 + tw * 4, 0.85);
    }
  }
}

// Triggered when a card is upgraded — character does a joy-jump.
let _charBumpAt = 0;
// Floating hearts ("♥ / +") that drift up from the character on upgrade.
const _charHearts = [];
function triggerCharBump() {
  _charBumpAt = now();
  if (!ensureMountainCanvas()) return;
  if (mountainW === 0) return;
  for (let i = 0; i < 4; i++) {
    _charHearts.push({
      x: mountainW * 0.5 + (Math.random() - 0.5) * mountainW * 0.30,
      y: mountainH * 0.50,
      vx: (Math.random() - 0.5) * 40,
      vy: -50 - Math.random() * 80,
      life: 0,
      ttl: 0.9 + Math.random() * 0.4,
      size: 16 + Math.random() * 10,
      glyph: Math.random() < 0.5 ? '♥' : '+',
    });
  }
}
function updateCharHearts(dtMs) {
  if (_charHearts.length === 0) return;
  const dt = Math.min(50, dtMs) / 1000;
  for (let i = _charHearts.length - 1; i >= 0; i--) {
    const h = _charHearts[i];
    h.life += dt;
    h.vy += 80 * dt;   // slight gravity so they slow
    h.x += h.vx * dt;
    h.y += h.vy * dt;
    if (h.life >= h.ttl) _charHearts.splice(i, 1);
  }
}
function drawCharHearts(c) {
  if (_charHearts.length === 0) return;
  c.save();
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  for (const h of _charHearts) {
    const t = h.life / h.ttl;
    c.globalAlpha = Math.max(0, 1 - t);
    c.fillStyle = '#ff6a8a';
    c.strokeStyle = '#ffffff';
    c.lineWidth = 2;
    c.font = 'bold ' + Math.floor(h.size * (1 + t * 0.3)) + 'px -apple-system, sans-serif';
    c.strokeText(h.glyph, h.x, h.y);
    c.fillText(h.glyph, h.x, h.y);
  }
  c.restore();
}

// Fires when all 5 slots hit level 5. Plays a 3-second explosion

// Upgrade animation: drop N coins from the top of the canvas to the
// mountain, where they "land" and disappear with a tiny bounce.
function spawnMountainUpgradeCoins(layerName) {
  if (!ensureMountainCanvas()) return;
  if (mountainW === 0) return;
  const cnt = 10;
  const groundY = mountainH * 0.8;
  for (let i = 0; i < cnt; i++) {
    const x = mountainW * (0.3 + Math.random() * 0.4);
    const targetY = groundY - Math.random() * (groundY * 0.5);
    mountainCoinAnims.push({
      x,
      y: -40,
      vy: 220 + Math.random() * 180,
      targetY,
      baseSize: 18 + Math.random() * 14,
      alpha: 1,
      delay: i * 0.04,
      landed: false,
    });
  }
}

function updateMountainAnims(dtMs) {
  if (mountainCoinAnims.length === 0) return;
  const dt = Math.min(50, dtMs) / 1000;
  for (let i = mountainCoinAnims.length - 1; i >= 0; i--) {
    const p = mountainCoinAnims[i];
    if (p.delay > 0) { p.delay -= dt; continue; }
    if (!p.landed) {
      p.vy += 800 * dt;
      p.y += p.vy * dt;
      if (p.y >= p.targetY) {
        p.y = p.targetY;
        p.landed = true;
        p.lifeLeft = 0.35;
      }
    } else {
      p.lifeLeft -= dt;
      p.alpha = Math.max(0, p.lifeLeft / 0.35);
      if (p.lifeLeft <= 0) mountainCoinAnims.splice(i, 1);
    }
  }
}

// Helper — call this at the END of a scoring step, once. Aims the
// burst from the average matched-cell position; count scales with
// match size and cascade depth, capped to keep particle budget tame.
function spawnCoinShowerForStep(cells, stepCoins, cascadeDepth) {
  if (!cells || cells.size === 0 || stepCoins <= 0) return;
  let sumR = 0, sumC = 0, n = 0;
  for (const key of cells) {
    const [r, c] = key.split(',').map(Number);
    sumR += r; sumC += c; n++;
  }
  const avgR = sumR / n;
  const avgC = sumC / n;
  const rect = canvas.getBoundingClientRect();
  const srcX = rect.left + (avgC + 0.5) * CELL;
  const srcY = rect.top  + (avgR + 0.5) * CELL;
  const mega = cascadeDepth >= 3;
  const base = mega ? 14 : 8;
  const extra = Math.min(14, Math.floor(n * 0.9 + (cascadeDepth - 1) * 3));
  const count = Math.min(mega ? 30 : 20, base + extra);
  spawnCoinShower(srcX, srcY, count, mega);
}

// Spawn N coins distributed across the cell's value. N caps at 6 so big
// matches feel rich without flooding the DOM. Each coin carries an equal
// share of `value` (last coin absorbs the remainder so totals stay exact).
function spawnCoinFlyBurst(col, row, value, baseDelay) {
  value = Math.max(0, Math.floor(value));
  if (value <= 0) return;
  const n = Math.max(1, Math.min(6, Math.ceil(value / 8)));
  const share = Math.floor(value / n);
  let leftover = value - share * n;
  for (let i = 0; i < n; i++) {
    const v = share + (i === n - 1 ? leftover : 0);
    spawnCoinFly(col, row, v, (baseDelay || 0) + i * 55);
  }
  _pendingCoinCommit += value;
}

function fmtNum(n) {
  n = Math.floor(n);
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e4) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return n.toLocaleString('en-US');
}

// GAE (General Accumulation Event) bar — fills as you match THEME tiles.
// Mirror of refreshEnergyUI but for the gae state.
function refreshGaeBar() {
  const max = Math.max(1, state.gaeMax || 25);
  const cur = Math.max(0, Math.min(max, state.gaeProgress || 0));
  const numEl = document.getElementById('gae-num');
  const maxEl = document.getElementById('gae-max');
  if (numEl) numEl.textContent = cur;
  if (maxEl) maxEl.textContent = max;
  const fill = document.getElementById('gae-fill');

}
// Bump GAE progress by N theme-tile matches; on overflow, award prize +
// roll the milestone forward (so the bar visibly resets and the prize
// can chain on long cascades).
function bumpGae(n) {
  if (!n) return;
  state.gaeProgress = (state.gaeProgress || 0) + n;
  const max = state.gaeMax || 25;
  while (state.gaeProgress >= max) {
    state.gaeProgress -= max;
    state.gaeMilestone = (state.gaeMilestone || 0) + 1;
    // Reward: bag of gems. Tunable later.
    state.gems = (state.gems || 0) + 5;
    try { toast('GAE complete! +5 gems'); } catch (e) {}
  }
  refreshGaeBar();
}

      '<div class="u-lvl">' + t('lvl') + ' ' + lvl + ' → ' + nextLvl +

      (maxed
        ? '<div class="maxed-badge">' + t('maxed') + '</div>' +
          '<div style="margin-top:8px;font-size:11px;color:#8a8ca0;">Complete the island for a bonus!</div>'
        : '<div class="u-cost' + (canAfford ? '' : ' cannot') + '">' + fmtNum(cost) + ' ' + coinIcon(18) + '</div>') +
      '<div class="actions">' +
        (maxed
          ? '<button class="btn ghost" id="up-close">' + t('continue') + '</button>'
          : (canAfford
              ? '<button class="btn gold" id="up-build" data-bid="' + id + '">' + (lvl === 0 ? t('build') : t('upgrade')) + '</button>'
              : '<button class="btn ghost" disabled>' + t('not_enough_coins') + '</button>')) +
      '</div>' +
    '</div>';
  openModal(html);
  const buildBtn = document.getElementById('up-build');
  if (buildBtn) buildBtn.addEventListener('click', () => {
    closeModal();
    setTimeout(() => buildStructure(id), 120);
  });
  const closeBtn = document.getElementById('up-close');
  if (closeBtn) closeBtn.addEventListener('click', closeModal);
}

function buildStructure(id) {
  const theme = THEMES[state.theme];
  const s = theme.structures.find(x => x.id === id);
  if (!s) return;
  const lvl = getStructLevel(id);
  if (lvl >= 5) return;
  const cost = structureCost(s, lvl + 1);
  if (state.coins < cost) { toast(t('not_enough_coins')); haptic('err'); return; }
  state.coins -= cost;
  state.village[id] = lvl + 1;
  haptic('success'); sfxBuild();
  // Coin drop animation on the canvas + character "bump" reaction.
  if (typeof spawnMountainUpgradeCoins === 'function') {
    spawnMountainUpgradeCoins(s.slot || s.id);
  }
  if (typeof triggerCharBump === 'function') triggerCharBump();
  // World complete? All 5 dress-up slots at level 5 = 25 total.
  if (worldTotalLevels() >= 25 && !_worldExplode) {
    triggerWorldExplosion();
  }
  saveState();
  refreshAllUI();
  let levels = 0, max = 0;
  for (const sd of theme.structures) { levels += getStructLevel(sd.id); max += 5; }
  if (levels >= max) setTimeout(showIslandCompleteModal, 350);
}
function showIslandCompleteModal() {
  const bonus = 5000;
  state.coins += bonus;
  state.totalGoldEarnedEver += bonus;
  const theme = THEMES[state.theme];
  const html =
    '<div class="tier-up">' +
      '<h2>' + t('island_complete') + '</h2>' +
      '<div class="big">' + theme.nameEmoji + '</div>' +
      '<div class="new-name">' + theme.name + '</div>' +
      '<div class="sub" style="margin-top:6px;">' + t('bonus_coins', { n: fmtNum(bonus) }) + '</div>' +
      '<div class="actions"><button class="btn gold" id="ic-ok">' + t('lets_go') + '</button></div>' +
    '</div>';
  openModal(html);
  haptic('success');

}

/* =========================================================
   AUTO MATCH — tap-and-hold to activate, tap to stop.
   Picks the best swap every cascade-idle tick.
   ========================================================= */

let _autoMode = false;
// (legacy hold-state vars removed — AUTO is now a single-tap toggle.)

// Score a candidate swap (r1,c1) <-> (r2,c2). Higher = better move.
// Doesn't mutate the grid (peek-swaps then restores).
function autoScoreSwap(r1, c1, r2, c2) {
  const a = grid[r1] && grid[r1][c1];
  const b = grid[r2] && grid[r2][c2];
  if (!a || !b) return 0;
  // Special-on-special combo is always a banger
  if (a.sp && b.sp) return 1000;
  // Peek-swap
  grid[r1][c1] = b; grid[r2][c2] = a;
  let score = 0;
  try {
    const peek = findMatchesAndRuns();
    // Tile-into-special detonation (no normal match required)
    if (peek.matched.size === 0 && (a.sp || b.sp)) {
      score = 400;
    } else if (peek.matched.size > 0) {
      score = peek.matched.size * 4;
      for (const run of (peek.runs || [])) {
        if (run.shape === 'line5_h' || run.shape === 'line5_v') score += 600;  // lightning
        else if (run.shape === 'L_or_T') score += 250;                          // bomb
        else if (run.shape === 'line4_h' || run.shape === 'line4_v') score += 80; // arrow
      }
      // Tiny bonus for matches that include valuable tile types
      for (const key of peek.matched) {
        const [r, c] = key.split(',').map(Number);
        const cell = grid[r][c];
        if (!cell) continue;
        if (cell.type === TILE.CHEST) score += 6;
        else if (cell.type === TILE.SACK) score += 3;
        else if (cell.type === TILE.BOLT) score += 4;     // energy regen
      }
    }
  } catch (e) {}
  // Restore
  grid[r1][c1] = a; grid[r2][c2] = b;
  return score;
}

// Iterate every adjacent pair, return the best swap [r1,c1,r2,c2] or null.
function autoFindBestSwap() {
  let best = null, bestScore = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c + 1 < COLS) {
        const s = autoScoreSwap(r, c, r, c + 1);
        if (s > bestScore) { bestScore = s; best = [r, c, r, c + 1]; }
      }
      if (r + 1 < ROWS) {
        const s = autoScoreSwap(r, c, r + 1, c);
        if (s > bestScore) { bestScore = s; best = [r, c, r + 1, c]; }
      }
    }
  }
  return best;
}

// Pacing flag — set while the finger is animating + the cascade is
// resolving. Prevents the idle-poll from stacking moves.
let _autoMoveInFlight = false;
let _autoNextEarliestAt = 0;     // wall-clock ms when the next move may fire

function autoStep() {
  if (!_autoMode) return;
  if (game.busy || _autoMoveInFlight) return;
  if (Date.now() < _autoNextEarliestAt) return;
  // Out of energy → stop (rather than spamming the OOE modal forever)
  const cost = state.freeSpinsLeft > 0 ? 0 : effectiveBet().cost;
  if (state.energy < cost) {
    stopAuto();
    toast('AUTO stopped — out of energy');
    return;
  }
  const move = autoFindBestSwap();
  if (!move) return;   // grid will reshuffle from the cascade-end flow

  _autoMoveInFlight = true;
  // 1. Show the kawaii finger at the source cell, fade in.
  // 2. Hold 280ms ("thinking" beat).
  // 3. Slide to destination (CSS transition handles it, ~550ms).
  // 4. Play a quick tap squish, then trigger the actual swap.
  // 5. Wait until the cascade finishes + a small idle gap.
  showAutoFingerAt(move[0], move[1]);
  setTimeout(() => {
    if (!_autoMode) { hideAutoFinger(); _autoMoveInFlight = false; return; }
    moveAutoFingerTo(move[2], move[3]);
    setTimeout(() => {
      if (!_autoMode) { hideAutoFinger(); _autoMoveInFlight = false; return; }
      tapAutoFinger();
      // Brief beat for the tap squish, then fire the swap.
      setTimeout(() => {
        attemptSwap(move[0], move[1], move[2], move[3]);
        // Hide finger right after swap kicks off — the tiles take the stage.
        setTimeout(hideAutoFinger, 80);
        // After this swap's cascade settles, gate the NEXT move with a
        // small breather so successive auto moves don't feel mechanical.
        const settleCheck = setInterval(() => {
          if (!game.busy) {
            clearInterval(settleCheck);
            _autoMoveInFlight = false;
            _autoNextEarliestAt = Date.now() + 650;   // idle pause between moves
          }
        }, 90);
      }, 220);
    }, 280);
  }, 220);
}

// --- Finger overlay helpers ---
function autoFingerEl() { return document.getElementById('auto-finger'); }
function autoFingerCellTopLeft(r, c) {
  // Place the finger so its tip lands at the CENTER of the target cell.
  // The CSS translate(-12px, -34px) offsets the image so its visible
  // fingertip pixel sits at the left/top coordinate we set.
  return { x: c * CELL + CELL * 0.5, y: r * CELL + CELL * 0.5 };
}
function showAutoFingerAt(r, c) {
  const el = autoFingerEl();
  if (!el || typeof CELL !== 'number' || CELL <= 0) return;
  const p = autoFingerCellTopLeft(r, c);
  // Pop it directly to position without a transition (no slide-in from corner)
  el.style.transition = 'none';
  el.style.left = p.x + 'px';
  el.style.top  = p.y + 'px';
  void el.offsetWidth;   // force reflow so the next transition fires fresh
  el.style.transition = '';
  el.classList.add('show');
  el.classList.remove('tap');
}
function moveAutoFingerTo(r, c) {
  const el = autoFingerEl();
  if (!el) return;
  const p = autoFingerCellTopLeft(r, c);
  el.style.left = p.x + 'px';
  el.style.top  = p.y + 'px';
}
function tapAutoFinger() {
  const el = autoFingerEl();
  if (!el) return;
  el.classList.remove('tap');
  void el.offsetWidth;
  el.classList.add('tap');
}
function hideAutoFinger() {
  const el = autoFingerEl();
  if (!el) return;
  el.classList.remove('show', 'tap');
}
function setAutoLabel(active) {
  const lbl = document.getElementById('auto-label-text');
  if (lbl) lbl.textContent = active ? 'STOP' : 'AUTO';
}
function startAuto() {
  if (_autoMode) return;
  _autoMode = true;
  const btn = document.getElementById('auto-btn');
  if (btn) btn.classList.add('active');
  setAutoLabel(true);
  haptic('success');
  toast('AUTO ON');
  // Kick off the first move immediately
  autoStep();
}
function stopAuto() {
  if (!_autoMode) return;
  _autoMode = false;
  const btn = document.getElementById('auto-btn');
  if (btn) btn.classList.remove('active');
  setAutoLabel(false);
  hideAutoFinger();
  haptic('tap');
}

(function wireAutoButton() {
  const btn = document.getElementById('auto-btn');
  if (!btn) return;
  // Single-tap toggle — no hold-to-activate.
  btn.addEventListener('click', (ev) => {
    if (ev.cancelable) ev.preventDefault();
    if (_autoMode) stopAuto();
    else           startAuto();
  });

  setAutoLabel(false);
})();

function todayYMD() { const d = new Date(); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function yesterdayYMD() { const d = new Date(); d.setUTCDate(d.getUTCDate() - 1); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function canClaimDaily() { return state.dailyChestYMD !== todayYMD(); }
function nextChestDay() {
  if (state.dailyChestDay >= 7) return 1;
  if (state.dailyChestYMD && state.dailyChestYMD !== yesterdayYMD()) return 1;
  return state.dailyChestDay + 1;
}
function showDailyModal() {
  const next = nextChestDay();
  const claimable = canClaimDaily();
  // Per-day icon mapping — uses our kawaii tile PNGs instead of emojis.
  // Day 7 (the big reward) gets the chest icon for extra payoff.
  const DAILY_ICON = [
    '_t_coin',    // day 1: coin
    '_t_bolt',    // day 2: bolt (energy)
    '_t_sack',    // day 3: sack
    '_t_bolt',    // day 4: bolt
    '_t_sack',    // day 5: sack
    '_t_star',    // day 6: star
    '_t_chest',   // day 7: chest (mega day)
  ];
  let cells = '';
  for (let i = 0; i < 7; i++) {
    const day = i + 1;
    const item = DAILY_CHEST[i];
    const isToday = (claimable && day === next) || (!claimable && day === state.dailyChestDay);
    const claimedByPrior = !claimable && day < state.dailyChestDay;
    const futureDay = claimable ? (day > next) : (day > state.dailyChestDay);
    const iconKey = DAILY_ICON[i] || '_t_coin';
    const iconUrl = TILE_ART[iconKey] + '?v=22';
    const energyAddon = item.energy ? ' ' + boltIcon(11) + item.energy : '';
    cells += '<div class="chest-day' + (isToday ? ' today' : '') + (claimedByPrior ? ' claimed' : '') + (futureDay ? ' future' : '') + '">' +
      '<div class="d">' + day + '</div>' +
      '<div class="em"><img class="chest-day-ico" src="' + iconUrl + '" alt=""></div>' +
      '<div class="amt">+' + fmtNum(item.coins) + energyAddon + '</div></div>';
  }
  const html =
    '<h2>' + t('daily_chest') + '</h2>' +
    '<div class="sub">' + t('daily_streak', { n: state.streak }) + '</div>' +
    '<div class="chest-grid">' + cells + '</div>' +
    '<div class="actions">' + (claimable
      ? '<button class="btn gold full" id="claim-daily">' + t('claim') + ' · Day ' + next + '</button>'
      : '<div style="text-align:center;color:#8a8ca0;font-size:13px;">' + t('come_back_tomorrow') + '</div>') + '</div>';
  openModal(html);
  if (claimable) {
    document.getElementById('claim-daily').addEventListener('click', () => { claimDaily(); closeModal(); });
  }
}
function claimDaily() {
  if (!canClaimDaily()) return;
  const next = nextChestDay();
  const item = DAILY_CHEST[next - 1];
  if (state.dailyChestYMD === yesterdayYMD()) state.streak = (state.streak || 0) + 1;
  else state.streak = 1;
  state.coins += item.coins;
  state.totalGoldEarnedEver += item.coins;
  state.vaultLifetimeCoins += item.coins;
  if (item.energy) state.energy = Math.min(state.energyMax + item.energy, state.energy + item.energy);
  state.dailyChestYMD = todayYMD();
  state.dailyChestDay = next;
  haptic('success');
  sfxCoinChime();
  bumpScore();
  saveState();
  refreshAllUI();
  toast('+' + fmtNum(item.coins) + ' 💰' + (item.energy ? ' +' + item.energy + ' ⚡' : ''));
}

  return m[id] || '💎';
}
// Returns an <img> tag using our kawaii PNGs for the given SKU id, or
// falls back to the emoji if no asset matches.
function shopIconHtml(id, fallbackEmoji) {
  // Map SKU id → tile/UI art key.

    coins_small:   '_t_coin',
    coins_medium:  '_t_sack',

    rocket_pack:   '_u_rocket',
    bomb_pack:     '_u_bomb',
    shuffle_pack:  '_u_shuffle',
    free_pack:     '_t_bolt',
    shield_24h:    '_t_shield',
    battle_pass:   '_t_star',
    wild_booster:  '_t_wild',
    bag_booster:   '_t_sack',

  setInterval(pollPurchases, 5000);
  if (TG && TG.initData) {
    fetch('/api/heartbeat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: TG.initData, lang: state.lang, streak: state.streak }),
    }).catch(() => {});
  }
})();

</script>
