  grid[r1][c1] = b; grid[r2][c2] = a;
  const peek = findMatchesAndRuns();
  const willMatch = peek.matched.size > 0;
  // Also: swapping ANY tile into a special detonates the special at its
  // post-swap position even with no 3-match formed.
  const aIsSp = a && a.sp;
  const bIsSp = b && b.sp;
  let detonateOnly = null;
  if (!willMatch && (aIsSp || bIsSp)) {
    // The special, after swap, sits at the cell where it just moved to.
    detonateOnly = new Set();
    if (aIsSp) detonateOnly.add(r2 + ',' + c2);
    if (bIsSp) detonateOnly.add(r1 + ',' + c1);
  }

  if (!willMatch && !detonateOnly) {
    // Revert and bounce-back
    grid[r1][c1] = a; grid[r2][c2] = b;
    haptic('err'); sfxSwapFail();
    game.busy = true;
    grid[r1][c1] = b; grid[r2][c2] = a;
    startSwapAnim(r1, c1, r2, c2, () => {
      grid[r1][c1] = a; grid[r2][c2] = b;
      startSwapAnim(r1, c1, r2, c2, () => { game.busy = false; });
    });
    return;
  }

  // Energy / free-spin check — grid is currently in peek-swapped state.
  const bet = effectiveBet();
  const energyCost = state.freeSpinsLeft > 0 ? 0 : bet.cost;
  if (state.energy < energyCost) {
    grid[r1][c1] = a; grid[r2][c2] = b;
    flashEnergyEmpty();
    showOutOfEnergyModal();
    return;
  }
  if (state.freeSpinsLeft > 0) state.freeSpinsLeft--;
  else {
    state.energy -= energyCost;
    if (state.energy < state.energyMax && !state.energyRegenAt) state.energyRegenAt = Date.now() + ENERGY_REGEN_MS;
  }
  refreshEnergyUI();

  // Animate swap (grid already in post-swap state), then resolve cascade.
  game.busy = true;
  sfxSwapSuccess();
  const swapCells = new Set([r1 + ',' + c1, r2 + ',' + c2]);
  startSwapAnim(r1, c1, r2, c2, () => {
    game.cascadeDepth = 0; game.cascadeMax = 0;
    processCascadeStep(detonateOnly, swapCells);
  });
}

// processCascadeStep(seedMatched, swapCells)
//   seedMatched: optional Set of cell keys to treat as the initial match
//     (used when a swap into a special should detonate it without
//     forming a normal 3-match). Only honored on the FIRST step.
//   swapCells: optional Set of cell keys representing the swap origin
//     and destination — passed to plannedSpawns so specials prefer
//     to land at the swap location.
function processCascadeStep(seedMatched, swapCells) {
  let matched, runs, groups;
  if (seedMatched && seedMatched.size > 0) {
    matched = new Set(seedMatched);
    runs = [];
    groups = 1;
  } else {
    const result = findMatchesAndRuns();
    matched = result.matched;
    runs    = result.runs;
    groups  = result.groups;
  }

  if (matched.size === 0) {
    // Cascade chain ended.
    if (game.cascadeMax >= 2) {
      const labels = [null, null, 'NICE!', 'COMBO!', 'INSANE!', 'UNSTOPPABLE!', 'LEGENDARY!'];
      const label = labels[Math.min(game.cascadeMax, labels.length - 1)] || 'LEGENDARY!';
      showComboOverlay(label);
    }
    if (state.meter.shield >= METER_CAP) {
      state.shieldsStocked = Math.min(3, state.shieldsStocked + 1);
      state.meter.shield = 0;
      toast(t('shield_ok')); haptic('success'); sfxChargeFull();
    }
    if (!hasPossibleMove()) {
      toast(t('no_more_moves'));
      setTimeout(() => { reshuffleGrid(); game.busy = false; refreshAllUI(); }, 450);
      return;
    }
    if (TG && TG.initData) {
      fetch('/api/score/submit', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: TG.initData, score: state.vaultLifetimeCoins, mode: 'regular' }),
      }).catch(() => {});
    }
    saveState();
    refreshAllUI();
    game.busy = false;
    return;
  }

  game.cascadeDepth++;
  game.cascadeMax = Math.max(game.cascadeMax, game.cascadeDepth);
  if (game.cascadeDepth > state.bestCascadeEver) state.bestCascadeEver = game.cascadeDepth;
  state.totalMatchesEver += groups;

  // Spawn rules: 4-in-line / T-L / 5-in-line transform one cell into a special.
  const spawns = plannedSpawns(runs, swapCells);
  const spawnKeys = new Set();
  for (const sp of spawns) spawnKeys.add(sp.r + ',' + sp.c);

  // Expand with detonations from any specials in the matched set.
  const det = expandWithDetonations(matched);
  const toClear = det.toClear;
  const detonations = det.detonations;

  // Spawn cells SURVIVE (they transmute into specials, not cleared).
  for (const key of spawnKeys) toClear.delete(key);

  scoreMatchedCells(toClear);

  const popList = [];
  for (const k of toClear) popList.push(k);

  // Detonation FX run FIRST so the player sees the beam / explosion /
  // lightning bolt before the cells vanish. Pop animation chases the FX,
  // then the grid clears, specials spawn, gravity drops new tiles.
  runDetonationSequence(detonations, () => {
    startPopAnim(popList, () => {
      for (const key of toClear) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      for (const sp of spawns) {
        grid[sp.r][sp.c] = makeCell(sp.type, sp.sp);
      }
      const falls = applyGravity();
      startFallAnim(falls, () => processCascadeStep(null, null));
    });
  });
}

function scoreMatchedCells(cells) {
  const mult = CASCADE_MULT[Math.min(game.cascadeDepth, CASCADE_MULT.length - 1)];
  const bet = effectiveBet();
  let stepCoins = 0;
  const chargeAdd = { hammer: 0, pig: 0, shield: 0 };
  let boltCount = 0;
  let starCount = 0;
  let themeCount = 0;
  let orbCount = 0;
  for (const key of cells) {
    const [r, c] = key.split(',').map(Number);
    const cell = grid[r][c];
    if (!cell) continue;
    const type = cell.type;
    // Specials are worth more — extra reward for chaining detonations.
    const spBonus = cell.sp ? 4 : 1;
    const cellVal = (TILE_VALUE[type] || 1) * spBonus;
    const earn = cellVal * bet.mult * mult;
    stepCoins += earn;
    spawnScoreFly(c, r, '+' + Math.floor(earn));
    // Flying coins → odometer ticks when each lands. Stagger per-cell so
    // bigger matches feel like a satisfying rain of gold into the counter.
    spawnCoinFlyBurst(c, r, earn, orbCount * 25);
    const px = c * CELL + CELL / 2;
    const py = r * CELL + CELL / 2;
    const color = tileParticleColor(type);
    spawnParticles(px, py, color, 12, 1.8);
    spawnParticles(px, py, '#ffffff', 5, 1.4);
    // Tile-trail orb — heavier DOM effect, throttled to first 4 cells per
    // step so big board clears don't choke. Specials always get an orb.
    if (orbCount < 4 || cell.sp) {
      spawnTileTrail(c, r, color, orbCount * 35);
      orbCount++;
    }
    // Rare effect tiles: PIG fills raid meter, SHIELD fills shield meter,
    // BOLT grants energy directly (no meter), STAR mega-bonus.
    if      (type === TILE.PIG)    chargeAdd.pig++;
    else if (type === TILE.SHIELD) chargeAdd.shield++;
    // THEME slot is now the attack glove tile — feeds the attack/smash
    // meter (internal key still 'hammer' for save-compat).
    else if (type === TILE.THEME)  { chargeAdd.hammer++; themeCount++; }
    else if (type === TILE.BOLT)   boltCount++;
    else if (type === TILE.STAR)   starCount++;
  }
  // GAE: theme-tile matches feed the event bar. Each theme tile = +1.
  if (themeCount > 0) { bumpGae(themeCount); }
  const chargeMult = Math.max(1, Math.floor(mult * 0.5 + bet.mult * 0.5));
  const earnedInt = Math.floor(stepCoins);
  state.coins += earnedInt;
  state.totalGoldEarnedEver += earnedInt;
  state.vaultLifetimeCoins += earnedInt;
  state.lastMatchGold = earnedInt;
  state.meter.hammer = Math.min(METER_CAP, state.meter.hammer + chargeAdd.hammer * chargeMult);
  state.meter.pig    = Math.min(METER_CAP, state.meter.pig    + chargeAdd.pig    * chargeMult);
  state.meter.shield = Math.min(METER_CAP, state.meter.shield + chargeAdd.shield * chargeMult);
  // Bolt tiles → energy. Each match gives 1 energy per tile × cascade mult,
  // capped at energyMax. Players see the energy bar fill on the spot.
  if (boltCount > 0) {
    const energyGain = Math.max(1, Math.floor(boltCount * Math.max(1, mult)));
    state.energy = Math.min(state.energyMax, state.energy + energyGain);
    if (state.energy < state.energyMax && !state.energyRegenAt) {
      state.energyRegenAt = Date.now() + ENERGY_REGEN_MS;
    }
    refreshEnergyUI();
    sfxTone(880, 0.18, 0.10, 'triangle');  // sparkle chime per bolt match
  }
  if (starCount > 0) {
    // Mega-bonus: fill ALL THREE meters AND give extra energy + gold.
    const burst = 6 * starCount;
    state.meter.hammer = Math.min(METER_CAP, state.meter.hammer + burst);
    state.meter.pig    = Math.min(METER_CAP, state.meter.pig    + burst);
    state.meter.shield = Math.min(METER_CAP, state.meter.shield + burst);
    state.energy = Math.min(state.energyMax, state.energy + 3 * starCount);
    refreshEnergyUI();
  }
  sfxMatchPop(game.cascadeDepth);
  if (game.cascadeDepth === 1)      haptic('tap');
  else if (game.cascadeDepth === 2) { haptic('med');   sfxCascade(2); }
  else if (game.cascadeDepth === 3) { haptic('heavy'); shake(4, 180); sfxCascade(3); }
  else if (game.cascadeDepth >= 4)  {
    haptic('success'); shake(8, 280);
    flashScreen('rgba(255,216,100,0.35)', 0.4, 260);
    sfxMega();
    // Confetti rains down for MEGA cascades (depth 4+). 40 paper bits
    // for depth-4, more for deeper chains.
    spawnConfetti(30 + game.cascadeDepth * 8);
  }
  bumpScore();
  refreshGoldUI();
  refreshMetersUI();
  refreshLastMatch();
  // Prize slot above the grid — shows the gold earned for THIS step.
  showPrizeBanner(earnedInt);
  // Cinematic coin shower toward the camera. Sized to the match.
  spawnCoinShowerForStep(cells, stepCoins, game.cascadeDepth);
}

// Pops the central prize slot above the grid with [coin] +N gold.
// Auto-clears after 1.6s; subsequent matches restart the timer.
let _prizeBannerTimer = null;
function showPrizeBanner(amount) {
  const inner = document.getElementById('prize-inner');
  if (!inner || !amount || amount <= 0) return;
  const src = (typeof TILE_ART !== 'undefined' && TILE_ART._t_coin) || '/assets/tiles/01_coin.png';
  inner.innerHTML =
    '<img class="prize-ico" src="' + src + '?v=30" alt="">' +
    '<span>+' + fmtNum(amount) + '</span>';
  inner.classList.remove('show');
  void inner.offsetWidth;
  inner.classList.add('show');
  if (_prizeBannerTimer) clearTimeout(_prizeBannerTimer);
  _prizeBannerTimer = setTimeout(() => {
    inner.classList.remove('show');
    _prizeBannerTimer = null;
  }, 1600);
}

// triggerSpecialCombo: ported from Match Icon. The combo FX plays first
// (full beam / explosion / lightning visual), then damage applies once
// the FX finishes — shake + flash + particles + score + pop.
function triggerSpecialCombo(spA, spB, epR, epC, otherR, otherC) {
  const cells = comboCells(spA, spB, epR, epC, otherR, otherC);
  cells.add(epR + ',' + epC);
  cells.add(otherR + ',' + otherC);
  const classA = spClass(spA);
  const classB = spClass(spB);
  const types = [classA, classB].sort().join('+');

  // Subtype for arrow+arrow tells the FX which beam pair to draw
  // (V+V parallel columns / H+H parallel rows / mixed plus-cross).
  let subtype = null;
  if (types === 'arrow+arrow') {
    const aV = spA === SP_ARROW_V, bV = spB === SP_ARROW_V;
    const aH = spA === SP_ARROW_H, bH = spB === SP_ARROW_H;
    if (aV && bV) subtype = 'vv';
    else if (aH && bH) subtype = 'hh';
    else subtype = 'hv';
  }

  const sourceCell = grid[epR][epC];
  const comboColor = sourceCell ? tileParticleColor(sourceCell.type) : '#ffd864';
  haptic('heavy');

  startFXAnim('combo_' + types, {
    epicenter: { r: epR, c: epC },
    other:     { r: otherR, c: otherC },
    cells: cells,
    color: comboColor,
    subtype: subtype,
  }, () => {
    // FX done — apply the actual damage now.
    shake(18, 500);
    flashScreen('rgba(255,255,255,0.55)', 0.55, 220);
    haptic('success');
    for (const key of cells) {
      const [r, c] = key.split(',').map(Number);
      const cell = grid[r][c];
      if (cell) {
        spawnParticles(c * CELL + CELL / 2, r * CELL + CELL / 2, tileParticleColor(cell.type), 16, 2.0);
        spawnParticles(c * CELL + CELL / 2, r * CELL + CELL / 2, '#ffffff', 8, 1.6);
      }
    }
    game.cascadeDepth = 1;
    game.cascadeMax = Math.max(game.cascadeMax, 1);
    scoreMatchedCells(cells);
    const popList = [];
    for (const k of cells) popList.push(k);
    startPopAnim(popList, () => {
      for (const key of cells) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      const falls = applyGravity();
      startFallAnim(falls, () => processCascadeStep(null, null));
    });
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

/* =========================================================
   [30] Render — emoji tiles on dark canvas

   PERF: reusable per-frame scratch buffers to avoid hot-path allocations.
   - _skipMask: Uint8Array (ROWS*COLS), 1 = cell is being animated and
     should NOT be drawn at its grid position. Cleared each frame.
   - _popPMap:  Float32Array (ROWS*COLS), per-cell pop-anim eased progress
     (0 = no pop). Filled by a single pass over pop animations.
   These replace the per-frame `new Set()` + string-concat keys + the
   O(cells × animations) indexOf scan in the old hot loop.
   ========================================================= */
const _skipMask = new Uint8Array(ROWS * COLS);
const _popPMap  = new Float32Array(ROWS * COLS);

// Animation-aware render. Reads grid + active animations + particles every
// frame. Cells participating in an active swap/fall are skipped from the
// static draw and drawn separately at their interpolated positions.
// Pop animations apply to cells still in the grid (scale + alpha down).
function render() {
  if (!ctx) return;
  const cssW = COLS * CELL;
  const cssH = ROWS * CELL;
  ctx.clearRect(0, 0, cssW, cssH);

  // Screen shake for big hits
  const off = getShakeOffset();
  ctx.save();
  ctx.translate(off.x, off.y);

  // Alternating cell backdrop (Match Masters checkerboard pattern).
  // Two soft cream tones — light and slightly darker — make the grid
  // structure read at a glance and reduce eye strain on long sessions.
  ctx.fillStyle = '#fff5d8';     // base cream
  ctx.fillRect(-20, -20, cssW + 40, cssH + 40);
  ctx.fillStyle = '#ffe6b0';     // alt cream (slightly warmer / darker)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (((r + c) & 1) === 0) continue;   // skip "light" cells
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  // PERF: reusable scratch buffers (no per-frame allocations).
  // skipMask[i] = 1 → cell is animated elsewhere, skip drawing at grid pos
  // popPMap[i]  = eased pop progress (0 = no pop)
  _skipMask.fill(0);
  _popPMap.fill(0);
  // Single pass over animations to fill both buffers.
  const anims = animations;
  for (let i = 0, n = anims.length; i < n; i++) {
    const a = anims[i];
    const at = a.type;
    if (at === 'swap') {
      _skipMask[a.r1 * COLS + a.c1] = 1;
      _skipMask[a.r2 * COLS + a.c2] = 1;
    } else if (at === 'fall') {
      const falls = a.falls;
      for (let j = 0, m = falls.length; j < m; j++) {
        const f = falls[j];
        _skipMask[f.toRow * COLS + f.col] = 1;
      }
    } else if (at === 'pop') {
      const p = easeOut(a.p);
      // a.cells is an array of "r,c" string keys (legacy). Convert once.
      // If we ever switch a.cells to integer keys this gets cheaper still.
      const cells = a.cells;
      for (let j = 0, m = cells.length; j < m; j++) {
        const key = cells[j];
        // Inline parse: cells contain "r,c" strings.
        const ci = key.indexOf(',');
        const rr = +key.substring(0, ci);
        const cc = +key.substring(ci + 1);
        _popPMap[rr * COLS + cc] = p;
      }
    }
  }

  // Static tiles — drawn at grid position. O(rows*cols), no inner-anim loop.
  for (let r = 0; r < ROWS; r++) {
    const rowArr = grid[r];
    const rBase = r * COLS;
    for (let c = 0; c < COLS; c++) {
      const idx = rBase + c;
      if (_skipMask[idx]) continue;
      const cell = rowArr[c];
      if (!cell) continue;
      const p = _popPMap[idx];
      if (p > 0) {
        const inv = 1 - p;
        drawTileAt(cell, c * CELL, r * CELL, inv, inv);
      } else {
        drawTileAt(cell, c * CELL, r * CELL, 1, 1);
      }
    }
  }

  // Animated tiles — swap + fall + fx
  for (const a of animations) {
    if (a.type === 'swap') {
      const p = easeInOut(a.p);
      const t1 = grid[a.r1][a.c1];
      const t2 = grid[a.r2][a.c2];
      const x1a = a.c1 * CELL, y1a = a.r1 * CELL;
      const x2a = a.c2 * CELL, y2a = a.r2 * CELL;
      if (t1) drawTileAt(t1, x1a + (x2a - x1a) * p, y1a + (y2a - y1a) * p, 1, 1);
      if (t2) drawTileAt(t2, x2a + (x1a - x2a) * p, y2a + (y1a - y2a) * p, 1, 1);
    } else if (a.type === 'fall') {
      const p = easeOut(a.p);
      for (const f of a.falls) {
        const x = f.col * CELL;
        const y = f.fromRow * CELL + (f.toRow - f.fromRow) * CELL * p;
        if (f.tile) drawTileAt(f.tile, x, y, 1, 1);
      }
    } else if (a.type === 'fx') {
      drawFX(a);
    }
  }

  // Selection ring on top — PERF: removed expensive shadowBlur.
  // Cheap double-stroke (outer fade + bright inner) gives a similar
  // "glowing border" feel at a fraction of the cost.
  if (game.selected) {
    const r = game.selected.r, c = game.selected.c;
    if (!_skipMask[r * COLS + c]) {
      const x = c * CELL, y = r * CELL;
      const pad = 3;
      ctx.save();
      // Faint outer halo
      ctx.lineWidth = 5;
      ctx.strokeStyle = 'rgba(255, 216, 100, 0.35)';
      roundRectPath(x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, CELL * 0.16);
      ctx.stroke();
      // Crisp inner stroke
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#ffd864';
      ctx.stroke();
      ctx.restore();
    }
  }

  // Booster armed — draw per-tile target reticles so the player sees
  // exactly which cells can be tapped. PERF: shadowBlur removed (was
  // very expensive); using a double stroke instead. Single now() call
  // shared by both sub-anims.
  if (state.armed.hammer || state.armed.rocket || state.armed.bomb) {
    let reticleColor, frameColor;
    if (state.armed.hammer)      { reticleColor = '#ff8c3a'; frameColor = '#ff8c3a'; }
    else if (state.armed.rocket) { reticleColor = '#4fb2ff'; frameColor = '#4fb2ff'; }
    else                         { reticleColor = '#ff5c7a'; frameColor = '#ff5c7a'; }
    const tnow = now();
    const sinPulse = Math.sin(tnow / 200);
    const pulse = 0.55 + 0.45 * sinPulse;
    for (let r = 0; r < ROWS; r++) {
      const rowArr = grid[r];
      const rBase = r * COLS;
      for (let c = 0; c < COLS; c++) {
        if (!rowArr[c]) continue;
        if (_skipMask[rBase + c]) continue;
        drawTargetReticle(c * CELL, r * CELL, reticleColor, pulse);
      }
    }
    // Dashed armed-mode frame around the whole board.
    ctx.save();
    ctx.strokeStyle = hexToRgba(frameColor, 0.6 + 0.4 * sinPulse);
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.lineDashOffset = -(tnow / 40) % 14;
    roundRectPath(2, 2, cssW - 4, cssH - 4, 10);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
    ctx.restore();
  }

  drawParticles();
  ctx.restore();
}

// Draw a single tile (cell object {type, sp, mod}) at canvas coords with
// scale + alpha. Specials get a colored plate with arrow/bomb/lightning
// icon overlay; regular cells use the cached emoji sprite.
//
// BOLT tiles get a subtle idle animation — slight scale pop on a sine
// wave plus a moving diagonal shine streak — to telegraph their high
// value compared to coin/sack/chest tiles.
function drawTileAt(cell, x, y, scale, alpha) {
  if (!cell || scale <= 0 || alpha <= 0) return;
  const cx = x + CELL / 2;
  const cy = y + CELL / 2;
  if (alpha !== 1) ctx.globalAlpha = alpha;

  if (cell.sp) {
    drawSpecialTile(cx, cy, CELL * 0.40 * scale, cell, alpha);
  } else if (cell.type === TILE.BOLT) {
    // Per-tile phase keyed on grid position so neighbouring bolts pulse
    // out of sync (looks more alive than a uniform pulse).
    const phase = (x * 0.13 + y * 0.09);
    const tt    = now() / 1000;
    const pop   = 1 + 0.045 * Math.sin(tt * 2.4 + phase * 4);     // subtle ±4.5%
    const size  = CELL * 0.78 * scale * pop;
    drawEmojiSprite(ctx, tileEmoji(cell.type), cx, cy, size);
    drawBoltShine(cx, cy, size, tt + phase, alpha);
  } else {
    const size = CELL * 0.78 * scale;
    drawEmojiSprite(ctx, tileEmoji(cell.type), cx, cy, size);
  }

  if (alpha !== 1) ctx.globalAlpha = 1;
}

// Diagonal white shine band sweeping across the bolt tile every ~3s.
// Clipped to a circle the size of the icon so it doesn't bleed into
// neighbouring cells.
function drawBoltShine(cx, cy, size, t, alpha) {
  const r = size * 0.45;
  const period = 2.8;        // seconds per full sweep
  const phase = (t % period) / period;   // 0..1
  // Strip moves from -r*2 to +r*2 along the local x-axis.
  const stripCenter = -r * 2 + phase * (r * 4);
  // Only visible during the sweep; otherwise alpha=0 (saves draws).
  if (stripCenter < -r * 1.4 || stripCenter > r * 1.4) {
    // Sparkle dot every ~3 sweeps even when strip is off-screen.
    if (Math.sin(t * 1.4) > 0.95) {
      ctx.save();
      ctx.globalAlpha = (alpha || 1) * 0.9;
      ctx.fillStyle = '#ffffff';
      const sx = cx + Math.cos(t * 5) * r * 0.45;
      const sy = cy + Math.sin(t * 5) * r * 0.45;
      ctx.beginPath();
      ctx.arc(sx, sy, r * 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    return;
  }
  ctx.save();
  // Clip to a circle so the shine doesn't leak past the icon.
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();
  // Rotate 45° so the strip is diagonal.
  ctx.translate(cx, cy);
  ctx.rotate(-Math.PI / 4);
  const stripW = r * 0.35;
  const grad = ctx.createLinearGradient(stripCenter - stripW, 0, stripCenter + stripW, 0);
  grad.addColorStop(0,   'rgba(255,255,255,0)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.55)');
  grad.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.globalAlpha = (alpha || 1) * 0.85;
  ctx.fillStyle = grad;
  ctx.fillRect(stripCenter - stripW, -r * 1.5, stripW * 2, r * 3);
  ctx.restore();
}

// Special-piece rendering — colored plate in the tile's accent color with
// a pulsing glow and a white vector icon (arrow / bomb / lightning) on top.
function drawSpecialTile(cx, cy, r, cell, alpha) {
  // Subtler pulse + use rotation+translate (no scale) so the pre-baked
  // sprite isn't re-resampled every frame. The cached sprite is
  // already at the right cell size — drawing it at 1:1 keeps edges crisp.
  const t = now() / 600;
  const wobble = Math.sin(t) * 0.04;        // ±0.04 radians, ~2.3° wobble
  const yBob   = Math.sin(t * 1.4) * 1.2;   // 1.2px vertical breathing

  const spArtKey = specialArtKey(cell.sp, cell.type);
  const cached = spArtKey && emojiCache[spArtKey];

  // Fast path: pre-baked cell-aware sprite — single drawImage, no resampling.
  if (cached && cached.canvas) {
    const size = cached.total;
    if (alpha !== 1) ctx.globalAlpha = alpha;
    ctx.save();
    ctx.translate(Math.round(cx), Math.round(cy + yBob));
    ctx.rotate(wobble);
    ctx.drawImage(cached.canvas, -size / 2, -size / 2, size, size);
    ctx.restore();
    if (alpha !== 1) ctx.globalAlpha = 1;
    return;
  }

  // Bake hasn't run yet — fall back to scaling the source PNG.
  const spEntry = spArtKey && tileImages[spArtKey];
  if (spEntry && spEntry.isPng && spEntry.canvas) {
    const tileR = r * 1.15;
    const size = Math.round(tileR * 2);
    if (alpha !== 1) ctx.globalAlpha = alpha;
    ctx.drawImage(spEntry.canvas, Math.round(cx - size / 2), Math.round(cy - size / 2), size, size);
    if (alpha !== 1) ctx.globalAlpha = 1;
    return;
  }
  // Canvas-drawn fallback below uses old pulsing geometry; keep its own variables.
  const pulse = 0.88 + 0.12 * Math.sin(now() / 220);
  const tileR = r * 1.08 * pulse;

  // ===== Canvas-drawn fallback (kept for offline / asset-missing cases) =====
  const color = tileParticleColor(cell.type);

  // Drop shadow
  ctx.save();
  ctx.translate(0, r * 0.16);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.fill();
  ctx.restore();

  // Outer color glow
  ctx.save();
  ctx.globalAlpha = (alpha || 1) * 0.7 * pulse;
  ctx.fillStyle = color;
  roundedSquare(cx, cy, tileR * 1.18, tileR * 0.32);
  ctx.fill();
  ctx.restore();

  // Solid colored plate
  ctx.fillStyle = color;
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.fill();

  // Bottom darken
  ctx.save();
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.clip();
  const dg = ctx.createLinearGradient(cx, cy, cx, cy + tileR);
  dg.addColorStop(0, 'rgba(0,0,0,0)');
  dg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = dg;
  ctx.fillRect(cx - tileR, cy - tileR, tileR * 2, tileR * 2);
  ctx.restore();

  // Outline
  ctx.strokeStyle = darkenColor(color);
  ctx.lineWidth = Math.max(2, r * 0.10);
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.stroke();

  // Top gloss
  ctx.save();
  roundedSquare(cx, cy, tileR, tileR * 0.26);
  ctx.clip();
  const gloss = ctx.createLinearGradient(cx, cy - tileR, cx, cy - tileR * 0.2);
  gloss.addColorStop(0, 'rgba(255,255,255,0.45)');
  gloss.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gloss;
  ctx.fillRect(cx - tileR, cy - tileR, tileR * 2, tileR * 0.9);
  ctx.restore();

  // Icon: shadow first then white
  ctx.save();
  ctx.translate(1.5, 1.5);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  drawSpecialIcon(cell.sp, cx, cy, r);
  ctx.restore();
  ctx.fillStyle = '#ffffff';
  drawSpecialIcon(cell.sp, cx, cy, r);
}

function drawSpecialIcon(sp, cx, cy, r) {
  if (sp === SP_ARROW_H)      drawHorizArrowIcon(cx, cy, r * 0.78);
  else if (sp === SP_ARROW_V) drawVertArrowIcon(cx, cy, r * 0.78);
  else if (sp === SP_BOMB)    drawBombIcon(cx, cy, r * 0.70);
  else if (sp === SP_LIGHTNING) drawLightningIcon(cx, cy, r * 0.78);
}
function drawHorizArrowIcon(cx, cy, r) {
  const bodyW = r * 1.6, bodyH = r * 0.35, headSize = r * 0.55;
  ctx.beginPath();
  ctx.moveTo(cx - bodyW/2 - headSize*0.2, cy);
  ctx.lineTo(cx - bodyW/2 + headSize*0.4, cy - headSize/1.8);
  ctx.lineTo(cx - bodyW/2 + headSize*0.4, cy - bodyH/2);
  ctx.lineTo(cx + bodyW/2 - headSize*0.4, cy - bodyH/2);
  ctx.lineTo(cx + bodyW/2 - headSize*0.4, cy - headSize/1.8);
  ctx.lineTo(cx + bodyW/2 + headSize*0.2, cy);
  ctx.lineTo(cx + bodyW/2 - headSize*0.4, cy + headSize/1.8);
  ctx.lineTo(cx + bodyW/2 - headSize*0.4, cy + bodyH/2);
  ctx.lineTo(cx - bodyW/2 + headSize*0.4, cy + bodyH/2);
  ctx.lineTo(cx - bodyW/2 + headSize*0.4, cy + headSize/1.8);
  ctx.closePath();
  ctx.fill();
}
function drawVertArrowIcon(cx, cy, r) {
  const bodyH = r * 1.6, bodyW = r * 0.35, headSize = r * 0.55;
  ctx.beginPath();
  ctx.moveTo(cx, cy - bodyH/2 - headSize*0.2);
  ctx.lineTo(cx + headSize/1.8, cy - bodyH/2 + headSize*0.4);
  ctx.lineTo(cx + bodyW/2, cy - bodyH/2 + headSize*0.4);
  ctx.lineTo(cx + bodyW/2, cy + bodyH/2 - headSize*0.4);
  ctx.lineTo(cx + headSize/1.8, cy + bodyH/2 - headSize*0.4);
  ctx.lineTo(cx, cy + bodyH/2 + headSize*0.2);
  ctx.lineTo(cx - headSize/1.8, cy + bodyH/2 - headSize*0.4);
  ctx.lineTo(cx - bodyW/2, cy + bodyH/2 - headSize*0.4);
  ctx.lineTo(cx - bodyW/2, cy - bodyH/2 + headSize*0.4);
  ctx.lineTo(cx - headSize/1.8, cy - bodyH/2 + headSize*0.4);
  ctx.closePath();
  ctx.fill();
}
function drawBombIcon(cx, cy, r) {
  // Bomb body
  ctx.beginPath();
  ctx.arc(cx, cy + r * 0.1, r * 0.85, 0, Math.PI * 2);
  ctx.fill();
  // Highlight
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.arc(cx - r * 0.3, cy - r * 0.2, r * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // Fuse
  ctx.save();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = Math.max(1.5, r * 0.12);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + r * 0.3, cy - r * 0.55);
  ctx.quadraticCurveTo(cx + r * 0.6, cy - r * 0.95, cx + r * 0.45, cy - r * 1.05);
  ctx.stroke();
  ctx.restore();
  // Fuse spark
  ctx.save();
  ctx.fillStyle = '#ffd864';
  ctx.beginPath();
  ctx.arc(cx + r * 0.45, cy - r * 1.05, r * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}
function drawLightningIcon(cx, cy, r) {
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.05, cy - r * 0.95);
  ctx.lineTo(cx - r * 0.65, cy + r * 0.1);
  ctx.lineTo(cx - r * 0.2,  cy + r * 0.1);
  ctx.lineTo(cx - r * 0.4,  cy + r * 0.95);
  ctx.lineTo(cx + r * 0.65, cy - r * 0.15);
  ctx.lineTo(cx + r * 0.15, cy - r * 0.15);
  ctx.lineTo(cx + r * 0.45, cy - r * 0.95);
  ctx.closePath();
  ctx.fill();
}
function roundedSquare(cx, cy, halfSize, radius) {
  const x = cx - halfSize, y = cy - halfSize;
  const w = halfSize * 2;
  ctx.beginPath();
  if (typeof ctx.roundRect === 'function') {
    ctx.roundRect(x, y, w, w, radius);
  } else {
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + w - radius);
    ctx.quadraticCurveTo(x + w, y + w, x + w - radius, y + w);
    ctx.lineTo(x + radius, y + w);
    ctx.quadraticCurveTo(x, y + w, x, y + w - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
  }
}
// Booster target reticle — corner brackets at the 4 corners of a tile
// with a thin center crosshair. Pulses with the global armed pulse so
// every tile breathes in sync.
function drawTargetReticle(x, y, color, pulse) {
  // PERF: shadowBlur per-tile reticle was very expensive (49 cells × pulse
  // frames). Removed — the corner brackets read clearly without a glow.
  const cx = x + CELL / 2;
  const cy = y + CELL / 2;
  const inset = CELL * 0.10;
  const len = CELL * 0.22;
  ctx.save();
  ctx.strokeStyle = hexToRgba(color, 0.55 + 0.35 * pulse);
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  // 4 corner brackets in a single path — cuts beginPath calls 4 → 1.
  ctx.beginPath();
  ctx.moveTo(x + inset, y + inset + len); ctx.lineTo(x + inset, y + inset); ctx.lineTo(x + inset + len, y + inset);
  ctx.moveTo(x + CELL - inset - len, y + inset); ctx.lineTo(x + CELL - inset, y + inset); ctx.lineTo(x + CELL - inset, y + inset + len);
  ctx.moveTo(x + inset, y + CELL - inset - len); ctx.lineTo(x + inset, y + CELL - inset); ctx.lineTo(x + inset + len, y + CELL - inset);
  ctx.moveTo(x + CELL - inset - len, y + CELL - inset); ctx.lineTo(x + CELL - inset, y + CELL - inset); ctx.lineTo(x + CELL - inset, y + CELL - inset - len);
  ctx.stroke();
  // Tiny center crosshair
  ctx.strokeStyle = hexToRgba(color, 0.4 + 0.3 * pulse);
  ctx.lineWidth = 1.5;
  const cr = CELL * 0.06;
  ctx.beginPath();
  ctx.moveTo(cx - cr, cy); ctx.lineTo(cx + cr, cy);
  ctx.moveTo(cx, cy - cr); ctx.lineTo(cx, cy + cr);
  ctx.stroke();
  ctx.restore();
}

function darkenColor(hex) {
  if (!hex || hex[0] !== '#' || hex.length < 7) return '#000000';
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const dr = Math.max(0, Math.floor(r * 0.45));
  const dg = Math.max(0, Math.floor(g * 0.45));
  const db = Math.max(0, Math.floor(b * 0.45));
  return '#' + dr.toString(16).padStart(2, '0') + dg.toString(16).padStart(2, '0') + db.toString(16).padStart(2, '0');
}

// =========================================================
// drawFX — dispatches on a.kind to render the active FX animation
// for this frame. Ported verbatim from Match Icon's drawFX. Each
// kind has its own multi-phase visual (charge → main → fade).
// Called from render()'s animations loop when a.type === 'fx'.
// =========================================================
function drawFX(a) {
  const p = a.p;

  if (a.kind === 'arrow_h') {
    // Horizontal arrow — light streak races outward along the row.
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const arrowColor = a.payload.color || '#ffd864';
    const reach = easeOut(p) * (COLS * CELL);
    ctx.save();
    const grad = ctx.createLinearGradient(ex - reach, ey, ex + reach, ey);
    const fade = 1 - p * 0.6;
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, hexToRgba(arrowColor, fade));
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, ey - CELL * 0.45, COLS * CELL, CELL * 0.9);
    ctx.fillStyle = 'rgba(255,255,255,' + fade + ')';
    ctx.fillRect(0, ey - CELL * 0.12, COLS * CELL, CELL * 0.24);
    for (const dir of [-1, 1]) {
      const tipX = ex + dir * reach;
      const grad2 = ctx.createRadialGradient(tipX, ey, 0, tipX, ey, CELL * 0.6);
      grad2.addColorStop(0, 'rgba(255,255,255,' + fade + ')');
      grad2.addColorStop(0.4, hexToRgba(arrowColor, fade * 0.7));
      grad2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath(); ctx.arc(tipX, ey, CELL * 0.6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'arrow_v') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const arrowColor = a.payload.color || '#ffd864';
    const reach = easeOut(p) * (ROWS * CELL);
    ctx.save();
    const grad = ctx.createLinearGradient(ex, ey - reach, ex, ey + reach);
    const fade = 1 - p * 0.6;
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, hexToRgba(arrowColor, fade));
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(ex - CELL * 0.45, 0, CELL * 0.9, ROWS * CELL);
    ctx.fillStyle = 'rgba(255,255,255,' + fade + ')';
    ctx.fillRect(ex - CELL * 0.12, 0, CELL * 0.24, ROWS * CELL);
    for (const dir of [-1, 1]) {
      const tipY = ey + dir * reach;
      const grad2 = ctx.createRadialGradient(ex, tipY, 0, ex, tipY, CELL * 0.6);
      grad2.addColorStop(0, 'rgba(255,255,255,' + fade + ')');
      grad2.addColorStop(0.4, hexToRgba(arrowColor, fade * 0.7));
      grad2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad2;
      ctx.beginPath(); ctx.arc(ex, tipY, CELL * 0.6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'bomb_blast') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const bombColor = a.payload.color || '#ff6a3e';
    const cells = a.payload.cells;
    ctx.save();
    // Phase 1: per-cell white outlines mark the blast zone
    if (p < 0.4) {
      const previewA = (p < 0.25 ? p / 0.25 : 1 - (p - 0.25) / 0.15);
      const pulse = 0.7 + 0.3 * Math.sin(p * 22);
      const fillA = previewA * 0.55 * pulse;
      const strokeA = Math.min(1, previewA * 1.2);
      ctx.lineWidth = 3;
      if (cells && cells.size) {
        for (const key of cells) {
          const [rr, cc] = key.split(',').map(Number);
          const tx = cc * CELL, ty = rr * CELL;
          ctx.fillStyle = hexToRgba(bombColor, fillA);
          ctx.fillRect(tx + 2, ty + 2, CELL - 4, CELL - 4);
          ctx.strokeStyle = hexToRgba('#ffffff', strokeA);
          ctx.strokeRect(tx + 2, ty + 2, CELL - 4, CELL - 4);
        }
      }
    }
    // Phase 2: fireball at epicenter
    if (p >= 0.2 && p <= 0.7) {
      const fireP = (p - 0.2) / 0.5;
      const fireR = easeOut(fireP) * CELL * 1.6;
      const fireA = (1 - fireP) * 0.95;
      const fg = ctx.createRadialGradient(ex, ey, 0, ex, ey, fireR);
      fg.addColorStop(0, 'rgba(255,255,255,' + fireA + ')');
      fg.addColorStop(0.25, 'rgba(255,240,180,' + fireA * 0.95 + ')');
      fg.addColorStop(0.55, hexToRgba(bombColor, fireA * 0.9));
      fg.addColorStop(0.85, hexToRgba(bombColor, fireA * 0.4));
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(ex - fireR, ey - fireR, fireR * 2, fireR * 2);
    }
    // Phase 3: 4 shockwave rings
    for (let i = 0; i < 4; i++) {
      const ringStart = i * 0.10;
      const ringDur = 0.55;
      const ringP = Math.max(0, Math.min(1, (p - ringStart) / ringDur));
      if (ringP <= 0 || ringP >= 1) continue;
      const radius = easeOut(ringP) * CELL * 3.0;
      const alpha = (1 - ringP) * 0.9;
      ctx.strokeStyle = hexToRgba(i === 0 ? '#ffffff' : (i === 1 ? '#fff5b0' : bombColor), alpha);
      ctx.lineWidth = (5 - i) * 2;
      ctx.beginPath(); ctx.arc(ex, ey, radius, 0, Math.PI * 2); ctx.stroke();
    }
    // Phase 4: debris arcs
    if (p > 0.15) {
      const debrisP = (p - 0.15) / 0.85;
      for (let i = 0; i < 14; i++) {
        const ang = (i / 14) * Math.PI * 2 + i * 0.4;
        for (let s = 0; s < 3; s++) {
          const sP = Math.max(0, debrisP - s * 0.06);
          if (sP <= 0) continue;
          const sDist = sP * CELL * 2.2;
          const sArc = Math.sin(sP * Math.PI) * CELL * 0.6;
          const sx = ex + Math.cos(ang) * sDist;
          const sy = ey + Math.sin(ang) * sDist - sArc;
          const sz = CELL * 0.16 * (1 - debrisP * 0.6) * (1 - s * 0.3);
          const sa = (1 - debrisP) * (1 - s * 0.25);
          ctx.fillStyle = hexToRgba(s === 0 ? '#fff5b0' : bombColor, sa);
          ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
    // Phase 5: smoke clouds
    if (p > 0.4) {
      const smokeP = (p - 0.4) / 0.6;
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2 + 0.2;
        const dist = smokeP * CELL * 1.4;
        const sx = ex + Math.cos(ang) * dist;
        const sy = ey + Math.sin(ang) * dist - smokeP * 8;
        const sz = CELL * 0.5 * (0.7 + smokeP * 0.5);
        const sa = (1 - smokeP) * 0.35;
        ctx.fillStyle = 'rgba(60,40,30,' + sa + ')';
        ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'lightning_strike') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const targets = a.payload.targets || [];
    const litColor = a.payload.color || '#9ad8ff';
    ctx.save();
    const strikePhase = Math.min(1, p / 0.35);
    const fadePhase = Math.max(0, (p - 0.35) / 0.65);
    // Source pulse
    if (p < 0.6) {
      const pulseA = Math.max(0, 1 - p / 0.6);
      const pulseR = CELL * (0.55 + 0.15 * Math.sin(p * 40));
      const pg = ctx.createRadialGradient(ex, ey, 0, ex, ey, pulseR);
      pg.addColorStop(0, 'rgba(255,255,255,' + pulseA + ')');
      pg.addColorStop(0.4, hexToRgba(litColor, pulseA * 0.9));
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.fillRect(ex - pulseR, ey - pulseR, pulseR * 2, pulseR * 2);
    }
    for (const tg of targets) {
      const tx = tg.c * CELL + CELL / 2;
      const ty = tg.r * CELL + CELL / 2;
      const reach = strikePhase;
      const endX = ex + (tx - ex) * reach;
      const endY = ey + (ty - ey) * reach;
      const segments = 10;
      const pts = [[ex, ey]];
      for (let i = 1; i < segments; i++) {
        const u = i / segments;
        const baseX = ex + (endX - ex) * u;
        const baseY = ey + (endY - ey) * u;
        const seed1 = Math.sin((tg.r * 13 + tg.c * 7 + i * 3.1) * 2.3);
        const seed2 = Math.sin((tg.r * 11 + tg.c * 5 + i * 4.7) * 1.9);
        const dx = tx - ex, dy = ty - ey;
        const nrm = Math.hypot(dx, dy) || 1;
        const perpX = -dy / nrm * seed1 * CELL * 0.3;
        const perpY = dx / nrm * seed1 * CELL * 0.3;
        const alongX = dx / nrm * seed2 * CELL * 0.08;
        const alongY = dy / nrm * seed2 * CELL * 0.08;
        pts.push([baseX + perpX + alongX, baseY + perpY + alongY]);
      }
      pts.push([endX, endY]);
      const boltAlpha = 1 - fadePhase;
      // Outer glow
      ctx.strokeStyle = hexToRgba(litColor, boltAlpha * 0.4);
      ctx.lineWidth = 16; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let i = 0; i < pts.length; i++) {
        if (i === 0) ctx.moveTo(pts[i][0], pts[i][1]);
        else ctx.lineTo(pts[i][0], pts[i][1]);
      }
      ctx.stroke();
      // Mid glow
      ctx.strokeStyle = hexToRgba(litColor, boltAlpha * 0.85);
      ctx.lineWidth = 8;
      ctx.beginPath();
      for (let i = 0; i < pts.length; i++) {
        if (i === 0) ctx.moveTo(pts[i][0], pts[i][1]);
        else ctx.lineTo(pts[i][0], pts[i][1]);
      }
      ctx.stroke();
      // Inner core
      ctx.strokeStyle = 'rgba(255,255,255,' + boltAlpha + ')';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < pts.length; i++) {
        if (i === 0) ctx.moveTo(pts[i][0], pts[i][1]);
        else ctx.lineTo(pts[i][0], pts[i][1]);
      }
      ctx.stroke();
      // Branches
      if (strikePhase > 0.5 && fadePhase < 0.5) {
        ctx.strokeStyle = hexToRgba(litColor, (1 - fadePhase) * 0.7);
        ctx.lineWidth = 2;
        for (let i = 2; i < pts.length - 1; i += 2) {
          const branchSeed = Math.sin((tg.r * 17 + tg.c * 11 + i * 5.7) * 1.7);
          if (branchSeed < 0) continue;
          const px = pts[i][0], py = pts[i][1];
          const dx = tx - ex, dy = ty - ey;
          const nrm = Math.hypot(dx, dy) || 1;
          const perpX = -dy / nrm * branchSeed * CELL * 0.5;
          const perpY = dx / nrm * branchSeed * CELL * 0.5;
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(px + perpX, py + perpY);
          ctx.stroke();
        }
      }
      // Target ring
      if (strikePhase >= 0.95) {
        const ringA = 1 - fadePhase;
        const ringR = CELL * (0.5 + fadePhase * 0.4);
        ctx.strokeStyle = hexToRgba(litColor, ringA);
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(tx, ty, ringR, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,' + ringA + ')';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(tx, ty, ringR * 0.6, 0, Math.PI * 2); ctx.stroke();
        const sg = ctx.createRadialGradient(tx, ty, 0, tx, ty, CELL * 0.5);
        sg.addColorStop(0, 'rgba(255,255,255,' + ringA + ')');
        sg.addColorStop(0.5, hexToRgba(litColor, ringA * 0.6));
        sg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(tx, ty, CELL * 0.5, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_arrow+arrow') {
    const ep = a.payload.epicenter;
    const oth = a.payload.other || ep;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const ox = oth.c * CELL + CELL / 2;
    const oy = oth.r * CELL + CELL / 2;
    const color = a.payload.color || '#ffd864';
    const subtype = a.payload.subtype || 'hv';
    ctx.save();
    if (p < 0.25) {
      const cp = p / 0.25;
      const rad = cp * CELL * 1.2;
      const cg = ctx.createRadialGradient(ex, ey, 0, ex, ey, rad);
      cg.addColorStop(0, 'rgba(255,255,255,1)');
      cg.addColorStop(0.5, hexToRgba(color, 0.9));
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.fillRect(ex - rad, ey - rad, rad * 2, rad * 2);
    } else {
      const sp = Math.min(1, (p - 0.25) / 0.45);
      const fadeP = Math.max(0, (p - 0.7) / 0.3);
      const fade = 1 - fadeP;
      const reach = easeOut(sp);
      const drawHBeam = (cy) => {
        const hLen = reach * COLS * CELL;
        const hGrad = ctx.createLinearGradient(ex - hLen, cy, ex + hLen, cy);
        hGrad.addColorStop(0, 'rgba(255,255,255,0)');
        hGrad.addColorStop(0.5, hexToRgba(color, fade));
        hGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = hGrad;
        ctx.fillRect(0, cy - CELL * 0.5, COLS * CELL, CELL);
        ctx.fillStyle = 'rgba(255,255,255,' + fade + ')';
        ctx.fillRect(0, cy - CELL * 0.12, COLS * CELL, CELL * 0.24);
      };
      const drawVBeam = (cx) => {
        const vLen = reach * ROWS * CELL;
        const vGrad = ctx.createLinearGradient(cx, ey - vLen, cx, ey + vLen);
        vGrad.addColorStop(0, 'rgba(255,255,255,0)');
        vGrad.addColorStop(0.5, hexToRgba(color, fade));
        vGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = vGrad;
        ctx.fillRect(cx - CELL * 0.5, 0, CELL, ROWS * CELL);
        ctx.fillStyle = 'rgba(255,255,255,' + fade + ')';
        ctx.fillRect(cx - CELL * 0.12, 0, CELL * 0.24, ROWS * CELL);
      };
      if (subtype === 'vv') { drawVBeam(ex); drawVBeam(ox); }
      else if (subtype === 'hh') { drawHBeam(ey); drawHBeam(oy); }
      else { drawHBeam(ey); drawVBeam(ex); }
      const novaR = CELL * 1.2;
      const ng = ctx.createRadialGradient(ex, ey, 0, ex, ey, novaR);
      ng.addColorStop(0, 'rgba(255,255,255,' + fade + ')');
      ng.addColorStop(0.5, hexToRgba(color, fade * 0.8));
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ng;
      ctx.fillRect(ex - novaR, ey - novaR, novaR * 2, novaR * 2);
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_arrow+bomb') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const color = a.payload.color || '#ff6a3e';
    const cells = a.payload.cells || new Set();
    const rows = new Set(), cols = new Set();
    for (const k of cells) {
      const [r, c] = k.split(',').map(Number);
      rows.add(r); cols.add(c);
    }
    const isHorizontal = rows.size <= 3;
    ctx.save();
    const sweepP = Math.max(0, Math.min(1, (p - 0.3) / 0.4));
    const fadeP  = Math.max(0, (p - 0.7) / 0.3);
    const fade = 1 - fadeP;
    if (isHorizontal) {
      const arr = []; for (const r of rows) arr.push(r); arr.sort((a, b) => a - b);
      for (const rr of arr) {
        const ry = rr * CELL + CELL / 2;
        const reach = easeOut(sweepP) * COLS * CELL;
        const grad = ctx.createLinearGradient(ex - reach, ry, ex + reach, ry);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.5, hexToRgba(color, fade));
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, ry - CELL * 0.45, COLS * CELL, CELL * 0.9);
        ctx.fillStyle = 'rgba(255,255,255,' + fade * 0.8 + ')';
        ctx.fillRect(0, ry - CELL * 0.1, COLS * CELL, CELL * 0.2);
      }
    } else {
      const arr = []; for (const c of cols) arr.push(c); arr.sort((a, b) => a - b);
      for (const cc of arr) {
        const cx = cc * CELL + CELL / 2;
        const reach = easeOut(sweepP) * ROWS * CELL;
        const grad = ctx.createLinearGradient(cx, ey - reach, cx, ey + reach);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.5, hexToRgba(color, fade));
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(cx - CELL * 0.45, 0, CELL * 0.9, ROWS * CELL);
        ctx.fillStyle = 'rgba(255,255,255,' + fade * 0.8 + ')';
        ctx.fillRect(cx - CELL * 0.1, 0, CELL * 0.2, ROWS * CELL);
      }
    }
    if (p > 0.2 && p < 0.85) {
      const expP = (p - 0.2) / 0.65;
      const fireR = easeOut(expP) * CELL * 1.8;
      const fireA = (1 - expP) * 0.9;
      const fg = ctx.createRadialGradient(ex, ey, 0, ex, ey, fireR);
      fg.addColorStop(0, 'rgba(255,255,255,' + fireA + ')');
      fg.addColorStop(0.5, hexToRgba(color, fireA * 0.8));
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(ex - fireR, ey - fireR, fireR * 2, fireR * 2);
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_arrow+lightning') {
    const cells = a.payload.cells || new Set();
    const color = a.payload.color || '#9ad8ff';
    ctx.save();
    const darkP = p < 0.3 ? p / 0.3 : Math.max(0, 1 - (p - 0.3) / 0.5);
    ctx.fillStyle = 'rgba(40, 30, 100, ' + darkP * 0.4 + ')';
    ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
    if (p >= 0.15) {
      const beamP = (p - 0.15) / 0.7;
      const rows = {}, cols = {};
      for (const k of cells) {
        const [r, c] = k.split(',').map(Number);
        rows[r] = (rows[r] || 0) + 1;
        cols[c] = (cols[c] || 0) + 1;
      }
      const litRows = []; for (const r in rows) if (rows[r] >= COLS) litRows.push(parseInt(r, 10));
      const litCols = []; for (const c in cols) if (cols[c] >= ROWS) litCols.push(parseInt(c, 10));
      const fade = Math.max(0, 1 - Math.max(0, p - 0.7) / 0.3);
      for (const rr of litRows) {
        const ry = rr * CELL + CELL / 2;
        const grad = ctx.createLinearGradient(0, ry, COLS * CELL, ry);
        grad.addColorStop(0, hexToRgba(color, fade * 0.9));
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, ry - CELL * 0.4, COLS * CELL, CELL * 0.8);
        ctx.fillStyle = 'rgba(255,255,255,' + fade * 0.85 + ')';
        ctx.fillRect(0, ry - CELL * 0.1, COLS * CELL, CELL * 0.2);
      }
      for (const cc of litCols) {
        const cx = cc * CELL + CELL / 2;
        const grad = ctx.createLinearGradient(cx, 0, cx, ROWS * CELL);
        grad.addColorStop(0, hexToRgba(color, fade * 0.9));
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(cx - CELL * 0.4, 0, CELL * 0.8, ROWS * CELL);
        ctx.fillStyle = 'rgba(255,255,255,' + fade * 0.85 + ')';
        ctx.fillRect(cx - CELL * 0.1, 0, CELL * 0.2, ROWS * CELL);
      }
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_bomb+bomb') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const color = a.payload.color || '#ff6a3e';
    ctx.save();
    if (p < 0.25) {
      const prepP = p / 0.25;
      ctx.fillStyle = hexToRgba(color, 0.25 + 0.3 * Math.sin(prepP * 15));
      const zoneX = (ep.c - 2) * CELL;
      const zoneY = (ep.r - 2) * CELL;
      ctx.fillRect(zoneX, zoneY, CELL * 5, CELL * 5);
      ctx.strokeStyle = hexToRgba('#ffffff', 0.7);
      ctx.lineWidth = 4;
      ctx.strokeRect(zoneX, zoneY, CELL * 5, CELL * 5);
    }
    if (p >= 0.15 && p < 0.65) {
      const expP = (p - 0.15) / 0.5;
      const fireR = easeOut(expP) * CELL * 5;
      const fireA = (1 - expP * 0.6) * 0.95;
      const fg = ctx.createRadialGradient(ex, ey, 0, ex, ey, fireR);
      fg.addColorStop(0, 'rgba(255,255,255,' + fireA + ')');
      fg.addColorStop(0.15, 'rgba(255,250,200,' + fireA * 0.95 + ')');
      fg.addColorStop(0.4, 'rgba(255,140,40,' + fireA * 0.9 + ')');
      fg.addColorStop(0.75, hexToRgba(color, fireA * 0.7));
      fg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(ex - fireR, ey - fireR, fireR * 2, fireR * 2);
    }
    for (let i = 0; i < 5; i++) {
      const ringP = Math.max(0, Math.min(1, (p - 0.15) - i * 0.08));
      if (ringP <= 0 || ringP >= 1) continue;
      const rad = easeOut(ringP) * CELL * 5.5;
      const a1 = (1 - ringP) * 0.9;
      ctx.strokeStyle = hexToRgba(i === 0 ? '#ffffff' : (i === 1 ? '#fff5b0' : color), a1);
      ctx.lineWidth = (6 - i) * 2;
      ctx.beginPath(); ctx.arc(ex, ey, rad, 0, Math.PI * 2); ctx.stroke();
    }
    if (p > 0.55) {
      const smokeP = (p - 0.55) / 0.45;
      for (let i = 0; i < 16; i++) {
        const ang = (i / 16) * Math.PI * 2 + 0.1;
        const dist = smokeP * CELL * 3.2;
        const sx = ex + Math.cos(ang) * dist;
        const sy = ey + Math.sin(ang) * dist - smokeP * 20;
        const sz = CELL * 0.9 * (0.6 + smokeP * 0.5);
        ctx.fillStyle = 'rgba(40,25,15,' + (1 - smokeP) * 0.55 + ')';
        ctx.beginPath(); ctx.arc(sx, sy, sz, 0, Math.PI * 2); ctx.fill();
      }
      for (let i = 0; i < 24; i++) {
        const ang = (i / 24) * Math.PI * 2 + p * 4;
        const dist = smokeP * CELL * 4;
        const ex2 = ex + Math.cos(ang) * dist;
        const ey2 = ey + Math.sin(ang) * dist - smokeP * 16;
        ctx.fillStyle = hexToRgba(i % 2 === 0 ? '#ffd864' : color, (1 - smokeP) * 0.85);
        ctx.beginPath(); ctx.arc(ex2, ey2, 4 * (1 - smokeP * 0.7), 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_bomb+lightning') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const color = a.payload.color || '#ff6a3e';
    const cells = a.payload.cells || new Set();
    ctx.save();
    ctx.fillStyle = 'rgba(20, 10, 60, ' + (p < 0.5 ? 0.4 : Math.max(0, 0.4 - (p - 0.5) * 0.8)) + ')';
    ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
    // Identify bomb centers
    const centers = [];
    const checked = new Set();
    for (const k of cells) {
      const [r, c] = k.split(',').map(Number);
      let neighborCount = 0;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (cells.has((r + dr) + ',' + (c + dc))) neighborCount++;
      }
      if (neighborCount === 9 && !checked.has(k)) {
        centers.push({ r, c });
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) checked.add((r + dr) + ',' + (c + dc));
      }
    }
    // Phase 2: bolts to centers
    if (p >= 0.15 && p < 0.55) {
      const strikeP = (p - 0.15) / 0.4;
      for (const cn of centers) {
        const tx = cn.c * CELL + CELL / 2;
        const ty = cn.r * CELL + CELL / 2;
        const segments = 8;
        const pts = [[ex, ey]];
        for (let j = 1; j < segments; j++) {
          const u = j / segments;
          const baseX = ex + (tx - ex) * u;
          const baseY = ey + (ty - ey) * u;
          const jitter = Math.sin((cn.r * 13 + cn.c * 7 + j) * 2.3);
          const dx = tx - ex, dy = ty - ey;
          const nrm = Math.hypot(dx, dy) || 1;
          pts.push([baseX + -dy / nrm * jitter * CELL * 0.3, baseY + dx / nrm * jitter * CELL * 0.3]);
        }
        pts.push([tx, ty]);
        const alpha = strikeP < 0.5 ? strikeP * 2 : 1 - (strikeP - 0.5) * 2;
        ctx.strokeStyle = hexToRgba('#9ad8ff', alpha * 0.6);
        ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          if (j === 0) ctx.moveTo(pts[j][0], pts[j][1]);
          else ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          if (j === 0) ctx.moveTo(pts[j][0], pts[j][1]);
          else ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
      }
    }
    // Phase 3: explosions
    if (p > 0.4) {
      for (let i = 0; i < centers.length; i++) {
        const cn = centers[i];
        const tx = cn.c * CELL + CELL / 2;
        const ty = cn.r * CELL + CELL / 2;
        const expP = Math.max(0, Math.min(1, (p - 0.4 - i * 0.03) / 0.55));
        if (expP <= 0) continue;
        const fireR = easeOut(expP) * CELL * 1.5;
        const fireA = (1 - expP) * 0.9;
        const fg = ctx.createRadialGradient(tx, ty, 0, tx, ty, fireR);
        fg.addColorStop(0, 'rgba(255,255,255,' + fireA + ')');
        fg.addColorStop(0.4, hexToRgba(color, fireA * 0.85));
        fg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fg;
        ctx.fillRect(tx - fireR, ty - fireR, fireR * 2, fireR * 2);
      }
    }
    ctx.restore();
    return;
  }

  if (a.kind === 'combo_lightning+lightning') {
    const ep = a.payload.epicenter;
    const ex = ep.c * CELL + CELL / 2;
    const ey = ep.r * CELL + CELL / 2;
    const cells = a.payload.cells || new Set();
    ctx.save();
    ctx.fillStyle = 'rgba(10, 5, 50, ' + (p < 0.6 ? 0.55 : Math.max(0, 0.55 - (p - 0.6) * 1.4)) + ')';
    ctx.fillRect(0, 0, COLS * CELL, ROWS * CELL);
    if (p < 0.4) {
      const pulseP = p / 0.4;
      const rad = CELL * (1.0 + 0.4 * Math.sin(pulseP * 30));
      const cg = ctx.createRadialGradient(ex, ey, 0, ex, ey, rad);
      cg.addColorStop(0, 'rgba(255,255,255,1)');
      cg.addColorStop(0.3, 'rgba(200,240,255,0.9)');
      cg.addColorStop(0.7, hexToRgba('#9ad8ff', 0.7));
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.fillRect(ex - rad, ey - rad, rad * 2, rad * 2);
    }
    if (p >= 0.2 && p < 0.85) {
      const strikeP = (p - 0.2) / 0.65;
      const fade = strikeP < 0.5 ? strikeP * 2 : 1 - (strikeP - 0.5) * 2;
      let idx = 0;
      for (const k of cells) {
        const [r, c] = k.split(',').map(Number);
        if (r === ep.r && c === ep.c) continue;
        idx++;
        const tx = c * CELL + CELL / 2;
        const ty = r * CELL + CELL / 2;
        const myDelay = (idx % 8) * 0.04;
        const myP = Math.max(0, strikeP - myDelay);
        if (myP <= 0) continue;
        const reach = Math.min(1, myP * 2);
        const ex2 = ex + (tx - ex) * reach;
        const ey2 = ey + (ty - ey) * reach;
        const segments = 6;
        const pts = [[ex, ey]];
        for (let j = 1; j < segments; j++) {
          const u = j / segments;
          const baseX = ex + (ex2 - ex) * u;
          const baseY = ey + (ey2 - ey) * u;
          const jitter = Math.sin((r * 13 + c * 7 + j) * 2.3);
          const dx = tx - ex, dy = ty - ey;
          const nrm = Math.hypot(dx, dy) || 1;
          pts.push([baseX + -dy / nrm * jitter * CELL * 0.25, baseY + dx / nrm * jitter * CELL * 0.25]);
        }
        pts.push([ex2, ey2]);
        ctx.strokeStyle = hexToRgba('#9ad8ff', fade * 0.7);
        ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          if (j === 0) ctx.moveTo(pts[j][0], pts[j][1]);
          else ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,' + fade + ')';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let j = 0; j < pts.length; j++) {
          if (j === 0) ctx.moveTo(pts[j][0], pts[j][1]);
          else ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
        if (reach >= 0.95) {
          const sg = ctx.createRadialGradient(tx, ty, 0, tx, ty, CELL * 0.5);
          sg.addColorStop(0, 'rgba(255,255,255,' + fade + ')');
          sg.addColorStop(0.5, hexToRgba('#9ad8ff', fade * 0.7));
          sg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = sg;
          ctx.beginPath(); ctx.arc(tx, ty, CELL * 0.5, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
    ctx.restore();
    return;
  }
}

function roundRectPath(x, y, w, h, r) {
  if (typeof ctx.roundRect === 'function') { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); return; }
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* =========================================================
   [31] Input — tap-tap + swipe
   ========================================================= */

// =========================================================
// Input — drag-to-swipe (Match Icon pattern).
// onPointerDown: grab origin cell.
// onPointerMove: as soon as drag crosses DRAG_THRESHOLD in any
//                cardinal direction, fire attemptSwap and clear
//                dragStart so we don't double-fire.
// onPointerUp:   if no swipe happened, treat as tap-to-select;
//                a second adjacent tap completes a swap.
// During drag, spawn small sparkle dots along the finger path.
// =========================================================

const DRAG_THRESHOLD = 12;
let dragStart = null;
let isSwiping = false;

function cellFromEvent(ev) {
  const rect = canvas.getBoundingClientRect();
  const cellCss = rect.width / COLS;
  const px = (ev.clientX != null ? ev.clientX : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : null));
  const py = (ev.clientY != null ? ev.clientY : (ev.touches && ev.touches[0] ? ev.touches[0].clientY : null));
  if (px == null) return null;
  const x = px - rect.left;
  const y = py - rect.top;
  const c = Math.floor(x / cellCss);
  const r = Math.floor(y / cellCss);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return { r, c, x: px, y: py };
}

function onPointerDown(ev) {
  if (ev.cancelable) ev.preventDefault();
  if (game.busy) return;
  const cell = cellFromEvent(ev);
  if (!cell) return;
  isSwiping = true;
  // Hammer / rocket / bomb boosters target a single cell.
  if (state.armed.hammer || state.armed.rocket || state.armed.bomb) {
    attemptSwap(cell.r, cell.c, cell.r, cell.c);
    return;
  }
  dragStart = cell;
}

function onPointerMove(ev) {
  // Swipe trail dots — runs for the whole gesture, not just before swap.
  if (isSwiping) {
    const px = (ev.clientX != null ? ev.clientX : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : null));
    const py = (ev.clientY != null ? ev.clientY : (ev.touches && ev.touches[0] ? ev.touches[0].clientY : null));
    if (px != null && py != null) spawnSwipeDot(px, py);
  }
  if (!dragStart || game.busy) return;
  const rect = canvas.getBoundingClientRect();
  const px = (ev.clientX != null ? ev.clientX : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : null));
  const py = (ev.clientY != null ? ev.clientY : (ev.touches && ev.touches[0] ? ev.touches[0].clientY : null));
  if (px == null) return;
  const dx = px - dragStart.x;
  const dy = py - dragStart.y;
  if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
  // Threshold crossed: snap to a cardinal swap.
  let r2 = dragStart.r, c2 = dragStart.c;
  if (Math.abs(dx) > Math.abs(dy)) c2 += dx > 0 ? 1 : -1;
  else                              r2 += dy > 0 ? 1 : -1;
  if (r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) { dragStart = null; return; }
  const from = dragStart;
  dragStart = null;
  game.selected = null;
  attemptSwap(from.r, from.c, r2, c2);
}

function onPointerUp(ev) {
  isSwiping = false;
  if (game.busy || !dragStart) { dragStart = null; return; }
  // No swipe happened — treat as tap-to-select with optional adjacent commit.
  const cell = dragStart;
  dragStart = null;
  if (game.selected) {
    const dr = Math.abs(game.selected.r - cell.r);
    const dc = Math.abs(game.selected.c - cell.c);
    if (dr + dc === 1) {
      const from = game.selected;
      game.selected = null;
      attemptSwap(from.r, from.c, cell.r, cell.c);
      return;
    }
  }
  game.selected = (game.selected && game.selected.r === cell.r && game.selected.c === cell.c) ? null : cell;
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove',  onPointerMove,  { passive: false });
canvas.addEventListener('touchend',   onPointerUp);
canvas.addEventListener('touchcancel', () => { dragStart = null; isSwiping = false; });
canvas.addEventListener('mouseleave', () => { dragStart = null; isSwiping = false; });

/* =========================================================
   [32] VFX — score-fly, score bump, combo overlay, screen flash
       (Direct port from Match Icon spawnScoreFly / scoreBump.)
   ========================================================= */

// Tile-trail orb — small glowing dot in the tile's color flies from the
// cleared board cell to the gold counter with 8 fading trail clones
// behind it. On arrival, spawns a color burst at the score and the
// score-card bumps. Heavier than spawnScoreFly text but reads as the
// reward physically arriving. Throttled by callers (first N cells only).
function spawnTileTrail(col, row, color, delay) {
  delay = delay || 0;
  const rect = canvas.getBoundingClientRect();
  const startX = rect.left + col * CELL + CELL / 2;
  const startY = rect.top  + row * CELL + CELL / 2;
  const target = document.getElementById('goldScore');
  if (!target) return;
  const trect = target.getBoundingClientRect();
  const endX = trect.left + trect.width / 2;
  const endY = trect.top  + trect.height / 2;
  setTimeout(() => {
    const orb = document.createElement('div');
    orb.style.cssText =
      'position:fixed;left:' + startX + 'px;top:' + startY + 'px;' +
      'width:16px;height:16px;margin-left:-8px;margin-top:-8px;' +
      'border-radius:50%;background:' + color + ';' +
      'box-shadow:0 0 12px ' + color + ',0 0 20px ' + color + ',0 0 4px #fff inset;' +
      'pointer-events:none;z-index:82;opacity:1;will-change:left,top,transform,opacity;' +
      'transition:left 0.65s cubic-bezier(0.45,0,0.55,0.2),top 0.65s cubic-bezier(0.45,0,0.55,0.2),transform 0.65s ease-in,opacity 0.15s ease-out 0.55s;';
    document.body.appendChild(orb);
    let trailCount = 0;
    const trailInterval = setInterval(() => {
      const orbRect = orb.getBoundingClientRect();
      const tx = orbRect.left + orbRect.width / 2;
      const ty = orbRect.top  + orbRect.height / 2;
      const trail = document.createElement('div');
      trail.style.cssText =
        'position:fixed;left:' + tx + 'px;top:' + ty + 'px;' +
        'width:10px;height:10px;margin-left:-5px;margin-top:-5px;' +
        'border-radius:50%;background:' + color + ';' +
        'box-shadow:0 0 8px ' + color + ';' +
        'pointer-events:none;z-index:81;opacity:0.7;will-change:opacity,transform;' +
        'transition:opacity 0.4s ease-out,transform 0.4s ease-out;';
      document.body.appendChild(trail);
      requestAnimationFrame(() => {
        trail.style.opacity = '0';
        trail.style.transform = 'scale(0.3)';
      });
      setTimeout(() => { if (trail.parentNode) trail.remove(); }, 450);
      trailCount++;
      if (trailCount >= 8) clearInterval(trailInterval);
    }, 55);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        orb.style.left = endX + 'px';
        orb.style.top  = endY + 'px';
        orb.style.transform = 'scale(0.4)';
        orb.style.opacity = '0';
      });
    });
    setTimeout(() => {
      clearInterval(trailInterval);
      // Color burst at the score-card on arrival
      const burst = document.createElement('div');
      burst.style.cssText =
        'position:fixed;left:' + endX + 'px;top:' + endY + 'px;' +
        'width:30px;height:30px;margin-left:-15px;margin-top:-15px;' +
        'border-radius:50%;pointer-events:none;z-index:79;opacity:1;' +
        'background:radial-gradient(circle,' + color + ' 0%,' + color + '88 40%,transparent 70%);' +
        'transition:opacity 0.3s,transform 0.3s;will-change:opacity,transform;';
      document.body.appendChild(burst);
      requestAnimationFrame(() => {
        burst.style.transform = 'scale(2.2)';
        burst.style.opacity = '0';
      });
      setTimeout(() => { if (burst.parentNode) burst.remove(); }, 320);
      bumpScore();
    }, 650);
    setTimeout(() => { if (orb.parentNode) orb.remove(); }, 750);
  }, delay);
}

function spawnScoreFly(col, row, text) {
  const rect = canvas.getBoundingClientRect();
  const startX = rect.left + col * CELL + CELL / 2;
  const startY = rect.top  + row * CELL + CELL / 2;
  const target = document.getElementById('goldScore');
  if (!target) return;
  const trect = target.getBoundingClientRect();
  const endX = trect.left + trect.width / 2;
  const endY = trect.top  + trect.height / 2;

  const fly = document.createElement('div');
  fly.className = 'score-fly';
  fly.textContent = text;
  fly.style.left = startX + 'px';
  fly.style.top  = startY + 'px';
  document.body.appendChild(fly);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fly.style.left = endX + 'px';
      fly.style.top  = endY + 'px';
      fly.classList.add('flying');
    });
  });
  setTimeout(() => { if (fly.parentNode) fly.parentNode.removeChild(fly); }, 1000);
}

function bumpScore() {
  const el = document.getElementById('goldScore');
  if (!el) return;
  el.classList.remove('score-bump');
  void el.offsetWidth;
  el.classList.add('score-bump');
  setTimeout(() => el.classList.remove('score-bump'), 400);
}

// Smaller, faster pulse used when an individual coin lands. Multiple
// coins in flight produce a series of ticks — "odometer climbing" feel.
function clinkScore() {
  const el = document.getElementById('goldScore');
  if (!el) return;
  el.classList.remove('score-clink');
  void el.offsetWidth;
  el.classList.add('score-clink');
  setTimeout(() => el.classList.remove('score-clink'), 220);
}

// Sprite URL for the coin-fly animation. Uses the chroma-keyed canvas
// (no black background) so the flying gem matches what's on the board.
// Built once on demand from tileImages._t_coin's stripped canvas.
let _coinFlyDataURL = null;
let _coinFlyBuiltAt = 0;
function getCoinFlySpriteURL() {
  // Prefer the chroma-keyed dataURL built once in preloadTileImages.
  if (tileImageDataURL._t_coin) return tileImageDataURL._t_coin;
  const entry = tileImages._t_coin;
  if (entry && entry.canvas && entry.complete) {
    if (!_coinFlyDataURL || _coinFlyBuiltAt !== entry.naturalWidth) {
      try {
        _coinFlyDataURL = entry.canvas.toDataURL ? entry.canvas.toDataURL('image/png') : null;
        _coinFlyBuiltAt = entry.naturalWidth;
      } catch (e) { _coinFlyDataURL = null; }
    }
    if (_coinFlyDataURL) return _coinFlyDataURL;
  }
  // Fallback: canvas-drawn coin (offline preview / image still loading).
  if (_coinFlyDataURL) return _coinFlyDataURL;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const sizePx = 36;
  const px = sizePx * dpr;
  const off = document.createElement('canvas');
  off.width = px;
  off.height = px;
  const c = off.getContext('2d');
  c.scale(dpr, dpr);
  drawCoinIconTo(c, sizePx / 2, sizePx / 2, sizePx * 0.95);
  _coinFlyDataURL = off.toDataURL('image/png');
  return _coinFlyDataURL;
}

// Coins committed to the displayed counter on arrival. Each flying coin
// reserves a chunk of gold; the counter ticks up only when the coin lands.
// Big payouts → many coins → odometer climbs in visible steps.
let _pendingCoinCommit = 0;

function spawnCoinFly(col, row, value, delay) {
  delay = delay || 0;
  const rect = canvas.getBoundingClientRect();
  const startX = rect.left + col * CELL + CELL / 2;
  const startY = rect.top  + row * CELL + CELL / 2;
  const target = document.getElementById('goldScore');
  if (!target) return;
  const trect = target.getBoundingClientRect();
  const endX = trect.left + trect.width / 2;
  const endY = trect.top  + trect.height / 2;
  // Slight random jitter at start so coins from the same cell fan out
  const jitterX = (Math.random() - 0.5) * 18;
  const jitterY = (Math.random() - 0.5) * 12;

  setTimeout(() => {
    const coin = document.createElement('img');
    coin.className = 'coin-fly';
    coin.src = getCoinFlySpriteURL();
    coin.style.left = (startX + jitterX) + 'px';
    coin.style.top  = (startY + jitterY) + 'px';
    document.body.appendChild(coin);
    // Kick off the transition next frame
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        coin.style.left = endX + 'px';
        coin.style.top  = endY + 'px';
        coin.classList.add('landing');
      });
    });
    // On arrival: commit gold, clink the counter, spark burst
    const arriveAt = 620;
    setTimeout(() => {
      _pendingCoinCommit = Math.max(0, _pendingCoinCommit - value);
      displayedGold = Math.min(state.coins, displayedGold + value);
      refreshGoldDisplay();
      clinkScore();
      // Spark burst at the counter
      const burst = document.createElement('div');
      burst.className = 'coin-burst';
      burst.style.left = endX + 'px';
      burst.style.top  = endY + 'px';
      burst.style.opacity = '1';
      burst.style.transform = 'scale(1)';
      document.body.appendChild(burst);
      requestAnimationFrame(() => {
        burst.style.transform = 'scale(2.4)';
        burst.style.opacity = '0';
      });
      setTimeout(() => { if (burst.parentNode) burst.remove(); }, 320);
      // Little chime per landing (rate-limit-friendly)
      try { sfxTone(660 + Math.random() * 200, 0.10, 0.06, 'triangle'); } catch (e) {}
    }, arriveAt);
    setTimeout(() => { if (coin.parentNode) coin.remove(); }, 720);
  }, delay);
}

// =========================================================
// COIN SHOWER — canvas particle system. Coins burst out of the
// matched cells with upward+outward velocity, grow in size while
// they rise (selling depth — the closer to "camera" the bigger),
// then gravity takes over and they fall out the bottom of the frame.
// No spin (gives the 2D away), no glow (the asset does the work).
// One overlay canvas drawn per rAF tick — DOM stays clean.
// =========================================================
const coinFXCanvas = document.getElementById('coinFXCanvas');
const coinFXCtx = coinFXCanvas ? coinFXCanvas.getContext('2d') : null;
let coinFXDPR = 1;
let coinFXW = 0, coinFXH = 0;
const coinFXParticles = [];

function sizeCoinFXCanvas() {
  if (!coinFXCanvas || !coinFXCtx) return;
  coinFXDPR = Math.min(2, window.devicePixelRatio || 1);
  coinFXW = window.innerWidth;
  coinFXH = window.innerHeight;
  coinFXCanvas.width  = coinFXW * coinFXDPR;
  coinFXCanvas.height = coinFXH * coinFXDPR;
  coinFXCanvas.style.width  = coinFXW + 'px';
  coinFXCanvas.style.height = coinFXH + 'px';
  coinFXCtx.setTransform(coinFXDPR, 0, 0, coinFXDPR, 0, 0);
}
sizeCoinFXCanvas();
window.addEventListener('resize', sizeCoinFXCanvas);
window.addEventListener('resize', () => { if (typeof sizeMountainCanvas === 'function') sizeMountainCanvas(); });

function spawnCoinShower(srcClientX, srcClientY, count, mega) {
  if (!coinFXCtx) return;
  // Source bitmap — use the chroma-keyed coin canvas if ready, otherwise
  // skip (no fallback drawing — keeps the hot path tiny).
  const entry = (typeof tileImages !== 'undefined') ? tileImages._t_coin : null;
  if (!entry || !entry.canvas || !entry.complete) return;

  for (let i = 0; i < count; i++) {
    // Outward burst angle in screen space. Bias UPWARD (favoring -y)
    // so coins rise first, then gravity arcs them down out of frame.
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.9;  // -90° ± ~80°
    const speed = 380 + Math.random() * (mega ? 480 : 340);              // px/s burst speed
    const vx = Math.cos(angle) * speed * (0.6 + Math.random() * 0.6);
    const vy = Math.sin(angle) * speed;                                  // negative = up
    // Depth: starts at 0, grows toward viewer while particle is rising
    // (scale = 1 + z*depthScale). vz decelerates so depth tapers off.
    const vz = (mega ? 240 : 180) + Math.random() * (mega ? 220 : 160);
    // Base render size in screen px at z=0.
    const baseSize = (mega ? 28 : 22) + Math.random() * (mega ? 22 : 16);
    // Per-coin spawn delay so the burst doesn't all appear in one frame.
    const delay = (Math.random() * (mega ? 220 : 160)) / 1000;            // sec
    coinFXParticles.push({
      x: srcClientX,
      y: srcClientY,
      vx, vy, vz,
      z: 0,
      baseSize,
      delay,                       // counts down before particle is "active"
      gravity: mega ? 1500 : 1700, // px/s²
      vzDecay: 0.92,               // multiplied per second of integration
    });
  }
}

function updateCoinShower(dtMs) {
  if (coinFXParticles.length === 0) return;
  const dt = Math.min(50, dtMs) / 1000;   // clamp to 50ms; in seconds
  const H = coinFXH || window.innerHeight;
  for (let i = coinFXParticles.length - 1; i >= 0; i--) {
    const p = coinFXParticles[i];
    if (p.delay > 0) { p.delay -= dt; continue; }
    // Velocity integration with simple gravity.
    p.vy += p.gravity * dt;
    p.vz *= Math.pow(p.vzDecay, dt * 60);    // frame-rate independent decay
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.z  += p.vz * dt;
    // Remove once the coin has fully passed the bottom of the screen.
    const renderSize = p.baseSize * (1 + p.z * 0.004);
    if (p.y - renderSize > H + 40) {
      coinFXParticles.splice(i, 1);
    }
  }
}

function renderCoinShower() {
  if (!coinFXCtx) return;
  // Always clear (cheap) — if no particles, this is the only op.
  coinFXCtx.clearRect(0, 0, coinFXW, coinFXH);
  if (coinFXParticles.length === 0) return;
  const entry = tileImages && tileImages._t_coin;
  if (!entry || !entry.canvas) return;
  const src = entry.canvas;
  for (const p of coinFXParticles) {
    if (p.delay > 0) continue;
    const size = p.baseSize * (1 + p.z * 0.004);   // depth → size
    if (size < 4) continue;
    coinFXCtx.drawImage(src, p.x - size / 2, p.y - size / 2, size, size);
  }
}

// =========================================================
// CHARACTER SCENE — cute creature you feed coins. Each world
// has its own character (pig, dragon, ...). The 5 cards are
// dress-up slots: size / feed / crown / throne / bling.
// Max out all 5 (25 levels) → EXPLODE animation + advance.
// =========================================================
let mountainCanvasEl = null;
let mountainCtx = null;
let mountainDPR = 1;
let mountainW = 0, mountainH = 0;
// Falling-coin particles for upgrade animation. Reuses the canvas
// above so we can animate without DOM elements.
const mountainCoinAnims = [];

function ensureMountainCanvas() {
  if (mountainCanvasEl && mountainCtx) return true;
  mountainCanvasEl = document.getElementById('mountainCanvas');
  if (!mountainCanvasEl) return false;
  mountainCtx = mountainCanvasEl.getContext('2d');
  return true;
}
function sizeMountainCanvas() {
  if (!ensureMountainCanvas()) return;
  const rect = mountainCanvasEl.getBoundingClientRect();
  if (rect.width === 0) return;   // not visible yet
  mountainDPR = Math.min(2, window.devicePixelRatio || 1);
  mountainW = rect.width;
  mountainH = rect.height;
  mountainCanvasEl.width  = Math.round(mountainW * mountainDPR);
  mountainCanvasEl.height = Math.round(mountainH * mountainDPR);
  mountainCtx.setTransform(mountainDPR, 0, 0, mountainDPR, 0, 0);
}

// Read the 5 dress-up slot levels for the current theme.
function getMountainLevels() {
  const theme = THEMES[state.theme];
  const out = { size: 0, feed: 0, crown: 0, throne: 0, bling: 0 };
  if (!theme) return out;
  for (const s of theme.structures) {
    if (!s.slot) continue;
    out[s.slot] = getStructLevel(s.id);
  }
  return out;
}
// Sum of all 5 slot levels. 25 = world complete.
function worldTotalLevels(themeId) {
  const theme = THEMES[themeId || state.theme];
  if (!theme) return 0;
  let n = 0;
  for (const s of theme.structures) n += getStructLevel(s.id);
  return n;
}

// World-complete explosion state. While active, renderCharacterScene
// runs a 3-second animation: character pops, screen flashes, coins
// erupt. After animation, state.village resets + theme advances.
let _worldExplode = null;  // { startedAt:ms, duration:ms } when active

// Draw the full mountain composition. Called every frame; cheap when
// the Village tab isn't active because `if (rect.width === 0) return`.
function renderCoinMountain() {
  if (!ensureMountainCanvas()) return;
  if (mountainW === 0 || mountainH === 0) return;
  const theme = THEMES[state.theme];
  if (!theme) return;
  const pal = theme.palette || {};
  const lv = getMountainLevels();
  const c = mountainCtx;
  const W = mountainW, H = mountainH;
  c.clearRect(0, 0, W, H);
  const tt = (typeof now === 'function' ? now() : Date.now()) / 1000;

  // ---- Backdrop: vertical sky gradient + ground band ----
  const skyGrad = c.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, pal.skyTop || '#2a1a4a');
  skyGrad.addColorStop(1, pal.skyBot || '#5a2870');
  c.fillStyle = skyGrad;
  c.fillRect(0, 0, W, H);
  c.fillStyle = pal.ground || '#1a0f3a';
  c.fillRect(0, H * 0.80, W, H * 0.20);

  // Sky sparkles
  for (let i = 0; i < 14; i++) {
