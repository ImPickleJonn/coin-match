  filter: drop-shadow(0 6px 20px rgba(255, 216, 100, 0.5));
}
.tier-up .new-name {
  font-size: 22px; font-weight: 900;
  color: #ffd864;
}

/* Language picker */
.lang-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 5px;
  margin: 6px 0;
}
.lang-cell {
  padding: 10px;
  background: linear-gradient(180deg, var(--paper-hi) 0%, var(--paper) 100%);
  border: 2.5px solid var(--ink);
  border-radius: 12px;
  font-size: 13px;
  font-weight: 900;
  text-align: center;
  cursor: pointer;
  color: var(--ink);
  box-shadow: 0 2px 0 var(--ink-soft);
}
.lang-cell.active {
  background: linear-gradient(180deg, #fff5a8 0%, var(--gold) 100%);
  border-color: var(--ink);
  color: var(--ink);
  box-shadow: 0 2px 0 var(--gold-deep);
}
.lang-cell .flag { font-size: 16px; margin-right: 5px; }

/* =========================================================
   [11] Mini-event overlay (Smash / Raid)
   ========================================================= */
.event-overlay {
  position: absolute; inset: 0;
  z-index: 120;
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
  background:
    radial-gradient(ellipse at center, rgba(255,216,100,0.2) 0%, transparent 70%),
    rgba(8, 4, 18, 0.88);
  backdrop-filter: blur(2px);
}
.event-overlay.show { display: flex; }
.event-overlay .ev-title {
  font-size: 36px;
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 3px 0 #ff3b7a,
    0 5px 0 rgba(0,0,0,0.5);
  margin-bottom: 10px;
  letter-spacing: 2px;
}
.event-overlay .ev-master {
  font-size: 13px;
  color: #c7cdd9;
  font-weight: 800;
  margin-bottom: 16px;
  background: rgba(20, 12, 40, 0.7);
  padding: 5px 12px;
  border-radius: 999px;
  border: 1.5px solid #5b3a8a;
}
.smash-buildings {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.smash-bd {
  width: 80px; height: 80px;
  background: linear-gradient(180deg, #2a1f50 0%, #1a1230 100%);
  border: 3px solid #5b3a8a;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px;
  box-shadow: 0 5px 0 rgba(0,0,0,0.6), 0 8px 14px rgba(0,0,0,0.4);
  cursor: pointer;
  position: relative;
  transition: transform 80ms;
}
.smash-bd:active { transform: scale(0.94); }
.smash-bd.smashed {
  filter: grayscale(1) brightness(0.4);
  pointer-events: none;
}
.smash-bd.smashed::after {
  content: '💥';
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 50px;
  animation: bonk 400ms ease-out;
}
@keyframes bonk {
  0%   { transform: scale(0); }
  60%  { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.raid-spots {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-bottom: 16px;
}
.raid-spot {
  width: 110px; height: 110px;
  background:
    radial-gradient(circle at 50% 70%, #6b4824 0%, #4a2e12 100%);
  border: 3px solid #2a1a04;
  border-radius: 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: 0 5px 0 #2a1a04, 0 8px 14px rgba(0,0,0,0.5),
              inset 0 -8px 16px rgba(0,0,0,0.4);
  cursor: pointer;
  position: relative;
  color: #fff;
  transition: transform 80ms;
}
.raid-spot:active { transform: scale(0.94); }
.raid-spot::before {
  content: '⛏️';
  font-size: 40px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}
.raid-spot.dug {
  pointer-events: none;
  background: radial-gradient(circle at 50% 50%, #ffd864 0%, #c9921a 100%);
  border-color: #6f4d05;
  box-shadow: 0 5px 0 #6f4d05, 0 8px 14px rgba(0,0,0,0.4);
}
.raid-spot.dug::before { content: ''; }
.raid-spot.dug .reward {
  font-size: 17px;
  font-weight: 900;
  color: #2a1a04;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
  font-variant-numeric: tabular-nums;
}
.raid-spot.dug.empty {
  background: radial-gradient(circle at 50% 50%, #999 0%, #555 100%);
  border-color: #2a1a04;
}
.raid-spot.dug.empty .reward { color: #fff; font-size: 13px; }
.raid-spot.dug .em-icon { font-size: 28px; }
.ev-info {
  color: #c7cdd9;
  text-align: center;
  font-size: 12px;
  font-weight: 800;
  margin-bottom: 14px;
  background: rgba(20, 12, 40, 0.7);
  padding: 6px 12px;

}

  border-radius: 14px;

  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 4px 0 #6f4d05, 0 6px 12px rgba(0,0,0,0.4);

  display: none;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
}
.ev-final.show { display: block; }

  transition: opacity 200ms;
  max-width: 90vw;
  text-align: center;
}

<script>
'use strict';

/* =========================================================
   [20] Constants
   ========================================================= */

const VERSION = 'v0.4.0';

// Grid — 7×7 square (was 7×6, user requested an extra row).
const COLS = 7;
const ROWS = 7;
const MIN_MATCH = 3;
// Tile roster — SAME structure across every theme:
//   0-3 are "color" tiles (4-in-a-row spawns specials):
//     COIN  — common gold        — base value 1
//     SACK  — gold sack          — base value 2
//     CHEST — treasure chest     — base value 4
//     THEME — theme-specific     — base value 1.5  (e.g. pirate hat 💀)
//   4-6 are RARE effect tiles (no special spawns from these):
//     SHIELD — fills shield meter
//     PIG    — fills raid meter
//     BOLT   — grants energy directly per match
//   7-8 are SPECIAL bonus drops:
//     WILD   — matches any color
//     STAR   — mega-bonus, fills all meters
const NUM_COLORS = 4;
const TILE = {
  COIN:   0,
  SACK:   1,
  CHEST:  2,
  THEME:  3,
  SHIELD: 4,
  PIG:    5,
  BOLT:   6,
  WILD:   7,
  STAR:   8,
};

// Theme — defines a "Coin Mountain" world. The 5 structures map to
// the 5 VISUAL LAYERS of the mountain (base→aura). IDs are preserved
// from older save files so existing builds carry over.
//
// To add a new world: copy the pirate block, swap mountainStyle
// colors + maybe nameEmoji. The 5 layers stay the same — only the
// palette + backdrop change. (That's the point.)
// Each "village" is a CUTE CHARACTER you feed coins. The 5 cards =
// 5 dress-up slots. Max out all 5 (25 levels) → character EXPLODES,
// next world's baby appears. Worlds cycle in WORLD_ORDER.
//
// To add a world: define palette + character drawer + next world.
// Card slots are identical across worlds (size/feed/crown/throne/bling).
const THEMES = {
  pirate: {
    id: 'pirate',
    name: 'Captain Piggy',
    nameEmoji: '🐷',
    themeTileEmoji: '💀',
    next: 'dragon',
    character: 'pig',
    structures: [
      { id: 'lighthouse', emoji: '🐷', name: 'Feed',   base: 150,  slot: 'size' },
      { id: 'dock',       emoji: '💰', name: 'Stuff',  base: 400,  slot: 'feed' },
      { id: 'tavern',     emoji: '👑', name: 'Crown',  base: 250,  slot: 'crown' },
      { id: 'cabin',      emoji: '🏆', name: 'Throne', base: 700,  slot: 'throne' },
      { id: 'treasure',   emoji: '✨', name: 'Bling',  base: 1100, slot: 'bling' },
    ],
    palette: {
      skyTop:'#3a1828', skyBot:'#7a2840', ground:'#2a0e1c',
      body:'#ffafce', bodyShadow:'#c8344f', ear:'#ff77a8', snout:'#ffd0e0',
      mouth:'#3a1010', hat:'#1a1a1a', hatBand:'#c8344f',
      accent:'#ffd864', accentHi:'#fff4b0', accentLo:'#a06a14',
      aura:'rgba(255, 232, 140, 0.85)',
    },
  },
  dragon: {
    id: 'dragon',
    name: 'Baby Drake',
    nameEmoji: '🐲',
    themeTileEmoji: '🔥',
    next: 'pirate',
    character: 'dragon',
    structures: [
      { id: 'lighthouse', emoji: '🐲', name: 'Feed',   base: 200,  slot: 'size' },
      { id: 'dock',       emoji: '🍖', name: 'Stuff',  base: 500,  slot: 'feed' },
      { id: 'tavern',     emoji: '👑', name: 'Crown',  base: 350,  slot: 'crown' },
      { id: 'cabin',      emoji: '💎', name: 'Throne', base: 900,  slot: 'throne' },
      { id: 'treasure',   emoji: '🔥', name: 'Bling',  base: 1500, slot: 'bling' },
    ],
    palette: {
      skyTop:'#1a2a4a', skyBot:'#0e1a32', ground:'#08101e',
      body:'#5a8c3a', bodyShadow:'#2a5a1a', ear:'#7eb556', snout:'#a8d27a',
      mouth:'#1a0a05', hat:'#2a4faf', hatBand:'#ffd864',
      accent:'#7ec2ff', accentHi:'#e4f4ff', accentLo:'#1a4a8a',
      aura:'rgba(255, 140, 60, 0.85)',
    },
  },
};
// Ordered list controls the cycle on world completion.
const WORLD_ORDER = ['pirate', 'dragon'];
function nextWorldId(currentId) {
  const t = THEMES[currentId];
  if (t && t.next && THEMES[t.next]) return t.next;
  const i = WORLD_ORDER.indexOf(currentId);
  return WORLD_ORDER[(i + 1) % WORLD_ORDER.length] || WORLD_ORDER[0];

   ========================================================= */

const TG = window.Telegram && window.Telegram.WebApp;
// Mirror Merge Plop Roguelite's platform pattern: full-screen + expand
// only on mobile (android / ios). On desktop / web (tdesktop, macos,
// web, weba, webk, linux, windows, unigram), leave the chat layout
// alone and let CSS render the game in a 440px centered phone frame.
const TG_PLATFORM = ((TG && TG.platform) || '').toLowerCase();
const TG_IS_MOBILE = TG_PLATFORM === 'android' || TG_PLATFORM === 'ios';
const TG_DESKTOP_LIST = ['tdesktop', 'macos', 'web', 'weba', 'webk', 'linux', 'windows', 'unigram'];
const TG_IS_DESKTOP = TG_DESKTOP_LIST.indexOf(TG_PLATFORM) >= 0
                  || (!TG_IS_MOBILE && (!TG_PLATFORM || (window.innerWidth >= 600)));
// Annotate the body so CSS can switch layouts without waiting for JS.
document.body.setAttribute('data-tg-platform', TG_IS_DESKTOP ? 'desktop' : 'mobile');

function tgReady() {
  if (!TG) return;
  try {
    TG.ready();
    if (TG_IS_MOBILE) {
      // Mobile only: take over the whole chat viewport.
      TG.expand();
      if (TG.requestFullscreen) try { TG.requestFullscreen(); } catch (e) {}
    }
    if (TG.disableVerticalSwipes) try { TG.disableVerticalSwipes(); } catch (e) {}
    if (TG.lockOrientation) try { TG.lockOrientation(); } catch (e) {}
    applySafeArea();
    // Telegram lands the safe-area numbers asynchronously after
    // requestFullscreen() — re-sync once after a tick to catch them.
    setTimeout(applySafeArea, 400);
    if (TG.onEvent) {
      TG.onEvent('viewportChanged',         applySafeArea);
      TG.onEvent('safeAreaChanged',         applySafeArea);
      TG.onEvent('contentSafeAreaChanged',  applySafeArea);
      try { TG.onEvent('fullscreenChanged', applySafeArea); } catch (e) {}
    }
    if (state.lang === 'en' && TG.initDataUnsafe && TG.initDataUnsafe.user && TG.initDataUnsafe.user.language_code) {
      const lc = String(TG.initDataUnsafe.user.language_code).slice(0, 2).toLowerCase();
      if (I18N[lc]) state.lang = lc;
    }
    if (TG.initDataUnsafe && TG.initDataUnsafe.user) {
      const u = TG.initDataUnsafe.user;
      const n = (u.first_name || u.username || 'YOU').slice(0, 12).toUpperCase();
      const nameEl = document.getElementById('playerName');
      if (nameEl) nameEl.textContent = n;   // playerName removed in HUD cleanup; safe-noop
    }
  } catch (e) {}
}
// Ported from Match Icon's syncTgSafeArea — the older simpler version
// (one OR'd source) returned 0 on plenty of TG clients, leaving content
// to render under TG's "Close 53m ..." overlay chrome. We now:
//   1. Read BOTH contentSafeAreaInset and safeAreaInset (max of them).
//   2. Apply a platform-specific minimum so the WebApp always clears
//      TG's overlay chrome even when the client reports 0.
//   3. Re-sync on contentSafeAreaChanged / safeAreaChanged / fullscreen-
//      Changed / viewportChanged events.
//   4. setTimeout 400ms re-sync to catch fullscreen state arriving async.
function applySafeArea() {
  if (!TG) return;
  const platform = (TG.platform || '').toLowerCase();
  const isAndroid = platform === 'android';
  const content = TG.contentSafeAreaInset || {};
  const safe    = TG.safeAreaInset || {};
  const reportedTop    = Math.max(content.top    || 0, safe.top    || 0);
  const reportedBottom = Math.max(content.bottom || 0, safe.bottom || 0);
  // iOS: Dynamic Island + TG overlay header ~ 100px. Android: just the
  // TG chrome ~ 24px. These are the floors — if TG reports more, use that.
  const minTop    = isAndroid ? 24 : 100;
  const minBottom = isAndroid ? 16 : 36;
  const top    = Math.max(reportedTop,    minTop);
  const bottom = Math.max(reportedBottom, minBottom);
  document.documentElement.style.setProperty('--tg-safe-top',    top    + 'px');
  document.documentElement.style.setProperty('--tg-safe-bottom', bottom + 'px');
  sizeCanvas();
}
function haptic(kind) {
  if (!TG || !TG.HapticFeedback) return;
  try {
    if (kind === 'tap')        TG.HapticFeedback.impactOccurred('light');
    else if (kind === 'med')   TG.HapticFeedback.impactOccurred('medium');
    else if (kind === 'heavy') TG.HapticFeedback.impactOccurred('heavy');
    else if (kind === 'success') TG.HapticFeedback.notificationOccurred('success');
    else if (kind === 'err')   TG.HapticFeedback.notificationOccurred('error');
  } catch (e) {}
}

      'totalSmashEver','totalRaidEver','betIdx',
      'welcomed','firstSeenAt','lang'];
    const patch = {};
    for (const k of SYNC_KEYS) patch[k] = state[k];
    await fetch('/api/state/save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },

/* =========================================================
   [25] Energy regen
   ========================================================= */

function tickEnergy() {
  if (state.energy >= state.energyMax) { state.energyRegenAt = 0; return; }
  const now = Date.now();
  if (!state.energyRegenAt) state.energyRegenAt = now + ENERGY_REGEN_MS;
  while (state.energyRegenAt && now >= state.energyRegenAt && state.energy < state.energyMax) {
    state.energy++;
    state.energyRegenAt += ENERGY_REGEN_MS;
  }
  if (state.energy >= state.energyMax) state.energyRegenAt = 0;
}
function energyCountdownStr() {
  if (state.energy >= state.energyMax) return t('energy_full');
  // Time until NEXT regen tick (1 energy unit).
  const tickMs = (state.energyRegenAt || 0) - Date.now();
  if (tickMs <= 0) return '';
  // Total time to FULL = remaining ticks * regen interval + current tick.
  const diff = state.energyMax - state.energy;
  const totalMs = tickMs + Math.max(0, diff - 1) * ENERGY_REGEN_MS;
  const m = Math.floor(totalMs / 60000);
  const s = Math.floor((totalMs % 60000) / 1000);
  return diff + ' more in ' + m + ':' + String(s).padStart(2, '0');
}
setInterval(() => {
  const had = state.energy;
  tickEnergy();
  if (had !== state.energy) saveState();
  refreshEnergyUI();
  refreshMasterTimer();
}, 1000);

/* =========================================================

   ========================================================= */

function getMasterUserSeed() {
  if (TG && TG.initDataUnsafe && TG.initDataUnsafe.user) return Math.abs(TG.initDataUnsafe.user.id | 0);
  let g = localStorage.getItem('lm-uid');
  if (!g) { g = String(Math.floor(Math.random() * 1e9)); localStorage.setItem('lm-uid', g); }
  return parseInt(g, 10) || 1;
}
function currentMasterWindow() { return Math.floor(Date.now() / MASTER_ROTATION_MS); }
function masterMillisLeft()    { return MASTER_ROTATION_MS - (Date.now() % MASTER_ROTATION_MS); }
function getCurrentMaster() {
  const seed = getMasterUserSeed();
  const win = currentMasterWindow();
  let h = seed ^ (win * 2654435761);
  h = (h ^ (h >>> 16)) >>> 0;
  const idx = h % BOT_MASTERS.length;
  return { masterId: 'bot-' + idx + '-w' + win, idx, bot: BOT_MASTERS[idx], win };

  const structures = theme.structures.map((s, i) => ({ ...s, smashed: damage.smashed.includes(i), idx: i }));

// The source PNGs ship with a solid black background. Chroma-key it out
// at load time: flood-fill from every edge pixel, marking any near-black
// pixel as fully transparent. This is robust against any internal dark
// detail because flood-fill only touches pixels CONNECTED to the edges.
function stripBlackBackground(srcImg) {
  const w = srcImg.naturalWidth;
  const h = srcImg.naturalHeight;
  if (!w || !h) return srcImg;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx2 = c.getContext('2d');
  ctx2.drawImage(srcImg, 0, 0);
  let id;
  try {
    id = ctx2.getImageData(0, 0, w, h);
  } catch (e) {
    return srcImg;   // CORS-tainted; can't process. Render with the black bg.
  }
  const data = id.data;
  const isBlackish = (i) => (data[i] + data[i+1] + data[i+2]) < 60;   // sum < 60 of 765 = very dark
  const visited = new Uint8Array(w * h);
  const stack = [];
  // Seed: every edge pixel
  for (let x = 0; x < w; x++) {
    stack.push(x, 0);
    stack.push(x, h - 1);
  }
  for (let y = 0; y < h; y++) {
    stack.push(0, y);
    stack.push(w - 1, y);
  }
  while (stack.length) {
    const py = stack.pop();
    const px = stack.pop();
    if (px < 0 || py < 0 || px >= w || py >= h) continue;
    const idx = py * w + px;
    if (visited[idx]) continue;
    const di = idx * 4;
    if (!isBlackish(di)) continue;
    visited[idx] = 1;
    // Mark this pixel transparent
    data[di + 3] = 0;
    stack.push(px + 1, py);
    stack.push(px - 1, py);
    stack.push(px, py + 1);
    stack.push(px, py - 1);
  }
  // Soften any remaining dark-edge halo by reducing alpha on dim pixels
  // near the cleared region (1-pixel feather).
  for (let i = 0; i < data.length; i += 4) {
    if (data[i + 3] === 0) continue;
    const lum = data[i] + data[i + 1] + data[i + 2];
    if (lum < 110) {
      // Fade to alpha proportional to luminance to soften the rim
      data[i + 3] = Math.min(data[i + 3], Math.floor(lum * 2.0));
    }
  }
  ctx2.putImageData(id, 0, 0);
  return c;
}

function sfxTone(freq, dur, vol, type, when) {
  if (state && state.muted) return;
  const ac = audioInit();

  const osc = ac.createOscillator();
  const gain = ac.createGain();

  gain.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.006);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

function sfxCascade(depth) {
  if (depth < 2) return;
  const base = 440;
  const notes = [base, base * 1.25, base * 1.5];
  if (depth >= 4) notes.push(base * 2);
  sfxArpeggio(notes, 0.065, 0.18, 0.10, 'triangle');
}
function sfxMega() {
  sfxChord([880, 1108, 1318, 1760], 0.65, 0.09, 'sine');
  sfxArpeggio([1760, 2349, 2637], 0.08, 0.40, 0.06, 'triangle');
}
function sfxSwapFail()    { sfxTone(160, 0.09, 0.08, 'sawtooth'); }
function sfxSwapSuccess() { sfxTone(820, 0.07, 0.06, 'sine'); }
function sfxCoinChime()   { sfxArpeggio([880, 1175, 1480], 0.04, 0.16, 0.06, 'sine'); }
function sfxChargeFull()  { sfxArpeggio([523, 659, 784, 1047], 0.06, 0.22, 0.10, 'triangle'); }
function sfxBoom()        { sfxTone(80, 0.45, 0.16, 'sawtooth'); sfxTone(140, 0.4, 0.12, 'square'); }
function sfxZap()         { sfxArpeggio([1760, 1480, 2349, 1318], 0.025, 0.12, 0.08, 'sawtooth'); }
function sfxArrow()       { sfxArpeggio([880, 1480, 1760], 0.04, 0.12, 0.07, 'square'); }
function sfxBuild()       { sfxArpeggio([523, 659, 784], 0.10, 0.25, 0.10, 'triangle'); }

function easeOut(p)   { return 1 - Math.pow(1 - p, 3); }
function easeInOut(p) { return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; }

function startSwapAnim(r1, c1, r2, c2, onDone) {
  const t0 = now(), dur = 180;
  animations.push({
    type: 'swap', r1, c1, r2, c2, t0, dur, p: 0,
    update(t) { this.p = Math.min(1, (t - t0) / dur); return this.p >= 1; },
    done: onDone,
  });
}
function startPopAnim(cells, onDone) {
  const t0 = now(), dur = 240;
  animations.push({
    type: 'pop', cells: [...cells], t0, dur, p: 0,
    update(t) { this.p = Math.min(1, (t - t0) / dur); return this.p >= 1; },
    done: onDone,
  });
}
function startFallAnim(falls, onDone) {
  if (!falls || !falls.length) { if (onDone) onDone(); return; }
  const t0 = now();
  let maxDist = 1;
  for (const f of falls) maxDist = Math.max(maxDist, f.toRow - f.fromRow);
  const dur = 100 + maxDist * 55;
  animations.push({
    type: 'fall', falls, t0, dur, p: 0,
    update(t) { this.p = Math.min(1, (t - t0) / dur); return this.p >= 1; },
    done: onDone,
  });
}
function shake(intensity, durationMs) {
  if (intensity > screenShake.intensity) {
    screenShake.intensity = intensity;
    screenShake.duration = durationMs;
    screenShake.start = now();
  }
}
function getShakeOffset() {
  if (screenShake.intensity <= 0) return { x: 0, y: 0 };
  const elapsed = now() - screenShake.start;
  if (elapsed >= screenShake.duration) { screenShake.intensity = 0; return { x: 0, y: 0 }; }
  const decay = 1 - elapsed / screenShake.duration;
  const i = screenShake.intensity * decay;
  return { x: (Math.random() - 0.5) * i * 2, y: (Math.random() - 0.5) * i * 2 };
}

// Particle burst — ported from Match Icon. Per-tile color sparkle on clear.
function spawnParticles(x, y, color, count, power) {
  count = count || 12; power = power || 1;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
    const speed = (1.6 + Math.random() * 2.8) * power;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.6 * power,
      life: 700 + Math.random() * 350,
      maxLife: 1000,
      color,
      size: 2.5 + Math.random() * 3.5,
      gravity: 0.16,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}
// Confetti — rectangular paper bits raining from above the board.
// Triggered on cascade depth >= 4 to mark MEGA moments.
function spawnConfetti(count) {
  count = count || 40;
  const cw = COLS * CELL;
  const colors = ['#ff5c7a', '#ffaf3a', '#4ad88a', '#4fb2ff', '#b878ff', '#ffd864', '#ffffff'];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * cw,
      y: -12 - Math.random() * 40,
      vx: (Math.random() - 0.5) * 4.5,
      vy: 1.5 + Math.random() * 2.5,
      life: 1600 + Math.random() * 800,
      maxLife: 2400,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 4 + Math.random() * 4,
      gravity: 0.09,
      rotation: Math.random() * Math.PI * 2,
      rotVel: (Math.random() - 0.5) * 0.32,
      isConfetti: true,
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity;
    if (!p.isConfetti) p.vx *= 0.97;
    if (p.rotation !== undefined) p.rotation += p.rotVel;
    p.life -= dt;
    if (p.twinkle !== undefined) p.twinkle += dt * 0.012;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    const a = Math.max(0, p.life / p.maxLife);
    if (p.isConfetti) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation || 0);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size * 0.4, p.size, p.size * 1.5);
      // Subtle darker edge for paper look
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(-p.size / 2, p.size * 0.7, p.size, p.size * 0.4);
      ctx.restore();
      continue;
    }
    const twinkle = p.twinkle !== undefined ? (0.65 + 0.35 * Math.sin(p.twinkle)) : 1;
    const finalA = a * twinkle;
    const sz = p.size * (0.6 + a * 0.6);
    ctx.globalAlpha = finalA * 0.35;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz * 2.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = finalA;
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
    ctx.fill();
    if (a > 0.6) {
      ctx.globalAlpha = finalA * (a - 0.6) * 2;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 0.45, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = p.color;
    }
  }
  ctx.globalAlpha = 1;
}
function tileParticleColor(tl) {
  // Effect / special tiles get their own signature color.
  if (tl === TILE.SHIELD) return '#4fb2ff';   // blue
  if (tl === TILE.PIG)    return '#ff77a8';   // pink
  if (tl === TILE.BOLT)   return '#ffd864';   // electric yellow
  if (tl === TILE.WILD)   return '#a263e8';   // purple
  if (tl === TILE.STAR)   return '#fff4ad';   // pale gold
  // 4 "color" tiers — gold spectrum + theme purple.
  if (tl === TILE.COIN)   return '#ffd864';   // bright gold
  if (tl === TILE.SACK)   return '#ff9a30';   // amber/orange
  if (tl === TILE.CHEST)  return '#c9921a';   // deep gold
  if (tl === TILE.THEME)  return '#b878ff';   // theme purple
  return '#ffffff';
}

// Swipe trail dot — soft sparkle following the finger during drag.
function spawnSwipeDot(px, py) {
  // Throttle to ~30 dots/sec so we don't drown the DOM
  if (spawnSwipeDot._last && now() - spawnSwipeDot._last < 30) return;
  spawnSwipeDot._last = now();
  const el = document.createElement('div');
  el.style.cssText =
    'position:fixed;left:' + (px - 5) + 'px;top:' + (py - 5) + 'px;' +
    'width:10px;height:10px;border-radius:50%;' +
    'background:radial-gradient(circle,#ffd864 0%,rgba(255,216,100,0) 70%);' +
    'pointer-events:none;z-index:75;opacity:0.85;' +
    'transition:transform 350ms ease-out,opacity 350ms ease-out;will-change:transform,opacity;';
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.transform = 'scale(0.3)';
    el.style.opacity = '0';
  });
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 380);
}

// Roll the displayed gold counter toward state.coins each frame, BUT
// hold back any gold that's still in-flight as a coin sprite. Each
// flying coin commits its own chunk on landing (see spawnCoinFly), so
// the counter ticks visibly per coin instead of lerping past them.
//
// For non-match grants (shop, bonus, daily chest) _pendingCoinCommit is
// 0, so this behaves exactly like before — instant lerp to target.
function tickGoldDisplay() {
  const target = state.coins - _pendingCoinCommit;
  if (displayedGold === target) return false;
  const diff = target - displayedGold;
  const adiff = Math.abs(diff);
  if (adiff < 4) {
    displayedGold = target;
  } else {
    // Step is 14% of diff per frame, minimum 1 per frame so we never stall.
    const step = Math.max(1, Math.floor(adiff * 0.14));
    displayedGold += (diff > 0 ? step : -step);
  }
  return true;
}

// Main rAF loop — runs every frame, updates animations + particles + render.
// PERF: cache the active tab so per-tick checks are a single read,
// not a DOM query. Updated by showTab() whenever the tab changes.
let _activeTabName = 'play';

function tick(t) {
  const tm = t || now();
  const dt = lastTickTime ? Math.min(50, tm - lastTickTime) : 16;
  lastTickTime = tm;

  // Particles (board sparkles / confetti) — only when there are some.
  if (particles.length > 0) updateParticles(dt);

  // Animations — single pass, splice in reverse to avoid O(n²) reindexing.
  const anims = animations;
  for (let i = anims.length - 1; i >= 0; i--) {
    const a = anims[i];
    if (a.update(tm)) {
      anims.splice(i, 1);
      if (a.done) a.done();
    }
  }

  // Tick the gold ticker and refresh the score-card text if it changed.
  if (tickGoldDisplay()) refreshGoldDisplay();

  // Coin-shower overlay — skip entirely when there are no particles.
  // (clearRect every frame on an empty canvas is wasted work.)
  if (coinFXParticles.length > 0) {
    updateCoinShower(dt);
    renderCoinShower();
  }

  // Coin Mountain — only when Village tab is active. Skip the entire
  // pipeline (canvas resolve + clearRect + sky gradient + sparkles + ...)
  // when the user is on Play/Shop/Friends.
  if (_activeTabName === 'village') {
    updateMountainAnims(dt);
    if (typeof updateCharHearts === 'function') updateCharHearts(dt);
    renderCoinMountain();
  }

  // Grid render — only when Play tab is active. Other tabs hide the
  // canvas anyway, so the work is invisible.
  if (_activeTabName === 'play') render();

  requestAnimationFrame(tick);
}

function sizeCanvas() {
  // Edge-to-edge grid (Match Masters layout). Canvas fills the FULL
  // viewport width — board-frame's chunky 3px outline butts right
  // against the screen edges (or letterbox edges on desktop).
  // On the desktop letterbox we cap to the 440px frame width.
  const frameW = Math.min(window.innerWidth, 440 + 12);   // 440px on desktop letterbox
  // Only subtract the 6px taken by the frame's left+right 3px borders
  // so the canvas itself sits flush inside.
  const maxW = frameW - 6;
  // Reserved chrome (round-29 layout): topbar (50) + GAE bar (40) +
  // boosters strip (50) + last-match (16) + hud-row (~62 — overlaps
  // frame by 3px) + bet-auto-row AUTO only (40) + nav (74 with
  // timer below pill) + safe areas (~50)  ≈  400px
  // Need to fit 7×7 grid → CELL = floor(maxH/7), so leave headroom.
  const maxH = Math.max(220, window.innerHeight - 400);
  const MAX_CELL = 64;
  CELL = Math.max(36, Math.min(MAX_CELL, Math.floor(Math.min(maxW / COLS, maxH / ROWS))));
  DPR = Math.min(2, window.devicePixelRatio || 1);
  canvas.style.width  = (CELL * COLS) + 'px';
  canvas.style.height = (CELL * ROWS) + 'px';
  canvas.width  = CELL * COLS * DPR;
  canvas.height = CELL * ROWS * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (CELL > 0 && CELL !== emojiCacheCell) rebuildEmojiCache(CELL);
  render();
}
// Auto-resize the canvas whenever the board wrap changes size — handles
// orientation flips, keyboard appearance, Telegram WebView re-layout etc.
if (typeof ResizeObserver !== 'undefined') {
  const _ro = new ResizeObserver(() => sizeCanvas());
  const _bw = document.getElementById('boardWrap');
  if (_bw) _ro.observe(_bw);
}

// =========================================================
// Custom canvas-drawn tile icons. Each function draws ONE icon
// centered at (cx, cy) within a `size`-wide square. Used by
// rebuildEmojiCache to bake offscreen sprites under special
// keys ('_coin', '_sack', '_chest') so drawEmojiSprite can blit
// them as if they were emojis.
// =========================================================
function drawStarPath(c, cx, cy, points, outerR, innerR) {
  c.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = (i % 2 === 0) ? outerR : innerR;
    const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) c.moveTo(x, y);
    else c.lineTo(x, y);
  }
  c.closePath();
}

// Small sparkle helper — 4-point star used to add "shiny" pop to gold.
function drawSparkle(c, x, y, size, alpha) {
  c.save();
  c.globalAlpha = alpha != null ? alpha : 1;
  c.fillStyle = '#ffffff';
  c.beginPath();
  c.moveTo(x, y - size);
  c.quadraticCurveTo(x + size * 0.15, y - size * 0.15, x + size, y);
  c.quadraticCurveTo(x + size * 0.15, y + size * 0.15, x, y + size);
  c.quadraticCurveTo(x - size * 0.15, y + size * 0.15, x - size, y);
  c.quadraticCurveTo(x - size * 0.15, y - size * 0.15, x, y - size);
  c.closePath();
  c.fill();
  c.restore();
}

// Cartoon outline helper — thick warm-dark contour for that AAA toon look.
const OUTLINE = '#3a1a05';   // warm-dark brown, friendlier than pure black

// GOLD COIN — chunky toon disc, 3-band gold shading, fat outline, big
// crescent highlight, embossed $ emblem, sparkles. Royal Match feel.
function drawCoinIconTo(c, cx, cy, size) {
  const r = size * 0.46;
  // Drop shadow puddle
  c.save();
  c.fillStyle = 'rgba(0,0,0,0.32)';
  c.beginPath();
  c.ellipse(cx, cy + r * 0.95, r * 0.82, r * 0.16, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // Thick warm-dark outer ring (the toon contour)
  c.fillStyle = OUTLINE;
  c.beginPath();
  c.arc(cx, cy, r * 1.06, 0, Math.PI * 2);
  c.fill();

  // Dark gold base
  c.fillStyle = '#a76b0d';
  c.beginPath();
  c.arc(cx, cy, r, 0, Math.PI * 2);
  c.fill();

  // Mid gold band (3/4 of disc, leaving a dark crescent at bottom-right)
  c.save();
  c.beginPath();
  c.arc(cx, cy, r, 0, Math.PI * 2);
  c.clip();
  c.fillStyle = '#ffc436';
  c.beginPath();
  c.ellipse(cx - r * 0.08, cy - r * 0.10, r * 0.93, r * 0.93, 0, 0, Math.PI * 2);
  c.fill();
  // Light gold cap (upper crescent)
  c.fillStyle = '#ffe27a';
  c.beginPath();
  c.ellipse(cx - r * 0.18, cy - r * 0.22, r * 0.78, r * 0.78, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // Inner ring — dark groove for embossed feel
  c.strokeStyle = '#8a5410';
  c.lineWidth = Math.max(1.2, r * 0.06);
  c.beginPath();
  c.arc(cx, cy, r * 0.78, 0, Math.PI * 2);
  c.stroke();

  // Embossed $ in the middle — drop layer for depth, bright top layer
  c.font = 'bold ' + Math.floor(r * 1.05) + 'px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = '#7a4a08';
  c.fillText('$', cx, cy + r * 0.06);
  c.fillStyle = '#ffe27a';
  c.fillText('$', cx, cy + r * 0.02);

  // Big crescent specular highlight top-left
  c.save();
  c.beginPath();
  c.arc(cx, cy, r * 0.96, 0, Math.PI * 2);
  c.clip();
  c.fillStyle = 'rgba(255,255,255,0.85)';
  c.beginPath();
  c.ellipse(cx - r * 0.32, cy - r * 0.38, r * 0.42, r * 0.18, -0.5, 0, Math.PI * 2);
  c.fill();
  // Small secondary dot highlight
  c.fillStyle = 'rgba(255,255,255,0.9)';
  c.beginPath();
  c.arc(cx + r * 0.32, cy - r * 0.30, r * 0.08, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // Outside sparkles
  drawSparkle(c, cx + r * 0.95, cy - r * 0.55, r * 0.18, 0.95);
  drawSparkle(c, cx - r * 0.80, cy + r * 0.70, r * 0.12, 0.85);
}

// GOLD SACK — chubby brown bulb sack with 3-fabric peak top, fat tie band,
// gold coins spilling out, big $ on front, crescent highlight, sparkles.
// Royal Match / Coin Master sack feel.
function drawSackIconTo(c, cx, cy, size) {
  const w = size * 0.72;
  const h = size * 0.84;
  const top   = cy - h * 0.50;
  const neckY = top + h * 0.30;

  // Drop shadow
  c.save();
  c.fillStyle = 'rgba(0,0,0,0.32)';
  c.beginPath();
  c.ellipse(cx, cy + h * 0.46, w * 0.50, h * 0.06, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // === SACK BODY — built once as a clip path, then painted in 3 bands ===
  const buildBodyPath = () => {
    c.beginPath();
    c.moveTo(cx - w * 0.52, cy - h * 0.02);
    c.bezierCurveTo(cx - w * 0.62, cy + h * 0.40, cx + w * 0.62, cy + h * 0.40, cx + w * 0.52, cy - h * 0.02);
    c.bezierCurveTo(cx + w * 0.48, neckY + h * 0.04, cx + w * 0.32, neckY, cx + w * 0.24, neckY);
    c.lineTo(cx - w * 0.24, neckY);
    c.bezierCurveTo(cx - w * 0.32, neckY, cx - w * 0.48, neckY + h * 0.04, cx - w * 0.52, cy - h * 0.02);
    c.closePath();
  };

  // Thick toon outline (slightly larger silhouette behind)
  c.save();
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(2.2, size * 0.055);
  c.lineJoin = 'round';
  buildBodyPath();
  c.stroke();
  c.restore();

  // Base brown fill
  buildBodyPath();
  c.fillStyle = '#7a4a18';
  c.fill();

  // Mid tan band
  c.save();
  buildBodyPath();
  c.clip();
  c.fillStyle = '#c08038';
  c.beginPath();
  c.ellipse(cx - w * 0.05, cy + h * 0.05, w * 0.55, h * 0.45, 0, 0, Math.PI * 2);
  c.fill();
  // Light highlight band (top-left lobe)
  c.fillStyle = '#e9b06a';
  c.beginPath();
  c.ellipse(cx - w * 0.20, cy - h * 0.05, w * 0.32, h * 0.28, -0.4, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // === GOLD COINS SPILLING from the top (3 small discs behind the tie) ===
  const coinsCY = top + h * 0.10;
  const coinR  = h * 0.10;
  const coinPositions = [
    [cx - w * 0.12, coinsCY + h * 0.02, coinR * 0.9],
    [cx + w * 0.10, coinsCY - h * 0.01, coinR],
    [cx + w * 0.00, coinsCY + h * 0.06, coinR * 0.85],
  ];
  for (const [px, py, pr] of coinPositions) {
    c.fillStyle = OUTLINE;
    c.beginPath();
    c.arc(px, py, pr * 1.18, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#ffc436';
    c.beginPath();
    c.arc(px, py, pr, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#ffe27a';
    c.beginPath();
    c.ellipse(px - pr * 0.25, py - pr * 0.30, pr * 0.5, pr * 0.28, -0.5, 0, Math.PI * 2);
    c.fill();
  }

  // === BUNCHED FABRIC at top — three rounded peaks (cuter than zigzag) ===
  c.fillStyle = '#a06028';
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(1.4, size * 0.035);
  c.lineJoin = 'round';
  c.beginPath();
  c.moveTo(cx - w * 0.24, neckY);
  c.bezierCurveTo(cx - w * 0.22, top + h * 0.10, cx - w * 0.10, top + h * 0.08, cx - w * 0.08, neckY - h * 0.01);
  c.bezierCurveTo(cx - w * 0.06, top + h * 0.04, cx + w * 0.06, top + h * 0.04, cx + w * 0.08, neckY - h * 0.01);
  c.bezierCurveTo(cx + w * 0.10, top + h * 0.08, cx + w * 0.22, top + h * 0.10, cx + w * 0.24, neckY);
  c.closePath();
  c.fill();
  c.stroke();

  // === DRAWSTRING TIE BAND ===
  c.fillStyle = '#3a1a05';
  c.fillRect(cx - w * 0.28, neckY - h * 0.02, w * 0.56, h * 0.08);
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(1.2, size * 0.025);
  c.strokeRect(cx - w * 0.28, neckY - h * 0.02, w * 0.56, h * 0.08);

  // Tie knot bumps (two side loops)
  c.fillStyle = '#5a2810';
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(1, size * 0.022);
  c.beginPath();
  c.arc(cx - w * 0.06, neckY + h * 0.04, h * 0.05, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  c.beginPath();
  c.arc(cx + w * 0.06, neckY + h * 0.04, h * 0.05, 0, Math.PI * 2);
  c.fill();
  c.stroke();

  // === BIG $ SYMBOL on the front (shadow + bright layer) ===
  c.font = 'bold ' + Math.floor(h * 0.46) + 'px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = '#3a1a05';
  c.fillText('$', cx, cy + h * 0.20);
  c.fillStyle = '#ffd848';
  c.fillText('$', cx, cy + h * 0.17);
  // $ specular sliver
  c.fillStyle = 'rgba(255,255,255,0.7)';
  c.font = 'bold ' + Math.floor(h * 0.18) + 'px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  c.fillText('$', cx - h * 0.06, cy + h * 0.12);

  // === BIG CRESCENT HIGHLIGHT on left of body ===
  c.save();
  buildBodyPath();
  c.clip();
  c.fillStyle = 'rgba(255,255,255,0.35)';
  c.beginPath();
  c.ellipse(cx - w * 0.30, cy + h * 0.05, w * 0.10, h * 0.25, -0.25, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // Sparkles around the spilling coins
  drawSparkle(c, cx + w * 0.32, top + h * 0.02, h * 0.12, 0.95);
  drawSparkle(c, cx - w * 0.34, cy + h * 0.20, h * 0.09, 0.85);
}

// GOLD CHEST — chunky cartoon chest with OPEN LID showing treasure glow
// and gold coins peeking out. Heavy toon outline, banded wood shading,
// gold trim, sparkles. The open-lid silhouette reads instantly as
// "treasure!" — Royal Match / Coin Master treasure chest feel.
function drawChestIconTo(c, cx, cy, size) {
  const w = size * 0.86;
  const h = size * 0.70;
  const boxTop = cy - h * 0.08;
  const bottom = cy + h * 0.46;
  const lidTilt = -0.35;  // radians, lid tilts back-left
  const lidPivotX = cx - w * 0.50;
  const lidPivotY = boxTop;
  const r = w * 0.05;

  // Drop shadow
  c.save();
  c.fillStyle = 'rgba(0,0,0,0.36)';
  c.beginPath();
  c.ellipse(cx, bottom + h * 0.06, w * 0.48, h * 0.07, 0, 0, Math.PI * 2);
  c.fill();
  c.restore();

  // === BOX BODY (front face) ===
  const buildBoxPath = () => {
    c.beginPath();
    c.moveTo(cx - w * 0.50, boxTop);
    c.lineTo(cx + w * 0.50, boxTop);
    c.lineTo(cx + w * 0.50, bottom - r);
    c.quadraticCurveTo(cx + w * 0.50, bottom, cx + w * 0.50 - r, bottom);
    c.lineTo(cx - w * 0.50 + r, bottom);
    c.quadraticCurveTo(cx - w * 0.50, bottom, cx - w * 0.50, bottom - r);
    c.closePath();
  };

  // Thick toon outline (drawn first behind fill)
  c.save();
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(2.4, size * 0.06);
  c.lineJoin = 'round';
  buildBoxPath();
  c.stroke();
  c.restore();

  // Base wood (mid)
  buildBoxPath();
  c.fillStyle = '#8a4a1c';
  c.fill();

  // Lighter wood band on top half
  c.save();
  buildBoxPath();
  c.clip();
  c.fillStyle = '#b66a30';
  c.fillRect(cx - w * 0.50, boxTop, w, h * 0.30);
  // Dark wood band at very bottom
  c.fillStyle = '#5a2810';
  c.fillRect(cx - w * 0.50, bottom - h * 0.18, w, h * 0.18);
  // Plank seams
  c.strokeStyle = 'rgba(40,16,4,0.55)';
  c.lineWidth = Math.max(0.8, size * 0.013);
  for (const t of [-0.30, -0.05, 0.20]) {
    c.beginPath();
    c.moveTo(cx + w * t, boxTop + h * 0.04);
    c.lineTo(cx + w * t, bottom - h * 0.04);
    c.stroke();
  }
  c.restore();

  // === INSIDE OF OPEN CHEST — dark cavity along top edge ===
  c.fillStyle = '#1a0a05';
  c.fillRect(cx - w * 0.50, boxTop - h * 0.02, w, h * 0.10);
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(1.4, size * 0.030);
  c.strokeRect(cx - w * 0.50, boxTop - h * 0.02, w, h * 0.10);

  // Gold glow rising from inside
  c.save();
  c.beginPath();
  c.rect(cx - w * 0.50, boxTop - h * 0.10, w, h * 0.20);
  c.clip();
  const glow = c.createRadialGradient(cx, boxTop, h * 0.02, cx, boxTop, w * 0.55);
  glow.addColorStop(0,   'rgba(255,220,80,0.85)');
  glow.addColorStop(0.5, 'rgba(255,180,40,0.35)');
  glow.addColorStop(1,   'rgba(255,180,40,0)');
  c.fillStyle = glow;
  c.fillRect(cx - w * 0.60, boxTop - h * 0.20, w * 1.2, h * 0.40);
  c.restore();

  // === GOLD COINS peeking from inside ===
  const peekY = boxTop + h * 0.02;
  const peeks = [
    [cx - w * 0.20, peekY, h * 0.13],
    [cx + w * 0.04, peekY - h * 0.01, h * 0.14],
    [cx + w * 0.26, peekY + h * 0.02, h * 0.11],
  ];
  for (const [px, py, pr] of peeks) {
    c.fillStyle = OUTLINE;
    c.beginPath();
    c.arc(px, py, pr * 1.18, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#ffc436';
    c.beginPath();
    c.arc(px, py, pr, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#ffe27a';
    c.beginPath();
    c.ellipse(px - pr * 0.25, py - pr * 0.30, pr * 0.5, pr * 0.28, -0.5, 0, Math.PI * 2);
    c.fill();
  }

  // === LID — tilted open, drawn with transform around pivot ===
  c.save();
  c.translate(lidPivotX, lidPivotY);
  c.rotate(lidTilt);
  // Lid path is dome above where the box top used to be (now its own coords)
  const lw = w;        // lid width (same)
  const lh = h * 0.36; // lid height
  const buildLidPath = () => {
    c.beginPath();
    c.moveTo(0, 0);
    c.quadraticCurveTo(0, -lh * 0.85, lw * 0.10, -lh * 0.95);
    c.quadraticCurveTo(lw * 0.50, -lh * 1.15, lw * 0.90, -lh * 0.95);
    c.quadraticCurveTo(lw, -lh * 0.85, lw, 0);
    c.lineTo(0, 0);
    c.closePath();
  };
  // Outline
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(2.4, size * 0.06);
  c.lineJoin = 'round';
  buildLidPath();
  c.stroke();
  // Base wood
  c.fillStyle = '#8a4a1c';
  buildLidPath();
  c.fill();
  // Lighter top band
  c.save();
  buildLidPath();
  c.clip();
  c.fillStyle = '#c6783a';
  c.beginPath();
  c.ellipse(lw * 0.40, -lh * 0.70, lw * 0.40, lh * 0.32, -0.1, 0, Math.PI * 2);
  c.fill();
  // Lid plank seam
  c.strokeStyle = 'rgba(40,16,4,0.5)';
  c.lineWidth = Math.max(0.8, size * 0.013);
  c.beginPath();
  c.moveTo(lw * 0.50, -lh * 0.05);
  c.lineTo(lw * 0.50, -lh * 0.95);
  c.stroke();
  // Lid sheen (big crescent on top)
  c.fillStyle = 'rgba(255,255,255,0.45)';
  c.beginPath();
  c.ellipse(lw * 0.30, -lh * 0.85, lw * 0.22, lh * 0.10, -0.3, 0, Math.PI * 2);
  c.fill();
  c.restore();
  // Gold trim along the bottom of the lid
  c.fillStyle = '#ffd848';
  c.fillRect(0, -lh * 0.08, lw, lh * 0.16);
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(1.2, size * 0.025);
  c.strokeRect(0, -lh * 0.08, lw, lh * 0.16);
  // Trim sheen
  c.fillStyle = 'rgba(255,255,255,0.55)';
  c.fillRect(lw * 0.10, -lh * 0.05, lw * 0.30, lh * 0.04);
  c.restore();   // end lid transform

  // === GOLD CORNER BRACKETS at bottom corners ===
  c.fillStyle = '#ffd848';
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(1.2, size * 0.025);
  const cs = w * 0.11;
  c.fillRect(cx - w * 0.50, bottom - cs, cs, cs);
  c.strokeRect(cx - w * 0.50, bottom - cs, cs, cs);
  c.fillRect(cx + w * 0.50 - cs, bottom - cs, cs, cs);
  c.strokeRect(cx + w * 0.50 - cs, bottom - cs, cs, cs);

  // === GOLD LOCK PLATE on front of box ===
  c.fillStyle = '#ffd848';
  c.beginPath();
  c.arc(cx, boxTop + h * 0.30, h * 0.14, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = OUTLINE;
  c.lineWidth = Math.max(1.2, size * 0.025);
  c.stroke();
  // Keyhole
  c.fillStyle = OUTLINE;
  c.beginPath();
  c.arc(cx, boxTop + h * 0.27, h * 0.045, 0, Math.PI * 2);
  c.fill();
  c.fillRect(cx - h * 0.014, boxTop + h * 0.27, h * 0.028, h * 0.10);
  // Lock highlight
  c.fillStyle = 'rgba(255,255,255,0.6)';
  c.beginPath();
  c.arc(cx - h * 0.05, boxTop + h * 0.24, h * 0.035, 0, Math.PI * 2);
  c.fill();

  // === SPARKLES above the open chest ===
  drawSparkle(c, cx - w * 0.30, boxTop - h * 0.20, h * 0.13, 0.95);
  drawSparkle(c, cx + w * 0.30, boxTop - h * 0.30, h * 0.11, 0.95);
  drawSparkle(c, cx + w * 0.08, boxTop - h * 0.42, h * 0.16, 0.95);
  drawSparkle(c, cx - w * 0.50, boxTop - h * 0.06, h * 0.08, 0.80);
}

function rebuildEmojiCache(cell) {
  emojiCache = Object.create(null);
  emojiCacheCell = cell;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const logicalSize = Math.ceil(cell * 1.45);
  const pad = Math.ceil(logicalSize * 0.18);
  const total = logicalSize + pad * 2;
  const allEmojis = CACHED_EMOJI_BASE.slice();
  for (const ch of allEmojis) {
    const off = document.createElement('canvas');
    off.width = total * dpr;
    off.height = total * dpr;
    const octx = off.getContext('2d');
    octx.scale(dpr, dpr);
    octx.font = logicalSize + 'px ' + EMOJI_FONT_STACK;
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    octx.shadowColor = 'rgba(0,0,0,0.55)';
    octx.shadowBlur = 6;
    octx.shadowOffsetY = 2;
    octx.fillText(ch, total / 2, total / 2);
    emojiCache[ch] = { canvas: off, total: total, size: logicalSize };
  }
  // TILE ART — prefer the real-art PNG (Nano Banana Pro generated) when
  // it's loaded. Otherwise fall back to the canvas-drawn kawaii drawer.
  // Both paths render into an offscreen sprite cached by cell-size, so
  // drawEmojiSprite blits them on the hot path identical to emojis.
  const KAWAII_TILES = {
    _t_coin:   drawTileKawaiiCoin,
    _t_sack:   drawTileKawaiiSack,
    _t_chest:  drawTileKawaiiChest,
    _t_bolt:   drawTileKawaiiBolt,
    _t_pig:    drawTileKawaiiChicken,
    _t_shield: drawTileKawaiiShield,
    _t_theme:  drawTileKawaiiGlove,
    // WILD + STAR specials are PNG-only (no canvas fallback drawer);
    // if the PNG hasn't loaded, the tile falls back to its emoji glyph
    // via tileEmoji() returning '🎰' / '⭐'.
    _t_wild:   null,
    _t_star:   null,
  };
  for (const key in KAWAII_TILES) {
    const entry = tileImages[key];
    const hasPng = entry && entry.isPng && entry.canvas;
    if (!hasPng && !KAWAII_TILES[key]) continue;   // skip PNG-only tiles still loading
    const off = document.createElement('canvas');
    off.width = total * dpr;
    off.height = total * dpr;
    const octx = off.getContext('2d');
    octx.scale(dpr, dpr);
    octx.shadowColor = 'rgba(74, 36, 18, 0.32)';
    octx.shadowBlur = 5;
    octx.shadowOffsetY = 3;
    if (hasPng) {
      const drawSize = logicalSize * 1.05;
      octx.drawImage(
        entry.canvas,
        (total - drawSize) / 2,
        (total - drawSize) / 2,
        drawSize,
        drawSize
      );
    } else {
      KAWAII_TILES[key](octx, total / 2, total / 2, logicalSize * 0.94);
    }
    octx.shadowColor = 'transparent';
    emojiCache[key] = { canvas: off, total: total, size: logicalSize };
  }
  // Bake special-tile PNGs (4 specials × 4 colors) into the same cache
  // at cell-aware size. Crucially: this happens ONCE per cell-size
  // change, NOT per frame. drawSpecialTile then blits from the cached
  // ~60-80px sprite instead of resampling the 1024×1024 source every
  // frame — eliminates the pulse-related aliasing/pixelation.
  if (typeof SPECIAL_ART !== 'undefined') {
    for (const key in SPECIAL_ART) {
      const entry = tileImages[key];
      if (!entry || !entry.isPng || !entry.canvas) continue;
      const off = document.createElement('canvas');
      off.width = total * dpr;
      off.height = total * dpr;
      const octx = off.getContext('2d');
      octx.scale(dpr, dpr);
      octx.imageSmoothingEnabled = true;
      octx.imageSmoothingQuality = 'high';
      // Slight overscan vs regular tiles — specials fill more of the cell
      const drawSize = logicalSize * 1.15;
      octx.drawImage(
        entry.canvas,
        (total - drawSize) / 2,
        (total - drawSize) / 2,
        drawSize,
        drawSize
      );
      emojiCache[key] = { canvas: off, total: total, size: logicalSize };
    }
  }
}

// ============== KAWAII TILE DRAWERS ==============
// Shared style: chunky chocolate-brown outline (KAWAII_INK), candy
// gradient fill, glossy white smear highlight on upper-left. Each
// function draws ONE tile centered at (cx, cy) inside a size-wide
// square. Called from rebuildEmojiCache; never per-frame.
// (KAWAII_INK declared earlier in the file so buildKawaiiTileDataURLs
// at boot can call these drawers before reaching this line.)

function drawTileKawaiiCoin(c, cx, cy, size) {
  const r = size * 0.48;
  const lw = Math.max(2.2, r * 0.10);
  // Outer ring (chunky outline via stroke)
  const grad = c.createRadialGradient(cx - r * 0.30, cy - r * 0.30, r * 0.10, cx, cy, r);
  grad.addColorStop(0,    '#fff4b0');
  grad.addColorStop(0.5,  '#ffd84a');
  grad.addColorStop(1,    '#d68a18');
  c.fillStyle = grad;
  c.strokeStyle = KAWAII_INK;
  c.lineWidth = lw;
  c.beginPath();
  c.arc(cx, cy, r, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  // Inner groove
  c.strokeStyle = 'rgba(148, 90, 18, 0.55)';
  c.lineWidth = Math.max(1.4, r * 0.05);
  c.beginPath();
  c.arc(cx, cy, r * 0.74, 0, Math.PI * 2);
  c.stroke();
  // $ symbol — drop layer for depth, bright layer on top
  c.font = 'bold ' + Math.floor(r * 1.10) + 'px "Baloo 2", -apple-system, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = '#a85a18';
  c.fillText('$', cx, cy + r * 0.10);
  c.fillStyle = '#fff8c8';
  c.fillText('$', cx, cy + r * 0.04);
  // Big crescent highlight upper-left
  c.save();
  c.beginPath();
  c.arc(cx, cy, r * 0.93, 0, Math.PI * 2);
  c.clip();
  c.fillStyle = 'rgba(255,255,255,0.80)';
  c.beginPath();
  c.ellipse(cx - r * 0.32, cy - r * 0.38, r * 0.40, r * 0.15, -0.5, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

function drawTileKawaiiSack(c, cx, cy, size) {
  const w = size * 0.72;
  const h = size * 0.86;
  const top = cy - h * 0.46;
  const neck = top + h * 0.22;
  const lw = Math.max(2.2, size * 0.060);
  // Bag body — wide round bottom, narrows into neck
  const buildBody = () => {
    c.beginPath();
    c.moveTo(cx - w * 0.18, neck);
    c.bezierCurveTo(cx - w * 0.55, neck + h * 0.15, cx - w * 0.55, cy + h * 0.35, cx - w * 0.30, cy + h * 0.45);
    c.bezierCurveTo(cx - w * 0.10, cy + h * 0.50, cx + w * 0.10, cy + h * 0.50, cx + w * 0.30, cy + h * 0.45);
    c.bezierCurveTo(cx + w * 0.55, cy + h * 0.35, cx + w * 0.55, neck + h * 0.15, cx + w * 0.18, neck);
    c.closePath();
  };
  const grad = c.createLinearGradient(cx, top, cx, cy + h * 0.5);
  grad.addColorStop(0, '#d8a8ff');
  grad.addColorStop(0.5, '#a259ff');
  grad.addColorStop(1, '#5a2a9c');
  c.fillStyle = grad;
  c.strokeStyle = KAWAII_INK;
  c.lineWidth = lw;
  c.lineJoin = 'round';
  buildBody();
  c.fill();
  c.stroke();
  // Sheen on upper-left
  c.save();
  buildBody();
  c.clip();
  c.fillStyle = 'rgba(255,255,255,0.35)';
  c.beginPath();
  c.ellipse(cx - w * 0.25, cy + h * 0.05, w * 0.12, h * 0.25, -0.2, 0, Math.PI * 2);
  c.fill();
  c.restore();
  // Drawstring tie band at the neck
  c.fillStyle = '#5a2a9c';
  c.strokeStyle = KAWAII_INK;
  c.lineWidth = Math.max(1.6, size * 0.040);
  const tieX = cx - w * 0.22;
  const tieY = neck - h * 0.04;
  const tieW = w * 0.44;
  const tieH = h * 0.10;
  c.beginPath();
  c.moveTo(tieX, tieY);
  c.lineTo(tieX + tieW, tieY);
  c.lineTo(tieX + tieW + 4, tieY + tieH);
  c.lineTo(tieX - 4, tieY + tieH);
  c.closePath();
  c.fill();
  c.stroke();
  // Knot bumps
  c.fillStyle = '#a259ff';
  c.beginPath();
  c.arc(cx - w * 0.05, tieY + tieH * 0.6, h * 0.05, 0, Math.PI * 2);
  c.arc(cx + w * 0.05, tieY + tieH * 0.6, h * 0.05, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  // $ on the body
  c.font = 'bold ' + Math.floor(h * 0.42) + 'px "Baloo 2", -apple-system, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = '#3a1a05';
  c.fillText('$', cx, cy + h * 0.22);
  c.fillStyle = '#ffd84a';
  c.fillText('$', cx, cy + h * 0.18);
}

function drawTileKawaiiChest(c, cx, cy, size) {
  const w = size * 0.86;
  const h = size * 0.66;
  const boxTop = cy - h * 0.08;
  const bottom = cy + h * 0.46;
  const lidApex = cy - h * 0.48;
  const r = w * 0.05;
  const lw = Math.max(2.4, size * 0.060);
  // Box body (wood brown)
  const buildBox = () => {
    c.beginPath();
    c.moveTo(cx - w * 0.50, boxTop);
    c.lineTo(cx + w * 0.50, boxTop);
    c.lineTo(cx + w * 0.50, bottom - r);
    c.quadraticCurveTo(cx + w * 0.50, bottom, cx + w * 0.50 - r, bottom);
    c.lineTo(cx - w * 0.50 + r, bottom);
    c.quadraticCurveTo(cx - w * 0.50, bottom, cx - w * 0.50, bottom - r);
    c.closePath();
  };
  const bodyGrad = c.createLinearGradient(cx, boxTop, cx, bottom);
  bodyGrad.addColorStop(0, '#c8843a');
  bodyGrad.addColorStop(1, '#6e3e1a');
  c.fillStyle = bodyGrad;
  c.strokeStyle = KAWAII_INK;
  c.lineWidth = lw;
  c.lineJoin = 'round';
  buildBox();
  c.fill();
  c.stroke();
  // Curved lid
  const buildLid = () => {
    c.beginPath();
    c.moveTo(cx - w * 0.50, boxTop);
    c.quadraticCurveTo(cx - w * 0.50, lidApex + h * 0.10, cx - w * 0.36, lidApex + h * 0.04);
    c.quadraticCurveTo(cx, lidApex - h * 0.08, cx + w * 0.36, lidApex + h * 0.04);
    c.quadraticCurveTo(cx + w * 0.50, lidApex + h * 0.10, cx + w * 0.50, boxTop);
    c.closePath();
  };
  const lidGrad = c.createLinearGradient(cx, lidApex - h * 0.05, cx, boxTop);
  lidGrad.addColorStop(0, '#e0a050');
  lidGrad.addColorStop(1, '#8a4f25');
  c.fillStyle = lidGrad;
  buildLid();
  c.fill();
  c.stroke();
  // Lid sheen
  c.save();
  buildLid();
  c.clip();
  c.fillStyle = 'rgba(255,255,255,0.40)';
  c.beginPath();
  c.ellipse(cx - w * 0.18, lidApex + h * 0.10, w * 0.22, h * 0.05, -0.2, 0, Math.PI * 2);
  c.fill();
  c.restore();
  // Gold band at lid-body seam
  c.fillStyle = '#ffd84a';
  c.strokeStyle = KAWAII_INK;
  c.lineWidth = Math.max(1.8, size * 0.040);
  c.beginPath();
  c.rect(cx - w * 0.50, boxTop - h * 0.05, w, h * 0.10);
  c.fill();
  c.stroke();
  // Gold corner brackets bottom-left & bottom-right
  c.fillStyle = '#ffd84a';
  const cs = w * 0.11;
  c.fillRect(cx - w * 0.50, bottom - cs, cs, cs);
  c.strokeRect(cx - w * 0.50, bottom - cs, cs, cs);
  c.fillRect(cx + w * 0.50 - cs, bottom - cs, cs, cs);
  c.strokeRect(cx + w * 0.50 - cs, bottom - cs, cs, cs);
  // Gold lock plate (round)
  c.fillStyle = '#ffd84a';
  c.lineWidth = Math.max(1.8, size * 0.040);
  c.beginPath();
  c.arc(cx, boxTop + h * 0.26, h * 0.16, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  // Keyhole
  c.fillStyle = KAWAII_INK;
  c.beginPath();
  c.arc(cx, boxTop + h * 0.23, h * 0.05, 0, Math.PI * 2);
  c.fill();
  c.fillRect(cx - h * 0.015, boxTop + h * 0.23, h * 0.030, h * 0.10);
}

function drawTileKawaiiBolt(c, cx, cy, size) {
  const lw = Math.max(2.2, size * 0.060);
  const sx = size * 0.45;
  const sy = size * 0.50;
  // Lightning bolt path
  const build = () => {
    c.beginPath();
    c.moveTo(cx + sx * 0.30, cy - sy);
    c.lineTo(cx - sx * 0.50, cy - sy * 0.05);

function drawEmojiSprite(c, ch, cx, cy, size) {
  const entry = emojiCache[ch];
  if (!entry) {
    // Fallback if not cached
    c.font = size + 'px ' + EMOJI_FONT_STACK;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(ch, cx, cy);

/* =========================================================
   [28] Match3 engine
   ========================================================= */

// =========================================================
// Grid representation
// Each cell is either null (empty) or { type, sp, mod }:
//   type: 0..NUM_COLORS-1 (color) or NUM_COLORS..  (charge/specials)
//   sp:   SP_NONE | SP_ARROW_H | SP_ARROW_V | SP_BOMB | SP_LIGHTNING
//   mod:  reserved for v0.7+ (fuse/bonus/plus/rainbow modifiers)
// Only COLOR tiles can host special pieces. Charge/Bonus tiles never.
// =========================================================
let grid = [];

function makeEmptyGrid() {
  const g = new Array(ROWS);
  for (let r = 0; r < ROWS; r++) g[r] = new Array(COLS).fill(null);
  return g;
}
function spawnFreshGrid() {
  grid = makeEmptyGrid();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = pickFreshTile(r, c);
    }
  }
}
function pickFreshTile(r, c) {
  for (let attempt = 0; attempt < 30; attempt++) {
    const tl = Math.floor(Math.random() * NUM_COLORS);
    if (c >= 2 && grid[r][c - 1] && grid[r][c - 1].type === tl && grid[r][c - 2] && grid[r][c - 2].type === tl) continue;
    if (r >= 2 && grid[r - 1][c] && grid[r - 1][c].type === tl && grid[r - 2][c] && grid[r - 2][c].type === tl) continue;
    return makeCell(tl);
  }
  return makeCell(Math.floor(Math.random() * NUM_COLORS));
}
function pickReplenishTile() {
  // Walk the spawn table once. Anything that falls past CHEST defaults
  // to the THEME tile (so theme spawns get the leftover ~25%).
  const r = Math.random();
  let acc = 0;
  if (r < (acc += SPAWN_RATE.STAR))   return makeCell(TILE.STAR);
  if (r < (acc += SPAWN_RATE.WILD))   return makeCell(TILE.WILD);
  if (r < (acc += SPAWN_RATE.BOLT))   return makeCell(TILE.BOLT);
  if (r < (acc += SPAWN_RATE.PIG))    return makeCell(TILE.PIG);
  if (r < (acc += SPAWN_RATE.SHIELD)) return makeCell(TILE.SHIELD);
  if (r < (acc += SPAWN_RATE.CHEST))  return makeCell(TILE.CHEST);
  if (r < (acc += SPAWN_RATE.SACK))   return makeCell(TILE.SACK);
  if (r < (acc += SPAWN_RATE.COIN))   return makeCell(TILE.COIN);
  return makeCell(TILE.THEME);
}
function tilesMatch(a, b) {
  if (!a || !b) return false;
  if (a.type === TILE.WILD || b.type === TILE.WILD) return true;
  return a.type === b.type;
}
// Run-aware match detection — returns { matched, runs, groups } where
// runs is an array of { cells, len, shape, type, pivot? } describing each
// detected match line/shape. Used by plannedSpawns to decide where to
// drop specials (line4 → arrow, line5 → lightning, L/T → bomb).
function findMatchesAndRuns() {
  const horizRuns = [], vertRuns = [];
  for (let r = 0; r < ROWS; r++) {
    let s = 0;
    for (let c = 1; c <= COLS; c++) {
      const end = c === COLS || !grid[r][c] || !grid[r][s] || !tilesMatch(grid[r][c], grid[r][s]);
      if (end) {
        if (c - s >= MIN_MATCH && grid[r][s]) {
          const cells = new Set();
          for (let k = s; k < c; k++) cells.add(r + ',' + k);
          horizRuns.push({ cells, len: c - s, type: grid[r][s].type });
        }
        s = c;
      }
    }
  }
  for (let c = 0; c < COLS; c++) {
    let s = 0;
    for (let r = 1; r <= ROWS; r++) {
      const end = r === ROWS || !grid[r][c] || !grid[s][c] || !tilesMatch(grid[r][c], grid[s][c]);
      if (end) {
        if (r - s >= MIN_MATCH && grid[s][c]) {
          const cells = new Set();
          for (let k = s; k < r; k++) cells.add(k + ',' + c);
          vertRuns.push({ cells, len: r - s, type: grid[s][c].type });
        }
        s = r;
      }
    }
  }
  // Merge intersecting same-type runs into L/T shapes
  const runs = [];
  const cH = new Set(), cV = new Set();
  for (let i = 0; i < horizRuns.length; i++) {
    const h = horizRuns[i];
    for (let j = 0; j < vertRuns.length; j++) {
      const v = vertRuns[j];
      if (h.type !== v.type) continue;
      let ix = null;
      for (const k of h.cells) if (v.cells.has(k)) { ix = k; break; }
      if (ix) {
        const merged = new Set();
        for (const k of h.cells) merged.add(k);
        for (const k of v.cells) merged.add(k);
        runs.push({ cells: merged, len: merged.size, shape: 'L_or_T', type: h.type, pivot: ix.split(',').map(Number) });
        cH.add(i); cV.add(j);
      }
    }
  }
  for (let i = 0; i < horizRuns.length; i++) {
    if (cH.has(i)) continue;
    const h = horizRuns[i];
    let shape = 'line3';
    if (h.len === 4) shape = 'line4_h';
    else if (h.len >= 5) shape = 'line5_h';
    runs.push({ cells: h.cells, len: h.len, shape, type: h.type });
  }
  for (let j = 0; j < vertRuns.length; j++) {
    if (cV.has(j)) continue;
    const v = vertRuns[j];
    let shape = 'line3';
    if (v.len === 4) shape = 'line4_v';
    else if (v.len >= 5) shape = 'line5_v';
    runs.push({ cells: v.cells, len: v.len, shape, type: v.type });
  }
  // Aggregate matched cells
  const matched = new Set();
  for (const run of runs) for (const k of run.cells) matched.add(k);
  return { matched, runs, groups: runs.length };
}
// Decide where (and what kind) of special-piece spawns from this match.
// Preference order: cell at swap location > pivot of L/T > middle of line.
function plannedSpawns(runs, swapCells) {
  const spawns = [];
  for (const run of runs) {
    if (run.type >= NUM_COLORS) continue;   // only color runs spawn specials
    let sp = SP_NONE;
    if (run.shape === 'L_or_T')           sp = SP_BOMB;
    else if (run.shape === 'line5_h' || run.shape === 'line5_v') sp = SP_LIGHTNING;
    else if (run.shape === 'line4_h')     sp = SP_ARROW_H;
    else if (run.shape === 'line4_v')     sp = SP_ARROW_V;
    if (!sp) continue;
    let chosenKey = null;
    if (swapCells) for (const sc of swapCells) if (run.cells.has(sc)) { chosenKey = sc; break; }
    if (!chosenKey && run.pivot) chosenKey = run.pivot[0] + ',' + run.pivot[1];
    if (!chosenKey) {
      const arr = [];
      for (const k of run.cells) arr.push(k);
      chosenKey = arr[Math.floor(arr.length / 2)];
    }
    const [r, c] = chosenKey.split(',').map(Number);
    spawns.push({ r, c, sp, type: run.type });
  }
  return spawns;
}
// When a match includes special pieces, those specials detonate and
// extend the toClear set. Detonations chain — clearing one special's row
// can hit another special which detonates in turn.
function expandWithDetonations(initialMatched) {
  const toClear = new Set();
  for (const k of initialMatched) toClear.add(k);
  const detonations = [];
  const queue = [];
  for (const key of initialMatched) {
    const [r, c] = key.split(',').map(Number);
    if (grid[r][c] && grid[r][c].sp) queue.push({ r, c, sp: grid[r][c].sp });
  }
  let safety = 50;
  while (queue.length > 0 && safety-- > 0) {
    const det = queue.shift();
    const r = det.r, c = det.c, sp = det.sp;
    const affected = new Set();
    if (sp === SP_ARROW_H) {
      for (let cc = 0; cc < COLS; cc++) affected.add(r + ',' + cc);
    } else if (sp === SP_ARROW_V) {
      for (let rr = 0; rr < ROWS; rr++) affected.add(rr + ',' + c);
    } else if (sp === SP_BOMB) {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) affected.add(nr + ',' + nc);
      }
    } else if (sp === SP_LIGHTNING) {
      // Lightning zaps 8 random non-cleared cells across the board.
      const cand = [];
      for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
        if (grid[rr][cc] && !toClear.has(rr + ',' + cc)) cand.push(rr + ',' + cc);
      }
      for (let i = cand.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = cand[i]; cand[i] = cand[j]; cand[j] = tmp;
      }
      for (let i = 0; i < Math.min(8, cand.length); i++) affected.add(cand[i]);
    }
    detonations.push({ r, c, sp, cells: affected });
    for (const key of affected) {
      if (!toClear.has(key)) {
        toClear.add(key);
        const [rr, cc] = key.split(',').map(Number);
        if (grid[rr][cc] && grid[rr][cc].sp && !(rr === r && cc === c)) {
          queue.push({ r: rr, c: cc, sp: grid[rr][cc].sp });
        }
      }
    }
  }
  return { toClear, detonations };
}
// Special-on-special combo cell calculation (verbatim Match Icon).
function spClass(sp) {
  if (sp === SP_ARROW_H || sp === SP_ARROW_V) return 'arrow';
  if (sp === SP_BOMB) return 'bomb';
  if (sp === SP_LIGHTNING) return 'lightning';
  return null;
}
function comboCells(spA, spB, epR, epC, otherR, otherC) {
  const classA = spClass(spA);
  const classB = spClass(spB);
  if (!classA || !classB) return new Set();
  const types = [classA, classB].sort().join('+');
  const cells = new Set();
  if (types === 'arrow+arrow') {
    const aH = spA === SP_ARROW_H, bH = spB === SP_ARROW_H;
    const aV = spA === SP_ARROW_V, bV = spB === SP_ARROW_V;
    if (aV && bV) {
      for (let rr = 0; rr < ROWS; rr++) { cells.add(rr + ',' + epC); cells.add(rr + ',' + otherC); }
    } else if (aH && bH) {
      for (let cc = 0; cc < COLS; cc++) { cells.add(epR + ',' + cc); cells.add(otherR + ',' + cc); }
    } else {
      const hRow = aH ? epR : otherR;
      const vCol = aV ? epC : otherC;
      for (let cc = 0; cc < COLS; cc++) cells.add(hRow + ',' + cc);
      for (let rr = 0; rr < ROWS; rr++) cells.add(rr + ',' + vCol);
    }
  } else if (types === 'arrow+bomb') {
    const horizontal = spA === SP_ARROW_H || spB === SP_ARROW_H;
    if (horizontal) {
      for (let dr = -1; dr <= 1; dr++) {
        const rr = epR + dr;
        if (rr < 0 || rr >= ROWS) continue;
        for (let cc = 0; cc < COLS; cc++) cells.add(rr + ',' + cc);
      }
    } else {
      for (let dc = -1; dc <= 1; dc++) {
        const cc = epC + dc;
        if (cc < 0 || cc >= COLS) continue;
        for (let rr = 0; rr < ROWS; rr++) cells.add(rr + ',' + cc);

    }

    }
    for (let i = cand.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = cand[i]; cand[i] = cand[j]; cand[j] = tmp;
    }
    const picks = cand.slice(0, 6);
    picks.push([epR, epC]);
    for (const p of picks) {
      const pr = p[0], pc = p[1];
      if ((pr + pc) % 2 === 0) {
        for (let cc = 0; cc < COLS; cc++) cells.add(pr + ',' + cc);
      } else {
        for (let rr = 0; rr < ROWS; rr++) cells.add(rr + ',' + pc);
      }
    }
  } else if (types === 'bomb+bomb') {
    for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
      const rr = epR + dr, cc = epC + dc;
      if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) cells.add(rr + ',' + cc);
    }
  } else if (types === 'bomb+lightning') {
    const cand = [];
    for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
      if (grid[rr][cc]) cand.push([rr, cc]);
    }
    for (let i = cand.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = cand[i]; cand[i] = cand[j]; cand[j] = tmp;
    }
    const picks = cand.slice(0, 6);
    picks.push([epR, epC]);
    for (const p of picks) {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        const rr = p[0] + dr, cc = p[1] + dc;
        if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) cells.add(rr + ',' + cc);
      }
    }
  } else if (types === 'lightning+lightning') {
    const cand = [];
    for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
      if (grid[rr][cc]) cand.push(rr + ',' + cc);
    }
    for (let i = cand.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = cand[i]; cand[i] = cand[j]; cand[j] = tmp;
    }
    for (let i = 0; i < Math.min(20, cand.length); i++) cells.add(cand[i]);
    cells.add(epR + ',' + epC);
  }

}
// Hex color → rgba(...) string with custom alpha. Used by all FX draws.
function hexToRgba(hex, a) {
  if (!hex) return 'rgba(255,255,255,' + a + ')';
  if (hex.indexOf('rgba') === 0 || hex.indexOf('rgb') === 0) return hex;
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

// Register an FX animation. Like swap/pop/fall but with type='fx' and a
// `kind` string the render loop dispatches on (see drawFX). Duration varies
// per kind to match Match Icon's pacing — beams short, explosions longer,
// combos longest. onDone fires after the FX finishes drawing.
function startFXAnim(kind, payload, onDone) {
  const t0 = now();
  let dur = 500;
  if (kind === 'arrow_h' || kind === 'arrow_v') dur = 600;
  else if (kind === 'bomb_blast')               dur = 700;
  else if (kind === 'lightning_strike')         dur = 750;
  else if (kind === 'combo_arrow+arrow')        dur = 850;
  else if (kind === 'combo_arrow+bomb')         dur = 1000;
  else if (kind === 'combo_arrow+lightning')    dur = 1100;
  else if (kind === 'combo_bomb+bomb')          dur = 1100;
  else if (kind === 'combo_bomb+lightning')     dur = 1200;
  else if (kind === 'combo_lightning+lightning') dur = 1000;
  animations.push({
    type: 'fx', kind, payload, t0, dur, p: 0,
    update(t) { this.p = Math.min(1, (t - t0) / dur); return this.p >= 1; },
    done: onDone,
  });
}

// Run a chain of detonations with staggered FX. Each detonation registers
// its own FX animation; this orchestrator counts down `remaining` and
// invokes `onAllDone` once every FX has finished. Particles + shake +
// haptic fire alongside the FX so the player feels the impact.
function runDetonationSequence(detonations, onAllDone) {
  if (!detonations || detonations.length === 0) {
    if (onAllDone) onAllDone();
    return;
  }
  let remaining = detonations.length;
  const finish = () => { remaining--; if (remaining <= 0 && onAllDone) onAllDone(); };
  for (let i = 0; i < detonations.length; i++) {
    const det = detonations[i];
    const stagger = i * 90;
    setTimeout(() => {
      const cell = grid[det.r][det.c];
      const color = cell ? tileParticleColor(cell.type) : '#ffd864';
      if (det.sp === SP_ARROW_H) {
        shake(8, 350); haptic('heavy'); sfxArrow();
        startFXAnim('arrow_h', { epicenter: { r: det.r, c: det.c }, color }, finish);
        for (let cc = 0; cc < COLS; cc++) {
          const passDelay = Math.abs(cc - det.c) * 35;
          setTimeout(() => {
            spawnParticles(cc * CELL + CELL / 2, det.r * CELL + CELL / 2, color, 12, 1.3);
            spawnParticles(cc * CELL + CELL / 2, det.r * CELL + CELL / 2, '#ffffff', 6, 1.0);
          }, passDelay);
        }
      } else if (det.sp === SP_ARROW_V) {
        shake(8, 350); haptic('heavy'); sfxArrow();
        startFXAnim('arrow_v', { epicenter: { r: det.r, c: det.c }, color }, finish);
        for (let rr = 0; rr < ROWS; rr++) {
          const passDelay = Math.abs(rr - det.r) * 35;
          setTimeout(() => {
            spawnParticles(det.c * CELL + CELL / 2, rr * CELL + CELL / 2, color, 12, 1.3);
            spawnParticles(det.c * CELL + CELL / 2, rr * CELL + CELL / 2, '#ffffff', 6, 1.0);
          }, passDelay);
        }
      } else if (det.sp === SP_BOMB) {
        shake(14, 500); haptic('success'); sfxBoom();
        startFXAnim('bomb_blast', { epicenter: { r: det.r, c: det.c }, cells: det.cells, color }, finish);
        for (const key of det.cells) {
          const [rr, cc] = key.split(',').map(Number);
          const dist = Math.max(Math.abs(rr - det.r), Math.abs(cc - det.c));
          setTimeout(() => {
            spawnParticles(cc * CELL + CELL / 2, rr * CELL + CELL / 2, color, 14, 1.5);
            spawnParticles(cc * CELL + CELL / 2, rr * CELL + CELL / 2, '#ff9f5b', 8, 1.2);
          }, dist * 60);
        }
      } else if (det.sp === SP_LIGHTNING) {
        shake(10, 400); haptic('success'); sfxZap();
        const targets = [];
        for (const key of det.cells) {
          const [rr, cc] = key.split(',').map(Number);
          if (rr !== det.r || cc !== det.c) targets.push({ r: rr, c: cc });
        }
        startFXAnim('lightning_strike', { epicenter: { r: det.r, c: det.c }, targets, color: '#9ad8ff' }, finish);
        for (const t of targets) {
          setTimeout(() => {
            spawnParticles(t.c * CELL + CELL / 2, t.r * CELL + CELL / 2, '#9ad8ff', 16, 1.6);
            spawnParticles(t.c * CELL + CELL / 2, t.r * CELL + CELL / 2, '#ffffff', 10, 1.4);
          }, 380);
        }
      } else {
        finish();
      }
    }, stagger);
  }
}
function trySwap(r1, c1, r2, c2) {
  if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) return false;
  const tmp = grid[r1][c1]; grid[r1][c1] = grid[r2][c2]; grid[r2][c2] = tmp;
  const m = findMatchesAndRuns();
  if (m.matched.size === 0) {
    const t2 = grid[r1][c1]; grid[r1][c1] = grid[r2][c2]; grid[r2][c2] = t2;
    return false;
  }
  return true;
}
function applyGravity() {
  const falls = [];
  for (let c = 0; c < COLS; c++) {
    let wr = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== null) {
        if (r !== wr) {
          falls.push({ col: c, fromRow: r, toRow: wr, tile: grid[r][c] });
          grid[wr][c] = grid[r][c]; grid[r][c] = null;
        }
        wr--;
      }
    }
    let spawnFrom = -1;
    for (let r = wr; r >= 0; r--) {
      const tl = pickReplenishTile();
      grid[r][c] = tl;
      falls.push({ col: c, fromRow: spawnFrom, toRow: r, tile: tl });
      spawnFrom--;
    }
  }
  return falls;
}
function hasPossibleMove() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tries = [[r, c, r, c + 1], [r, c, r + 1, c]];
    for (const tr of tries) {
      const a = tr[0], b = tr[1], x = tr[2], y = tr[3];
      if (x >= ROWS || y >= COLS) continue;
      const tmp = grid[a][b]; grid[a][b] = grid[x][y]; grid[x][y] = tmp;
      const m = findMatchesAndRuns();
      const t2 = grid[a][b]; grid[a][b] = grid[x][y]; grid[x][y] = t2;
      if (m.matched.size > 0) return true;
    }
  }
  return false;
}
function reshuffleGrid() {
  const all = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) all.push(grid[r][c]);
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = all[i]; all[i] = all[j]; all[j] = tmp;
  }
  for (let attempt = 0; attempt < 6; attempt++) {
    let idx = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = all[idx++];
    if (findMatchesAndRuns().matched.size === 0 && hasPossibleMove()) return;
    for (let i = all.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = all[i]; all[i] = all[j]; all[j] = tmp;
    }
  }
  spawnFreshGrid();
}

/* =========================================================
   [29] Resolve cascade + scoring + meter charge
   ========================================================= */

const game = { busy: false, selected: null, cascadeDepth: 0, cascadeMax: 0 };

function tileEmoji(type) {
  // 9 kawaii canvas-drawn / PNG-loaded tile icons. Always baked into
  // the emoji cache by rebuildEmojiCache so drawEmojiSprite blits them
  // like any emoji. WILD + STAR fall back to emoji until the PNG loads.
  if (type === TILE.COIN)   return '_t_coin';
  if (type === TILE.SACK)   return '_t_sack';
  if (type === TILE.CHEST)  return '_t_chest';
  if (type === TILE.BOLT)   return '_t_bolt';
  if (type === TILE.PIG)    return '_t_pig';
  if (type === TILE.SHIELD) return '_t_shield';
  if (type === TILE.THEME)  return '_t_theme';
  if (type === TILE.WILD) {
    const e = tileImages._t_wild;
    return (e && e.isPng && e.canvas) ? '_t_wild' : '🎰';
  }
  if (type === TILE.STAR) {
    const e = tileImages._t_star;
    return (e && e.isPng && e.canvas) ? '_t_star' : '⭐';
  }
  return TILE_EMOJI_FIXED[type] || '?';
}
function effectiveBet() {
  let idx = state.betIdx;
  if (idx < 0) idx = 0;
  if (idx >= BETS.length) idx = BETS.length - 1;
  return BETS[idx];
}

// =========================================================
// Animation-driven swap + cascade flow.
// Pattern (verbatim from Match Icon):
//   Swap forward (anim) → if no match: swap back (anim) → done
//                       → if match:  commit grid → processCascadeStep
//   processCascadeStep: find matches → score+particles → pop anim
//     → clear cells in grid → gravity (returns falls) → fall anim
//     → recurse processCascadeStep
// All grid mutations happen IN BETWEEN animations, never during them.
// =========================================================

function attemptSwap(r1, c1, r2, c2) {
  if (game.busy) return;

  // Booster: hammer — destroys a single tile, no swap, no energy.
  if (state.armed.hammer) {
    state.armed.hammer = false; setBoosterArmed('hammer', false);
    if (state.boost.hammer > 0) state.boost.hammer--;
    game.busy = true;
    haptic('heavy');
    startPopAnim([r1 + ',' + c1], () => {
      const cell = grid[r1][c1];
      if (cell) spawnParticles(c1 * CELL + CELL/2, r1 * CELL + CELL/2, tileParticleColor(cell.type), 14, 1.8);
      grid[r1][c1] = null;
      const falls = applyGravity();
      startFallAnim(falls, () => {
        game.cascadeDepth = 0; game.cascadeMax = 0;
        processCascadeStep(null, null);
      });
    });
    refreshAllUI();
    return;
  }
  if (state.armed.rocket) {
    state.armed.rocket = false; setBoosterArmed('rocket', false);
    if (state.boost.rocket > 0) state.boost.rocket--;
    game.busy = true;
    haptic('heavy'); shake(8, 280);
    const cells = [];
    for (let cc = 0; cc < COLS; cc++) cells.push(r1 + ',' + cc);
    for (let rr = 0; rr < ROWS; rr++) if (rr !== r1) cells.push(rr + ',' + c1);
    for (const key of cells) {
      const [r, c] = key.split(',').map(Number);
      const cell = grid[r][c];
      if (cell) spawnParticles(c * CELL + CELL/2, r * CELL + CELL/2, tileParticleColor(cell.type), 8, 1.4);
    }
    startPopAnim(cells, () => {
      for (const key of cells) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      const falls = applyGravity();
      startFallAnim(falls, () => {
        game.cascadeDepth = 0; game.cascadeMax = 0;
        processCascadeStep(null, null);
      });
    });
    refreshAllUI();
    return;
  }
  if (state.armed.bomb) {
    state.armed.bomb = false; setBoosterArmed('bomb', false);
    if (state.boost.bomb > 0) state.boost.bomb--;
    game.busy = true;
    haptic('heavy'); shake(10, 320);
    const cells = [];
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const rr = r1 + dr, cc = c1 + dc;
      if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) cells.push(rr + ',' + cc);
    }
    for (const key of cells) {
      const [r, c] = key.split(',').map(Number);
      const cell = grid[r][c];
      if (cell) spawnParticles(c * CELL + CELL/2, r * CELL + CELL/2, tileParticleColor(cell.type), 10, 1.6);
    }
    startPopAnim(cells, () => {
      for (const key of cells) {
        const [r, c] = key.split(',').map(Number);
        grid[r][c] = null;
      }
      const falls = applyGravity();
      startFallAnim(falls, () => {
        game.cascadeDepth = 0; game.cascadeMax = 0;
        processCascadeStep(null, null);
      });
    });
    refreshAllUI();
    return;
  }

  if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) return;

  const cellA = grid[r1][c1], cellB = grid[r2][c2];

  // Special-on-special combo — swap always valid, fires combo regardless of color.
  if (cellA && cellB && cellA.sp && cellB.sp) {
    const bet = effectiveBet();
    const energyCost = state.freeSpinsLeft > 0 ? 0 : bet.cost;
    if (state.energy < energyCost) {
      flashEnergyEmpty();
      showOutOfEnergyModal();
      return;
    }
    if (state.freeSpinsLeft > 0) state.freeSpinsLeft--;
    else {
      state.energy -= energyCost;
      if (state.energy < state.energyMax && !state.energyRegenAt) state.energyRegenAt = Date.now() + ENERGY_REGEN_MS;
    }
    refreshEnergyUI();
    haptic('heavy');
    game.busy = true;
    grid[r1][c1] = cellB; grid[r2][c2] = cellA;
    const spA = cellA.sp, spB = cellB.sp;
    startSwapAnim(r1, c1, r2, c2, () => {
      triggerSpecialCombo(spA, spB, r2, c2, r1, c1);
    });
    return;
  }

  // Peek swap to detect a normal match.
  const a = cellA, b = cellB;
