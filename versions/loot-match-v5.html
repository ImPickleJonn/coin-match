});
function showTab(tab) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  const target = document.getElementById('screen-' + tab);
  if (target) target.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === tab));
  if (tab === 'play')    { sizeCanvas(); refreshAllUI(); }
  if (tab === 'village') refreshVillageScreen();
  if (tab === 'shop')    renderShop();
  if (tab === 'friends') loadLeaderboard();
}

const modalBack = document.getElementById('modal-back');
const modalEl = document.getElementById('modal');
function openModal(html) {
  modalEl.innerHTML = '<div class="modal-close" id="modal-close">×</div>' + html;
  modalBack.classList.add('show');
  const close = document.getElementById('modal-close');
  if (close) close.addEventListener('click', closeModal);
}
function closeModal() { modalBack.classList.remove('show'); }
modalBack.addEventListener('click', (ev) => { if (ev.target === modalBack) closeModal(); });

/* =========================================================
   [38] Daily chest + welcome + settings
   ========================================================= */

function todayYMD() { const d = new Date(); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function yesterdayYMD() { const d = new Date(); d.setUTCDate(d.getUTCDate() - 1); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function canClaimDaily() { return state.dailyChestYMD !== todayYMD(); }
function nextChestDay() {
  if (state.dailyChestDay >= 7) return 1;
  if (state.dailyChestYMD && state.dailyChestYMD !== yesterdayYMD()) return 1;
  return state.dailyChestDay + 1;
}
function showDailyModal() {
  const next = nextChestDay();
  const claimable = canClaimDaily();
  let cells = '';
  for (let i = 0; i < 7; i++) {
    const day = i + 1;
    const item = DAILY_CHEST[i];
    const isToday = (claimable && day === next) || (!claimable && day === state.dailyChestDay);
    const claimedByPrior = !claimable && day < state.dailyChestDay;
    const futureDay = claimable ? (day > next) : (day > state.dailyChestDay);
    cells += '<div class="chest-day' + (isToday ? ' today' : '') + (claimedByPrior ? ' claimed' : '') + (futureDay ? ' future' : '') + '">' +
      '<div class="d">' + day + '</div><div class="em">' + item.em + '</div>' +
      '<div class="amt">+' + fmtNum(item.coins) + (item.energy ? ' ⚡' + item.energy : '') + '</div></div>';
  }
  const html =
    '<h2>' + t('daily_chest') + '</h2>' +
    '<div class="sub">' + t('daily_streak', { n: state.streak }) + '</div>' +
    '<div class="chest-grid">' + cells + '</div>' +
    '<div class="actions">' + (claimable
      ? '<button class="btn gold full" id="claim-daily">' + t('claim') + ' · Day ' + next + '</button>'
      : '<div style="text-align:center;color:#8a8ca0;font-size:13px;">' + t('come_back_tomorrow') + '</div>') + '</div>';
  openModal(html);
  if (claimable) {
    document.getElementById('claim-daily').addEventListener('click', () => { claimDaily(); closeModal(); });
  }
}
function claimDaily() {
  if (!canClaimDaily()) return;
  const next = nextChestDay();
  const item = DAILY_CHEST[next - 1];
  if (state.dailyChestYMD === yesterdayYMD()) state.streak = (state.streak || 0) + 1;
  else state.streak = 1;
  state.coins += item.coins;
  state.totalGoldEarnedEver += item.coins;
  state.vaultLifetimeCoins += item.coins;
  if (item.energy) state.energy = Math.min(state.energyMax + item.energy, state.energy + item.energy);
  state.dailyChestYMD = todayYMD();
  state.dailyChestDay = next;
  haptic('success');
  bumpScore();
  saveState();
  refreshAllUI();
  toast('+' + fmtNum(item.coins) + ' 💰' + (item.energy ? ' +' + item.energy + ' ⚡' : ''));
}

function showWelcomeModal() {
  const html =
    '<h2>' + t('welcome_title') + '</h2>' +
    '<div class="welcome-grid">' +
      '<div class="em">💰</div><div><span class="lbl">Match</span><br>' + t('welcome_match') + '</div>' +
      '<div class="em">⚡</div><div><span class="lbl">Cascade</span><br>' + t('welcome_cascade') + '</div>' +
      '<div class="em">🔨</div><div><span class="lbl">Steal</span><br>' + t('welcome_charge') + '</div>' +
      '<div class="em">🏠</div><div><span class="lbl">Village</span><br>' + t('welcome_village') + '</div>' +
    '</div>' +
    '<div class="actions"><button class="btn gold full" id="wel-ok">' + t('lets_go') + '</button></div>';
  openModal(html);
  document.getElementById('wel-ok').addEventListener('click', () => {
    state.welcomed = true; saveState(); closeModal();
  });
}

function showSettingsModal() {
  const html =
    '<h2>' + t('settings') + '</h2>' +
    '<div style="font-size:12px;color:#c7cdd9;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;font-weight:800;">' + t('language') + '</div>' +
    '<div class="lang-grid" id="lang-grid"></div>' +
    '<div style="text-align:center;font-size:11px;color:#5a4ab0;margin-top:10px;">' + VERSION + '</div>';
  openModal(html);
  const grid = document.getElementById('lang-grid');
  for (const l of LANGS) {
    const cell = document.createElement('div');
    cell.className = 'lang-cell' + (l.code === state.lang ? ' active' : '');
    cell.innerHTML = '<span class="flag">' + l.flag + '</span>' + l.name;
    cell.addEventListener('click', () => {
      state.lang = l.code; saveState(); applyI18n(); refreshAllUI(); closeModal();
      setTimeout(showSettingsModal, 80);
    });
    grid.appendChild(cell);
  }
}

// Daily button (the center RULES button repurposed) opens daily chest
document.getElementById('rules-btn').addEventListener('click', showDailyModal);
// Master avatar long-press = settings (placeholder for v0.4)
document.getElementById('playerAv').addEventListener('click', showSettingsModal);

/* =========================================================
   [39] Shop + leaderboard
   ========================================================= */

function renderShop() {
  const items = (SKUS && SKUS.length) ? SKUS.map(s => ({
    id: s.id, ico: shopIcon(s.id), title: s.title, desc: s.description, price: s.price,
    featured: s.id === 'starter_pack',
  })) : STAR_SHOP_FALLBACK;
  const list = document.getElementById('shop-list');
  if (!list) return;
  list.innerHTML = '';
  for (const it of items) {
    const card = document.createElement('div');
    card.className = 'shop-item' + (it.featured ? ' featured' : '');
    card.innerHTML =
      '<div class="ico">' + it.ico + '</div>' +
      '<div class="info"><div class="ti">' + it.title + '</div><div class="desc">' + it.desc + '</div></div>' +
      '<div class="price">' + it.price + ' ⭐</div>';
    card.addEventListener('click', () => buySku(it.id));
    list.appendChild(card);
  }
  if (!IAP_ENABLED) {
    const note = document.createElement('div');
    note.style.cssText = 'font-size:11px;color:#8a8ca0;text-align:center;margin:8px 0;padding:8px;background:rgba(20,12,40,0.7);border-radius:9px;border:1.5px solid #3a2a6a;';
    note.textContent = t('no_iap');
    list.appendChild(note);
  }
}
function shopIcon(id) {
  const m = { starter_pack:'🎁', coins_small:'💰', coins_medium:'💰', coins_large:'💰', coins_mega:'💰',
              energy_refill:'⚡', energy_full:'⚡', hammer_pack:'🔨', rocket_pack:'🚀', bomb_pack:'💣',
              shuffle_pack:'🔄', free_pack:'⚡⚡', shield_24h:'🛡️', battle_pass:'⭐', test_purchase:'🧪',
              bet_booster:'⚡', wild_booster:'🎰', bag_booster:'💰' };
  return m[id] || '💎';
}

let lbMode = 'regular';
async function loadLeaderboard() {
  try {
    const r = await fetch('/api/leaderboard?mode=' + lbMode);
    const d = await r.json();
    renderLeaderboard(d.top || []);
  } catch (e) { document.getElementById('lb-list').textContent = '—'; }
}
function renderLeaderboard(top) {
  const list = document.getElementById('lb-list');
  if (!list) return;
  if (!top.length) { list.textContent = 'Be the first on the board!'; return; }
  const myId = (TG && TG.initDataUnsafe && TG.initDataUnsafe.user && TG.initDataUnsafe.user.id) || null;
  list.innerHTML = top.slice(0, 50).map((e, i) =>
    '<div class="lb-row' + (myId && e.uid === myId ? ' me' : '') + '">' +
      '<div class="rank">' + (i + 1) + '</div>' +
      '<div class="name">' + escapeHtml(e.name) + (myId && e.uid === myId ? ' (you)' : '') + '</div>' +
      '<div class="score">' + fmtNum(e.score) + ' 💰</div></div>').join('');
}
function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch])); }
document.querySelectorAll('.lb-tab').forEach(el => {
  el.addEventListener('click', () => {
    lbMode = el.getAttribute('data-m');
    document.querySelectorAll('.lb-tab').forEach(x => x.classList.toggle('active', x === el));
    loadLeaderboard();
  });
});

/* =========================================================
   [40] Toast + boot
   ========================================================= */

let toastTimer = 0;
function toast(msg) {
  const el = document.getElementById('toast-el');
  if (!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 1900);
}

(async function boot() {
  tgReady();
  applyI18n();
  pruneOldMasterDamage();
  spawnFreshGrid();
  sizeCanvas();
  refreshAllUI();
  // Kick the main render loop — runs every frame for animations + particles.
  requestAnimationFrame(tick);

  if (!state.welcomed) setTimeout(showWelcomeModal, 350);
  else if (canClaimDaily()) setTimeout(showDailyModal, 500);

  await fetchServerFlags();
  if (TG && TG.initData) {
    try {
      const r = await fetch('/api/state/load', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: TG.initData }),
      });
      const d = await r.json();
      if (d.exists && d.state) { Object.assign(state, d.state); saveState(); refreshAllUI(); }
    } catch (e) {}
  }
  setInterval(pollPurchases, 5000);
  if (TG && TG.initData) {
    fetch('/api/heartbeat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: TG.initData, lang: state.lang, streak: state.streak }),
    }).catch(() => {});
  }
})();

</script>
